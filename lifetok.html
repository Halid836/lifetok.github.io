<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LifeTok</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #000;
            color: #fff;
            height: 100vh;
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
            touch-action: none;
            transition: background 0.3s, color 0.3s;
        }

        body.light-theme {
            background: #f5f5f5;
            color: #1a1a1a;
        }
        body.light-theme .tiktok-wrapper { background: #f5f5f5; }
        body.light-theme .tiktok-item { background: #f5f5f5; }
        body.light-theme .bottom-nav { background: rgba(255,255,255,0.95); border-top: 1px solid #e0e0e0; }
        body.light-theme .nav-item { color: #999; }
        body.light-theme .nav-item.active { color: #ff0033; }
        body.light-theme .settings-panel { background: #fff; }
        body.light-theme .settings-title { color: #1a1a1a; }
        body.light-theme .settings-close { color: #1a1a1a; }
        body.light-theme .settings-item { color: #1a1a1a; border-bottom: 1px solid #e8e8e8; }
        body.light-theme .settings-item .value { color: #888; }
        body.light-theme .settings-item .toggle-btn { background: #e8e8e8; color: #1a1a1a; }
        body.light-theme .settings-item .toggle-btn.active { background: #ff0033; color: #fff; }
        body.light-theme .settings-item select { background: #f0f0f0; border: 1px solid #ddd; color: #1a1a1a; }
        body.light-theme .settings-header { border-bottom: 1px solid #e8e8e8; }
        body.light-theme .settings-overlay { background: rgba(0,0,0,0.3); }
        body.light-theme .auth-screen { background: #f5f5f5; }
        body.light-theme .auth-input { background: #fff; border: 1px solid #ddd; color: #1a1a1a; }
        body.light-theme .auth-input::placeholder { color: #999; }
        body.light-theme .saved-item { background: #fff; border: 1px solid #e0e0e0; }
        body.light-theme .saved-item:hover { background: #f0f0f0; border-color: #ff0033; }
        body.light-theme .saved-name { color: #1a1a1a; }
        body.light-theme .search-page { background: #f5f5f5; }
        body.light-theme .search-header { background: #f5f5f5; border-bottom: 1px solid #e0e0e0; }
        body.light-theme .search-header input { background: #fff; border: 1px solid #ddd; color: #1a1a1a; }
        body.light-theme .search-user-name { color: #1a1a1a; }
        body.light-theme .search-user-item { border-bottom: 1px solid #e0e0e0; }
        body.light-theme .profile-page { background: #f5f5f5; }
        body.light-theme .profile-name { color: #1a1a1a; }
        body.light-theme .profile-stat-num { color: #1a1a1a; }
        body.light-theme .profile-logout-btn { background: #fff; border: 1px solid #ddd; color: #1a1a1a; }
        body.light-theme .profile-logout-btn:hover { background: #f0f0f0; }
        body.light-theme .profile-back-btn { color: #1a1a1a; }
        body.light-theme .profile-back-btn:hover { background: rgba(0,0,0,0.05); }
        body.light-theme .profile-settings-btn { color: #1a1a1a; }
        body.light-theme .profile-settings-btn:hover { background: rgba(0,0,0,0.05); }
        body.light-theme .profile-header-top { background: #f5f5f5; border-bottom: 1px solid #e0e0e0; }
        body.light-theme .profile-post-thumb { background: #e8e8e8; }
        body.light-theme .create-menu { background: #fff; }
        body.light-theme .create-menu button { color: #1a1a1a; }
        body.light-theme .modal-header { background: #f5f5f5; border-bottom: 1px solid #e0e0e0; }
        body.light-theme .modal-header button { color: #1a1a1a; }
        body.light-theme .modal-comment-input { background: #f5f5f5; border-top: 1px solid #e0e0e0; }
        body.light-theme .modal-comment-input input { background: #fff; border: 1px solid #ddd; color: #1a1a1a; }
        body.light-theme .modal-comment .comment-user { color: #1a1a1a; }
        body.light-theme .modal-comment .comment-text { color: #333; }
        body.light-theme .splash-screen { background: #f5f5f5; }
        body.light-theme .tiktok-overlay .user-name { color: #fff; }
        body.light-theme .tiktok-overlay .post-caption { color: #fff; }
        body.light-theme .tiktok-actions button { color: #fff; }
        body.light-theme .video-progress { background: rgba(255,255,255,0.3); }
        body.light-theme .search-back-btn { color: #1a1a1a; }
        body.light-theme .search-back-btn:hover { background: rgba(0,0,0,0.05); }
        body.light-theme .search-title { color: #1a1a1a; }
        body.light-theme .profile-title { color: #1a1a1a; }
        body.light-theme .comment-delete-btn { color: #ff0033; }
        body.light-theme .comment-delete-btn:hover { background: rgba(255,0,51,0.1); }
        body.light-theme .post-delete-btn { color: #ff0033; }

        .splash-screen {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
            flex-direction: column;
            gap: 20px;
            z-index: 1000;
            overflow: hidden;
        }

        .particles {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .particle {
            position: absolute;
            background: #ff0033;
            border-radius: 50%;
            animation: floatUp 3s infinite;
            opacity: 0;
        }

        @keyframes floatUp {
            0% { transform: translateY(100vh) scale(0); opacity: 0; }
            20% { opacity: 1; }
            80% { opacity: 1; }
            100% { transform: translateY(-100px) scale(1.5); opacity: 0; }
        }

        .logo-rings {
            position: relative;
            width: 200px;
            height: 200px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .ring {
            position: absolute;
            border: 2px solid #ff0033;
            border-radius: 50%;
            animation: ringPulse 2s infinite;
        }
        .ring:nth-child(1) { width: 100px; height: 100px; animation-delay: 0s; }
        .ring:nth-child(2) { width: 140px; height: 140px; animation-delay: 0.3s; }
        .ring:nth-child(3) { width: 180px; height: 180px; animation-delay: 0.6s; }

        @keyframes ringPulse {
            0% { transform: scale(0.8); opacity: 1; border-color: #ff0033; }
            50% { transform: scale(1.2); opacity: 0.3; border-color: #cc0033; }
            100% { transform: scale(0.8); opacity: 1; border-color: #ff0033; }
        }

        .splash-logo {
            font-size: 4.5em;
            font-weight: 900;
            letter-spacing: 6px;
            background: linear-gradient(135deg, #ff0033 0%, #cc0033 50%, #ff0033 100%);
            background-size: 200% 200%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: logoShine 2s ease infinite, logoBounce 1s ease-out;
            position: relative;
            z-index: 2;
        }

        @keyframes logoShine {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        @keyframes logoBounce {
            0% { transform: scale(0) rotate(-180deg); opacity: 0; }
            60% { transform: scale(1.2) rotate(10deg); opacity: 1; }
            80% { transform: scale(0.9) rotate(-5deg); }
            100% { transform: scale(1) rotate(0deg); }
        }

        .splash-subtitle {
            color: #ff0033;
            font-size: 0.9em;
            letter-spacing: 8px;
            animation: subtitleReveal 1.5s ease-out 0.5s both;
            position: relative;
            z-index: 2;
        }

        @keyframes subtitleReveal {
            0% { opacity: 0; letter-spacing: 20px; }
            100% { opacity: 1; letter-spacing: 8px; }
        }

        .splash-line {
            width: 0;
            height: 3px;
            background: linear-gradient(90deg, transparent, #ff0033, #cc0033, #ff0033, transparent);
            animation: lineExpand 1s ease-out 0.8s both;
            border-radius: 2px;
        }

        @keyframes lineExpand {
            0% { width: 0; }
            100% { width: 200px; }
        }

        .loading-dots {
            display: flex;
            gap: 8px;
            margin-top: 20px;
            position: relative;
            z-index: 2;
        }

        .loading-dot {
            width: 8px;
            height: 8px;
            background: #ff0033;
            border-radius: 50%;
            animation: dotBounce 1.4s infinite;
        }
        .loading-dot:nth-child(2) { animation-delay: 0.2s; }
        .loading-dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes dotBounce {
            0%, 80%, 100% { transform: scale(0); opacity: 0.3; }
            40% { transform: scale(1); opacity: 1; }
        }

        .auth-screen {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background: linear-gradient(180deg, #1a0000 0%, #000 100%);
            z-index: 999;
        }
        .auth-box { width: 100%; max-width: 350px; text-align: center; }
        .auth-logo { font-size: 3.5em; font-weight: 900; letter-spacing: 4px; background: linear-gradient(135deg, #ff0033, #cc0033); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; margin-bottom: 5px; }
        .auth-subtitle { color: #666; font-size: 0.75em; letter-spacing: 6px; margin-bottom: 35px; }
        .auth-input { width: 100%; background: #1a1a1a; border: 1px solid #2a2a2a; color: #fff; padding: 14px 16px; border-radius: 10px; font-size: 0.95em; margin-bottom: 12px; outline: none; }
        .auth-input:focus { border-color: #ff0033; }
        .auth-input::placeholder { color: #555; }
        .auth-btn { width: 100%; background: #ff0033; color: #fff; border: none; padding: 14px; border-radius: 10px; font-size: 1em; font-weight: 700; cursor: pointer; margin-top: 5px; }
        .auth-switch { color: #888; font-size: 0.85em; margin-top: 18px; }
        .auth-switch span { color: #ff0033; cursor: pointer; font-weight: 600; }
        .remember-row { display: flex; align-items: center; gap: 8px; color: #888; font-size: 0.8em; margin-bottom: 12px; cursor: pointer; }
        .remember-row input { accent-color: #ff0033; }
        .saved-accounts { margin-top: 25px; padding-top: 20px; border-top: 1px solid #1a1a1a; text-align: left; }
        .saved-title { color: #555; font-size: 0.7em; margin-bottom: 12px; text-align: center; letter-spacing: 3px; }
        .saved-item { display: flex; align-items: center; padding: 14px 12px; background: #1a1a1a; border-radius: 14px; margin-bottom: 8px; cursor: pointer; gap: 12px; transition: all 0.2s; border: 1px solid transparent; }
        .saved-item:hover { background: #222; border-color: #ff0033; }
        .saved-avatar { width: 44px; height: 44px; border-radius: 50%; background: linear-gradient(135deg, #ff0033, #cc0033); display: flex; align-items: center; justify-content: center; font-size: 1.2em; overflow: hidden; flex-shrink: 0; border: 2px solid #2a2a2a; }
        .saved-avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
        .saved-info { flex: 1; min-width: 0; }
        .saved-name { font-weight: 600; font-size: 0.95em; color: #fff; }
        .saved-email { font-size: 0.75em; color: #888; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .saved-remove { background: none; border: none; color: #555; cursor: pointer; font-size: 0.9em; padding: 8px 10px; border-radius: 8px; }
        .saved-remove:hover { color: #ff0033; background: rgba(255,0,51,0.1); }
        .error-msg { color: #ff4757; font-size: 0.8em; margin-bottom: 10px; display: none; }
        .success-msg { color: #ff0033; font-size: 0.8em; margin-bottom: 10px; display: none; }

        .main-screen {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: #000;
            z-index: 100;
        }
        .main-screen.active { display: block; }

        .tiktok-container {
            position: relative;
            width: 100%;
            height: 100vh;
            overflow: hidden;
            background: #000;
        }

        .tiktok-wrapper {
            position: relative;
            width: 100%;
            height: 100%;
            overflow-y: scroll;
            scroll-snap-type: y mandatory;
            -webkit-overflow-scrolling: touch;
            scroll-behavior: smooth;
        }

        .tiktok-wrapper::-webkit-scrollbar { display: none; }

        .tiktok-item {
            position: relative;
            width: 100%;
            height: 100vh;
            scroll-snap-align: start;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
            overflow: hidden;
        }

        .tiktok-item .video-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            position: relative;
        }

        .tiktok-item .video-wrapper video {
            max-width: 100%;
            max-height: 100%;
            width: auto;
            height: auto;
            object-fit: contain;
            background: #000;
            display: block;
        }

        .tiktok-item .video-wrapper img {
            max-width: 100%;
            max-height: 100%;
            width: auto;
            height: auto;
            object-fit: contain;
            background: #000;
            display: block;
        }

        .tiktok-item .video-placeholder {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0a0a0a;
            font-size: 3em;
            color: #ff0033;
        }

        .tiktok-overlay {
            position: absolute;
            bottom: 100px;
            left: 0;
            right: 0;
            padding: 0 15px;
            background: linear-gradient(transparent, rgba(0,0,0,0.7) 60%);
            pointer-events: none;
        }

        .tiktok-overlay .user-info {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
            pointer-events: auto;
        }

        .tiktok-overlay .user-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: linear-gradient(135deg, #ff0033, #cc0033);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1em;
            overflow: hidden;
            border: 2px solid rgba(255,255,255,0.3);
            cursor: pointer;
        }

        .tiktok-overlay .user-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .tiktok-overlay .user-name { font-weight: 700; font-size: 0.95em; color: #fff; cursor: pointer; }
        .tiktok-overlay .user-name span { color: rgba(255,255,255,0.6); font-weight: 400; font-size: 0.8em; }
        .tiktok-overlay .post-caption { font-size: 0.85em; opacity: 0.9; margin-bottom: 4px; pointer-events: none; color: #fff; }

        .tiktok-actions {
            position: absolute;
            right: 12px;
            bottom: 150px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 18px;
            pointer-events: none;
        }

        .tiktok-actions button {
            pointer-events: auto;
            background: none;
            border: none;
            color: #fff;
            font-size: 1.8em;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.8);
            transition: transform 0.2s;
        }

        .tiktok-actions button:active { transform: scale(0.8); }
        .tiktok-actions button .count { font-size: 0.35em; font-weight: 600; }
        .tiktok-actions .liked { color: #ff0033; }

        .tiktok-subscribe-btn {
            pointer-events: auto;
            background: #ff0033;
            color: #fff;
            border: none;
            padding: 4px 14px;
            border-radius: 6px;
            font-size: 0.7em;
            font-weight: 700;
            cursor: pointer;
            margin-left: 8px;
        }

        .tiktok-subscribe-btn.subscribed {
            background: rgba(255,255,255,0.15);
            color: #fff;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .video-progress {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: rgba(255,255,255,0.2);
            z-index: 5;
        }

        .video-progress .progress-bar {
            height: 100%;
            background: #ff0033;
            width: 0%;
            transition: width 0.1s linear;
        }

        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0,0,0,0.9);
            border-top: 1px solid rgba(255,255,255,0.05);
            display: flex;
            z-index: 200;
            padding: 6px 0 12px;
        }

        .nav-item {
            flex: 1;
            text-align: center;
            cursor: pointer;
            color: #666;
            font-size: 0.6em;
            padding: 5px;
            transition: color 0.2s;
        }
        .nav-item.active { color: #ff0033; }
        .nav-icon { font-size: 1.6em; display: block; margin-bottom: 2px; }

        .search-page {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: #000;
            z-index: 150;
            padding-top: 0;
        }
        .search-page.active { display: block; }

        .search-header {
            display: flex;
            align-items: center;
            padding: 10px 15px;
            background: #000;
            border-bottom: 1px solid #1a1a1a;
            gap: 10px;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .search-back-btn {
            background: none;
            border: none;
            color: #fff;
            font-size: 1.1em;
            cursor: pointer;
            padding: 6px 10px;
            border-radius: 8px;
            white-space: nowrap;
        }

        .search-back-btn:hover {
            background: rgba(255,255,255,0.1);
        }

        .search-title {
            color: #fff;
            font-weight: 700;
            font-size: 0.9em;
            margin-right: 5px;
        }

        .search-header input {
            flex: 1;
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            color: #fff;
            padding: 10px 14px;
            border-radius: 12px;
            font-size: 0.9em;
            outline: none;
            min-width: 0;
        }

        .search-header input:focus { border-color: #ff0033; }
        .search-results { padding: 15px; overflow-y: auto; height: calc(100vh - 60px); }
        .search-user-item { display: flex; align-items: center; padding: 12px 10px; gap: 12px; border-bottom: 1px solid #111; cursor: pointer; }
        .search-user-avatar { width: 44px; height: 44px; border-radius: 50%; background: linear-gradient(135deg, #ff0033, #cc0033); display: flex; align-items: center; justify-content: center; font-size: 1.2em; overflow: hidden; flex-shrink: 0; }
        .search-user-avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
        .search-user-info { flex: 1; }
        .search-user-name { font-weight: 600; font-size: 0.9em; color: #fff; }
        .search-user-email { font-size: 0.7em; color: #888; }

        .profile-page {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: #000;
            z-index: 150;
            overflow-y: auto;
            padding-top: 0;
        }
        .profile-page.active { display: block; }

        .profile-header-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 15px;
            background: #000;
            position: sticky;
            top: 0;
            z-index: 10;
            border-bottom: 1px solid #1a1a1a;
        }

        .profile-back-btn {
            background: none;
            border: none;
            color: #fff;
            font-size: 1em;
            cursor: pointer;
            padding: 6px 10px;
            border-radius: 8px;
            white-space: nowrap;
        }

        .profile-back-btn:hover {
            background: rgba(255,255,255,0.1);
        }

        .profile-title {
            font-weight: 700;
            font-size: 0.9em;
            color: #fff;
        }

        .profile-settings-btn {
            background: none;
            border: none;
            color: #fff;
            font-size: 1.5em;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 8px;
            letter-spacing: 2px;
        }

        .profile-settings-btn:hover {
            background: rgba(255,255,255,0.1);
        }

        .profile-header {
            text-align: center;
            padding: 20px 20px 15px;
        }

        .profile-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: linear-gradient(135deg, #ff0033, #cc0033);
            margin: 0 auto 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2em;
            border: 3px solid #ff0033;
            box-shadow: 0 0 30px rgba(255,0,51,0.3);
            overflow: hidden;
            cursor: pointer;
        }

        .profile-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .profile-name { font-size: 1.2em; font-weight: 700; color: #fff; }
        .profile-email { color: #888; font-size: 0.8em; margin-bottom: 10px; }

        .profile-stats {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin: 15px 0;
        }

        .profile-stat { text-align: center; }
        .profile-stat-num { font-size: 1.2em; font-weight: 700; color: #fff; }
        .profile-stat-label { font-size: 0.65em; color: #888; }

        .profile-logout-btn {
            background: #1a1a1a;
            color: #fff;
            border: 1px solid #333;
            padding: 8px 24px;
            border-radius: 8px;
            font-size: 0.85em;
            cursor: pointer;
            margin-top: 5px;
            transition: all 0.2s;
        }

        .profile-logout-btn:hover {
            background: #2a2a2a;
        }

        .profile-posts-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 2px;
            padding: 2px;
        }

        .profile-post-thumb {
            aspect-ratio: 1;
            overflow: hidden;
            position: relative;
            cursor: pointer;
            background: #0a0a0a;
        }

        .profile-post-thumb img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .profile-post-thumb .video-badge {
            position: absolute;
            top: 6px;

    <script>
        // Генерация частиц
        (function() {
            var container = document.getElementById('particles');
            for (var i = 0; i < 30; i++) {
                var p = document.createElement('div');
                p.className = 'particle';

            }
        })();

        // Переводы
        var translations = {
            ru: {
                login: 'Войти', register: 'Зарегистрироваться', email: 'Почта',
                nickname: 'Никнейм', password: 'Пароль', remember: 'Запомнить меня',
                createAccount: 'Создать аккаунт', feed: 'Лента', search: 'Поиск',
                profile: 'Профиль', settings: 'Настройки', theme: 'Тема',
                dark: 'Тёмная', light: 'Светлая', language: 'Язык',
                version: 'Версия', account: 'Аккаунт', comments: 'Комментарии',
                write: 'Написать...', noComments: 'Нет комментариев',
                noPosts: 'Пока нет постов', noFollowing: 'Нет постов от подписок',
                logout: 'Выйти', subscribe: 'Подписаться', subscribed: 'Подписан',
                unfollow: 'Отписаться', searchPlaceholder: 'Найти людей...',
                nothingFound: 'Ничего не найдено', quickLogin: 'Быстрый вход',
                confirmLogout: 'Выйти?', back: 'Назад', posts: 'Постов',
                followers: 'Подписчиков', following: 'Подписок', delete: 'Удалить?'
            },
            en: {
                login: 'Login', register: 'Sign Up', email: 'Email',
                nickname: 'Username', password: 'Password', remember: 'Remember me',
                createAccount: 'Create Account', feed: 'Feed', search: 'Search',
                profile: 'Profile', settings: 'Settings', theme: 'Theme',
                dark: 'Dark', light: 'Light', language: 'Language',
                version: 'Version', account: 'Account', comments: 'Comments',
                write: 'Write...', noComments: 'No comments',
                noPosts: 'No posts yet', noFollowing: 'No posts from subscriptions',
                logout: 'Logout', subscribe: 'Subscribe', subscribed: 'Subscribed',
                unfollow: 'Unfollow', searchPlaceholder: 'Search people...',
                nothingFound: 'Nothing found', quickLogin: 'Quick Login',
                confirmLogout: 'Logout?', back: 'Back', posts: 'Posts',
                followers: 'Followers', following: 'Following', delete: 'Delete?'
            }
        };

        var currentLang = localStorage.getItem('lifetok_lang') || 'ru';
        var currentTheme = localStorage.getItem('lifetok_theme') || 'dark';

        function t(key) {
            return translations[currentLang] && translations[currentLang][key] ? translations[currentLang][key] : key;
        }

        if (currentTheme === 'light') {
            document.body.classList.add('light-theme');
        }

        // ============ ОСНОВНАЯ ЛОГИКА ============
        (function() {
            var DB_NAME = 'LIFETOK_MediaDB', DB_VERSION = 1, MEDIA_STORE = 'media', db = null;
            
            function openDB() {
                return new Promise(function(resolve, reject) {
                    var r = indexedDB.open(DB_NAME, DB_VERSION);
                    r.onupgradeneeded = function(e) {
                        var d = e.target.result;
                        if (!d.objectStoreNames.contains(MEDIA_STORE)) {
                            d.createObjectStore(MEDIA_STORE, { keyPath: 'id' });
                        }
                    };
                    r.onsuccess = function(e) { db = e.target.result; resolve(db); };
                    r.onerror = function(e) { reject(e.target.error); };
                });
            }

            function saveMedia(id, blob) {
                return new Promise(function(resolve, reject) {
                    var tx = db.transaction(MEDIA_STORE, 'readwrite');
                    tx.objectStore(MEDIA_STORE).put({ id: id, blob: blob });
                    tx.oncomplete = resolve;
                    tx.onerror = reject;
                });
            }

            function getMedia(id) {
                return new Promise(function(resolve) {
                    if (!db) { resolve(null); return; }
                    var tx = db.transaction(MEDIA_STORE, 'readonly');
                    var req = tx.objectStore(MEDIA_STORE).get(id);
                    req.onsuccess = function() { resolve(req.result ? req.result.blob : null); };
                    req.onerror = function() { resolve(null); };
                });
            }

            function deleteMedia(id) {
                return new Promise(function(resolve) {
                    if (!db) { resolve(); return; }
                    var tx = db.transaction(MEDIA_STORE, 'readwrite');
                    tx.objectStore(MEDIA_STORE).delete(id);
                    tx.oncomplete = resolve;
                });
            }

            function generateVideoThumbnail(videoBlob) {
                return new Promise(function(resolve) {
                    var video = document.createElement('video');
                    var canvas = document.createElement('canvas');
                    var ctx = canvas.getContext('2d');
                    video.preload = 'metadata';
                    video.muted = true;
                    video.playsInline = true;
                    var url = URL.createObjectURL(videoBlob);
                    video.src = url;
                    var resolved = false;
                    
                    function done(blob) {
                        if (!resolved) {
                            resolved = true;
                            URL.revokeObjectURL(url);
                            resolve(blob);
                        }
                    }
                    
                    video.onloadedmetadata = function() {
                        video.currentTime = Math.min(video.duration * 0.3, 0.5);
                    };
                    
                    video.onseeked = function() {
                        try {
                            var w = Math.min(video.videoWidth || 480, 1280);
                            var h = Math.min(video.videoHeight || 360, 720);
                            canvas.width = w;
                            canvas.height = h;
                            ctx.drawImage(video, 0, 0, w, h);
                            canvas.toBlob(function(blob) { done(blob); }, 'image/jpeg', 0.8);
                        } catch(e) { done(null); }
                    };
                    
                    video.onerror = function() { 
                        try {
                            canvas.width = 480;
                            canvas.height = 480;
                            ctx.fillStyle = '#0a0a0a';
                            ctx.fillRect(0, 0, 480, 480);
                            ctx.fillStyle = '#ff0033';
                            ctx.font = '80px Arial';
                            ctx.textAlign = 'center';
                            ctx.textBaseline = 'middle';
                            ctx.fillText('🎬', 240, 240);
                            canvas.toBlob(function(blob) { done(blob); }, 'image/jpeg', 0.7);
                        } catch(e2) { done(null); }
                    };
                    
                    setTimeout(function() { 
                        if (!resolved) {
                            try {
                                canvas.width = 480;
                                canvas.height = 480;
                                ctx.fillStyle = '#0a0a0a';
                                ctx.fillRect(0, 0, 480, 480);
                                ctx.fillStyle = '#ff0033';
                                ctx.font = '80px Arial';
                                ctx.textAlign = 'center';
                                ctx.textBaseline = 'middle';
                                ctx.fillText('🎬', 240, 240);
                                canvas.toBlob(function(blob) { done(blob); }, 'image/jpeg', 0.7);
                            } catch(e) { done(null); }
                        }
                    }, 3000);
                });
            }

            var DATA_STORAGE = 'lifetok_data', SAVED_ACCOUNTS_KEY = 'lifetok_saved', CURRENT_USER_KEY = 'lifetok_user';
            var data = JSON.parse(localStorage.getItem(DATA_STORAGE) || JSON.stringify({ users: {}, posts: [], comments: {} }));
            var savedAccounts = JSON.parse(localStorage.getItem(SAVED_ACCOUNTS_KEY) || '[]');
            var currentUser = null;
            var currentFeed = 'all';
            var currentVideoIndex = 0;
            var videoElements = [];
            var videoUrlCache = {};

            function saveData() {
                try { localStorage.setItem(DATA_STORAGE, JSON.stringify(data)); }
                catch(e) {
                    if (data.posts.length > 30) {
                        var old = data.posts.splice(30);
                        old.forEach(function(p) { delete data.comments[p.id]; });
                        localStorage.setItem(DATA_STORAGE, JSON.stringify(data));
                    }
                }
            }

            function saveAccounts() { localStorage.setItem(SAVED_ACCOUNTS_KEY, JSON.stringify(savedAccounts)); }

            function saveCurrentAccount(email, remember) {
                if (remember) {
                    var ex = savedAccounts.find(function(a) { return a.email === email; });
                    if (!ex) savedAccounts.push({ email: email, nickname: data.users[email].nickname, avatar: data.users[email].avatar });
                    else { ex.nickname = data.users[email].nickname; ex.avatar = data.users[email].avatar; }
                    saveAccounts();
                    localStorage.setItem(CURRENT_USER_KEY, JSON.stringify({ email: email, timestamp: Date.now() }));
                } else {
                    savedAccounts = savedAccounts.filter(function(a) { return a.email !== email; });
                    saveAccounts();
                    localStorage.removeItem(CURRENT_USER_KEY);
                }
            }

            function renderSavedAccounts() {
                var c = document.getElementById('savedAccounts'), l = document.getElementById('savedAccountsList');
                if (!savedAccounts.length) { c.style.display = 'none'; return; }
                c.style.display = 'block';
                l.innerHTML = savedAccounts.map(function(a) {
                    return '<div class="saved-item" data-email="'+a.email+'">'+
                        '<div class="saved-avatar">'+(a.avatar?'<img src="'+a.avatar+'">':'👤')+'</div>'+
                        '<div class="saved-info"><div class="saved-name">'+a.nickname+'</div><div class="saved-email">'+a.email+'</div></div>'+
                        '<button class="saved-remove" data-remove="'+a.email+'">✕</button>'+
                    '</div>';
                }).join('');
                l.querySelectorAll('.saved-item').forEach(function(i) {
                    i.addEventListener('click', function(e) {
                        if (e.target.classList.contains('saved-remove')) return;
                        var email = this.dataset.email;
                        if (data.users[email]) {
                            currentUser = email;
                            document.getElementById('rememberMe').checked = true;
                            saveCurrentAccount(email, true);
                            document.getElementById('authSuccess').textContent = 'Вход...';
                            document.getElementById('authSuccess').style.display = 'block';
                            setTimeout(enterApp, 400);
                        }
                    });
                });
                l.querySelectorAll('.saved-remove').forEach(function(b) {
                    b.addEventListener('click', function(e) {
                        e.stopPropagation();
                        if (confirm('Удалить?')) {
                            savedAccounts = savedAccounts.filter(function(a) { return a.email !== b.dataset.remove; });
                            saveAccounts();
                            renderSavedAccounts();
                        }
                    });
                });
            }

            function tryAutoLogin() {
                var s = JSON.parse(localStorage.getItem(CURRENT_USER_KEY) || 'null');
                if (s && s.email && data.users[s.email]) {
                    currentUser = s.email;
                    enterApp();
                    return true;
                }
                return false;
            }

            // Авторизация
            var splash = document.getElementById('splashScreen');
            openDB().then(function() {
                setTimeout(function() {
                    splash.style.display = 'none';
                    if (!tryAutoLogin()) {
                        document.getElementById('authScreen').style.display = 'flex';
                        renderSavedAccounts();
                    }
                }, 2500);
            }).catch(function() {
                setTimeout(function() {
                    splash.style.display = 'none';
                    document.getElementById('authScreen').style.display = 'flex';
                    renderSavedAccounts();
                }, 2500);
            });

            document.getElementById('authSwitch').addEventListener('click', function() {
                var b = document.getElementById('authBtn');
                var isLogin = b.textContent === 'Войти' || b.textContent === 'Login';
                b.textContent = isLogin ? 'Зарегистрироваться' : 'Войти';
                document.getElementById('authError').style.display = 'none';
                document.getElementById('authSuccess').style.display = 'none';
                document.getElementById('authNickname').style.display = 'block';
            });

            document.getElementById('authBtn').addEventListener('click', function() {
                var email = document.getElementById('authEmail').value.trim();
                var nickname = document.getElementById('authNickname').value.trim();
                var password = document.getElementById('authPassword').value.trim();
                var err = document.getElementById('authError'), suc = document.getElementById('authSuccess');
                err.style.display = 'none';
                suc.style.display = 'none';
                if (!email || !password) {
                    err.textContent = 'Заполните почту и пароль';
                    err.style.display = 'block';
                    return;
                }
                var isLogin = document.getElementById('authBtn').textContent === 'Войти' || document.getElementById('authBtn').textContent === 'Login';
                if (isLogin) {
                    var user = data.users[email];
                    if (!user || user.password !== password) {
                        err.textContent = 'Неверная почта или пароль';
                        err.style.display = 'block';
                        return;
                    }
                    currentUser = email;

            // Новая функция для загрузки видео с повторными попытками
            function loadVideoWithRetry(video, mediaId, maxRetries) {
                maxRetries = maxRetries || 3;
                var attempts = 0;
                
                function tryLoad() {
                    attempts++;
                    getMedia(mediaId).then(function(blob) {
                        if (blob) {
                            var url = URL.createObjectURL(blob);
                            videoUrlCache[mediaId] = url;
                            video.src = url;
                            video.load();
                            
                            // Автоматически запускаем видео после загрузки
                            video.oncanplay = function() {
                                if (video.paused) {
                                    video.play().catch(function() {});
                                }
                            };
                            
                            // Если видео уже загружено, запускаем
                            if (video.readyState >= 2) {
                                video.play().catch(function() {});
                            }
                        } else if (attempts < maxRetries) {
                            setTimeout(tryLoad, 500);
                        } else {
                            showPlaceholder(video);
                        }
                    }).catch(function() {
                        if (attempts < maxRetries) {
                            setTimeout(tryLoad, 500);
                        } else {
                            showPlaceholder(video);
                        }
                    });
                }
                
                function showPlaceholder(video) {
                    var wrapper = video.closest('.video-wrapper');
                    if (wrapper) {
                        wrapper.innerHTML = '<div class="video-placeholder">🎬</div>';
                    }
                }
                
                tryLoad();
            }

                    return;
                }
                posts.sort(function(a,b) { return new Date(b.timestamp) - new Date(a.timestamp); });

                var html = posts.map(function(post, index) {
                    var author = data.users[post.author];
                    if (!author) return '';
                    var isLiked = (post.likes || []).includes(currentUser);

                    }

                    return '<div class="tiktok-item" data-index="'+index+'" data-postid="'+post.id+'">'+

                                '💬<span class="count">'+comments.length+'</span>'+
                            '</button>'+
                        '</div>'+
                    '</div>';
                }).join('');
                container.innerHTML = html;

                // Загружаем видео из IndexedDB
                setTimeout(function() {
                    videoElements = [];
                    var videos = container.querySelectorAll('video');
                    videos.forEach(function(video) {
                        var mediaId = video.dataset.mediaid;
                        if (mediaId) {
                            loadVideoWithRetry(video, mediaId, 3);
                        }
                        videoElements.push(video);
                    });

                    if (videoElements.length > 0) {
                        setTimeout(function() {
                            setupTikTokScroll();
                            playVideoAtIndex(0);
                        }, 500);
                    }
                }, 300);
            }

            function setupTikTokScroll() {
                var wrapper = document.getElementById('tiktokWrapper');
                var isScrolling = false;

                wrapper.addEventListener('scroll', function() {
                    if (isScrolling) return;
                    isScrolling = true;
                    requestAnimationFrame(function() {
                        var items = wrapper.querySelectorAll('.tiktok-item');
                        var viewportHeight = window.innerHeight;

                        var activeIndex = -1;
                        items.forEach(function(item, index) {
                            var rect = item.getBoundingClientRect();
                            var center = rect.top + rect.height / 2;
                            if (center > 0 && center < viewportHeight) {
                                activeIndex = index;
                            }
                        });

                        if (activeIndex >= 0 && activeIndex !== currentVideoIndex) {
                            if (currentVideoIndex >= 0 && currentVideoIndex < videoElements.length) {
                                var oldVideo = videoElements[currentVideoIndex];
                                if (oldVideo) oldVideo.pause();
                            }
                            currentVideoIndex = activeIndex;
                            playVideoAtIndex(activeIndex);
                        }
                        isScrolling = false;
                    });
                }, { passive: true });

                document.addEventListener('click', function(e) {
                    var video = e.target.closest('video');
                    if (video) {
                        if (video.paused) {
                            video.play();
                        } else {
                            video.pause();
                        }
                    }
                });
            }

            function playVideoAtIndex(index) {
                if (index < 0 || index >= videoElements.length) return;
                var video = videoElements[index];
                if (!video) return;

                videoElements.forEach(function(v) {
                    if (v !== video) v.pause();
                });

                // Проверяем, загружено ли видео
                if (video.readyState < 2) {
                    video.addEventListener('canplay', function onCanPlay() {
                        video.removeEventListener('canplay', onCanPlay);
                        video.currentTime = 0;
                        video.play().catch(function() {});
                    });
                } else {
                    video.currentTime = 0;
                    video.play().catch(function() {});
                }

                var postId = video.dataset.postid;
                video.ontimeupdate = function() {
                    var progress = document.getElementById('progress_' + postId);
                    if (progress && video.duration) {
                        var pct = (video.currentTime / video.duration) * 100;
                        progress.style.width = pct + '%';
                    }
                };
            }

                var content = '';
                if (post.type === 'image') {
                    content = '<img src="'+(post.mediaUrl||'')+'" style="max-width:100%;max-height:80vh;object-fit:contain;">';
                } else if (post.type === 'video') {
                    content = '<video controls style="max-width:100%;max-height:80vh;" poster="'+(post.thumbnail||'')+'"></video>';
                }
                modal.innerHTML = '<div class="modal-header"><button onclick="this.closest(\'.modal-overlay\').remove()">✕</button><span>'+author.nickname+'</span></div>'+
                    '<div style="display:flex;align-items:center;justify-content:center;flex:1;padding:10px;">'+content+'</div>';
                document.body.appendChild(modal);
                
                if (post.type === 'video') {
                    var videoEl = modal.querySelector('video');
                    if (videoEl) {
                        getMedia(post.mediaId).then(function(blob) {
                            if (blob) {
                                var url = URL.createObjectURL(blob);
                                videoEl.src = url;
                                videoEl.load();
                            }
                        });
                    }
                }
            }

            function setupNavigation() {
                document.querySelectorAll('.nav-item').forEach(function(n) {
                    n.addEventListener('click', function() {
                        document.querySelectorAll('.nav-item').forEach(function(n2) { n2.classList.remove('active'); });
                        this.classList.add('active');
                        var page = this.dataset.page;

                        document.getElementById('searchPage').classList.remove('active');
                        document.getElementById('profilePage').classList.remove('active');
                        document.getElementById('tiktokContainer').style.display = 'none';

                        if (page === 'feed') {
                            document.getElementById('tiktokContainer').style.display = 'block';
                            if (currentFeed !== 'all') {
                                currentFeed = 'all';
                                renderTikTokFeed();
                            }
                        } else if (page === 'search') {
                            document.getElementById('searchPage').classList.add('active');
                            document.getElementById('searchInput').focus();
                        } else if (page === 'profile') {
                            document.getElementById('profilePage').classList.add('active');
                            renderProfile();
                        }
                    });
                });
            }

            function setupSearch() {
                var input = document.getElementById('searchInput');
                input.addEventListener('input', function() {
                    var query = this.value.trim().toLowerCase();
                    var results = document.getElementById('searchResults');
                    if (!query) { results.innerHTML = ''; return; }
                    var users = Object.values(data.users).filter(function(u) {
                        return u.email !== currentUser && (u.nickname.toLowerCase().includes(query) || u.email.toLowerCase().includes(query));
                    });
                    if (users.length === 0) {
                        results.innerHTML = '<div style="text-align:center;color:#444;padding:20px;">'+t('nothingFound')+'</div>';
                        return;
                    }
                    results.innerHTML = users.map(function(u) {
                        return '<div class="search-user-item" onclick="showUserProfile(\''+u.email+'\')">'+
                            '<div class="search-user-avatar">'+(u.avatar?'<img src="'+u.avatar+'">':'👤')+'</div>'+
                            '<div class="search-user-info"><div class="search-user-name">'+u.nickname+'</div><div class="search-user-email">'+u.email+'</div></div>'+
                        '</div>';
                    }).join('');
                });
            }

            function setupCreateButtons() {
                document.getElementById('createBtn').addEventListener('click', function() {
                    document.getElementById('createMenu').classList.toggle('hidden');
                });
                document.getElementById('createPhotoBtn').addEventListener('click', function() {
                    document.getElementById('photoInput').click();
                });
                document.getElementById('createVideoBtn').addEventListener('click', function() {
                    document.getElementById('videoInput').click();
                });

                document.getElementById('photoInput').addEventListener('change', function(e) {
                    if (e.target.files && e.target.files[0]) {
                        var file = e.target.files[0];
                        var reader = new FileReader();
                        reader.onload = function(ev) {
                            var dataUrl = ev.target.result;
                            createPost('image', dataUrl, null);
                            document.getElementById('createMenu').classList.add('hidden');
                            document.getElementById('photoInput').value = '';
                        };
                        reader.readAsDataURL(file);
                    }
                });

                document.getElementById('videoInput').addEventListener('change', function(e) {
                    if (e.target.files && e.target.files[0]) {
                        var file = e.target.files[0];
                        var reader = new FileReader();
                        reader.onload = function(ev) {
                            var dataUrl = ev.target.result;
                            createPost('video', dataUrl, file);
                            document.getElementById('createMenu').classList.add('hidden');
                            document.getElementById('videoInput').value = '';
                        };
                        reader.readAsDataURL(file);
                    }
                });
            }

            // Глобальные функции
            window.toggleSubscribe = toggleSubscribe;
            window.likePostTikTok = likePostTikTok;
            window.showCommentsTikTok = showCommentsTikTok;
            window.addCommentTikTok = addCommentTikTok;
            window.deleteComment = deleteComment;
            window.deletePost = deletePost;
            window.showUserProfile = showUserProfile;
            window.viewPost = viewPost;
            window.renderTikTokFeed = renderTikTokFeed;
            window.renderProfile = renderProfile;
            window.openSettings = function() {};
            window.goBackFromSearch = goBackFromSearch;
            window.goBackFromProfile = goBackFromProfile;

        })();
    </script>
</body>
</html>
