<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>LifeTok</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #000; color: #fff; min-height: 100vh; -webkit-tap-highlight-color: transparent; overflow-x: hidden; }
        :root { --accent: #39ff14; --accent2: #00cc00; }
        body.theme-lime { --accent: #39ff14; --accent2: #00cc00; }
        body.theme-pink { --accent: #ff2d55; --accent2: #ff6b6b; }
        body.theme-red { --accent: #ff4757; --accent2: #ff6b81; }

        .splash-screen { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: #000; flex-direction: column; gap: 15px; }
        .splash-logo { font-size: 4em; font-weight: 900; background: linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: glow 2s infinite; }
        @keyframes glow { 0%,100%{filter:brightness(1)}50%{filter:brightness(2)} }
        .splash-subtitle { color: #555; font-size: 0.9em; letter-spacing: 8px; }

        .auth-screen { min-height: 100vh; display: none; align-items: center; justify-content: center; padding: 20px; background: linear-gradient(180deg, #0a1a0a 0%, #000 100%); }
        .auth-box { width: 100%; max-width: 350px; text-align: center; }
        .auth-logo { font-size: 3em; font-weight: 900; background: linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 15px; }
        .auth-input { width: 100%; background: #111; border: 1px solid #222; color: #fff; padding: 12px 14px; border-radius: 8px; font-size: 0.9em; margin-bottom: 8px; outline: none; }
        .auth-input:focus { border-color: var(--accent); }
        .auth-btn { width: 100%; background: var(--accent); color: #000; border: none; padding: 12px; border-radius: 8px; font-size: 0.95em; font-weight: 700; cursor: pointer; margin-top: 5px; }
        .auth-switch { color: #888; font-size: 0.8em; margin-top: 12px; }
        .auth-switch span { color: var(--accent); cursor: pointer; font-weight: 600; }
        .error-msg { color: #ff4757; font-size: 0.75em; margin-bottom: 8px; display: none; }
        .remember-row { display: flex; align-items: center; gap: 6px; color: #888; font-size: 0.75em; margin: 8px 0; }
        .remember-row input { accent-color: var(--accent); width: 16px; height: 16px; }

        .main-screen { display: none; }
        .main-screen.active { display: block; }
        .feed-container { height: calc(100vh - 90px); overflow-y: scroll; scroll-snap-type: y mandatory; -webkit-overflow-scrolling: touch; padding-bottom: 65px; }
        .post-card { height: calc(100vh - 90px); scroll-snap-align: start; position: relative; background: #000; display: flex; align-items: center; justify-content: center; }
        .post-media { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; background: #000; }
        .post-media img { width: 100%; height: 100%; object-fit: contain; }
        .post-media video { width: 100%; height: 100%; object-fit: contain; background: #000; }
        .post-right-panel { position: absolute; right: 8px; bottom: 75px; display: flex; flex-direction: column; align-items: center; gap: 10px; z-index: 10; }
        .post-avatar-right { width: 45px; height: 45px; border-radius: 50%; border: 2px solid #fff; overflow: hidden; cursor: pointer; background: linear-gradient(135deg, var(--accent), var(--accent2)); display: flex; align-items: center; justify-content: center; font-size: 1.3em; }
        .post-avatar-right img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
        .post-actions-right { display: flex; flex-direction: column; align-items: center; gap: 15px; }
        .action-btn { display: flex; flex-direction: column; align-items: center; gap: 2px; cursor: pointer; background: none; border: none; color: #fff; transition: transform 0.1s; }
        .action-btn:active { transform: scale(0.8); }
        .action-icon { width: 40px; height: 40px; border-radius: 50%; background: rgba(0,0,0,0.35); display: flex; align-items: center; justify-content: center; font-size: 1.3em; transition: all 0.1s; }
        .action-btn.liked .action-icon { background: #ff2d55; animation: heartPop 0.3s ease; }
        @keyframes heartPop { 0%{transform:scale(1)}50%{transform:scale(1.4)}100%{transform:scale(1)} }
        .action-label { font-size: 0.6em; font-weight: 700; text-shadow: 0 1px 3px rgba(0,0,0,0.9); }
        .post-bottom-info { position: absolute; bottom: 8px; left: 8px; right: 75px; z-index: 10; background: rgba(0,0,0,0.5); backdrop-filter: blur(3px); border-radius: 8px; padding: 6px 8px; }
        .post-nickname-bottom { font-weight: 700; font-size: 0.9em; color: #fff; cursor: pointer; margin-bottom: 2px; }
        .post-caption-bottom { font-size: 0.75em; color: #eee; margin-bottom: 2px; line-height: 1.3; }
        .post-date-bottom { font-size: 0.6em; color: rgba(255,255,255,0.7); }

        .tabs { position: sticky; top: 0; z-index: 50; background: #000; display: flex; justify-content: center; gap: 6px; padding: 6px; border-bottom: 1px solid #1a1a1a; }
        .tab { padding: 5px 14px; border-radius: 18px; font-size: 0.7em; cursor: pointer; background: #111; color: #888; border: none; font-weight: 600; }
        .tab.active { background: var(--accent); color: #000; }

        .comments-overlay { position: fixed; bottom: 0; left: 0; right: 0; top: 0; background: rgba(0,0,0,0.97); z-index: 300; display: flex; flex-direction: column; animation: slideUp 0.3s ease; }
        @keyframes slideUp { from{transform:translateY(100%)}to{transform:translateY(0)} }
        .comments-header { display: flex; align-items: center; padding: 12px; border-bottom: 1px solid #1a1a1a; gap: 12px; }
        .comments-header button { background: none; border: none; color: #fff; font-size: 1.1em; cursor: pointer; }
        .comments-list { flex: 1; overflow-y: auto; padding: 12px; }
        .comment { display: flex; gap: 8px; margin-bottom: 12px; }
        .comment.reply { margin-left: 38px; border-left: 2px solid var(--accent); padding-left: 8px; }
        .comment-avatar { width: 28px; height: 28px; border-radius: 50%; background: linear-gradient(135deg, var(--accent), var(--accent2)); display: flex; align-items: center; justify-content: center; font-size: 0.8em; flex-shrink: 0; overflow: hidden; cursor: pointer; }
        .comment-avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
        .comment-body { flex: 1; }
        .comment-user { font-weight: 600; font-size: 0.75em; }
        .comment-text { font-size: 0.8em; color: #ddd; margin-top: 2px; }
        .comment-image-wrapper { margin-top: 4px; display: inline-block; }
        .comment-image { max-width: 180px; max-height: 180px; border-radius: 6px; cursor: pointer; display: block; }
        .comment-image-caption { font-size: 0.7em; color: #aaa; margin-top: 2px; }
        .comment-time { font-size: 0.65em; color: #666; margin-top: 2px; display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
        .comment-like-btn { background: none; border: none; color: #888; cursor: pointer; font-size: 0.7em; }
        .comment-like-btn.liked { color: #ff4757; }
        .comment-reply-btn { background: none; border: none; color: var(--accent); cursor: pointer; font-size: 0.7em; font-weight: 600; }
        .comment-delete-btn { background: none; border: none; color: #ff4757; cursor: pointer; font-size: 0.65em; }
        .comment-input-area { display: flex; padding: 8px 12px; border-top: 1px solid #1a1a1a; gap: 6px; align-items: center; flex-wrap: wrap; }
        .comment-input-area input { flex: 1; min-width: 120px; background: #111; border: none; color: #fff; padding: 8px 12px; border-radius: 18px; outline: none; font-size: 0.8em; }
        .comment-input-area button { background: var(--accent); color: #000; border: none; padding: 7px 14px; border-radius: 18px; font-weight: 700; cursor: pointer; font-size: 0.75em; white-space: nowrap; }
        .comment-image-btn { background: none; border: none; color: #888; cursor: pointer; font-size: 1.1em; padding: 4px; }

        .profile-page { padding: 20px 15px 55px; text-align: center; }
        .profile-avatar { width: 80px; height: 80px; border-radius: 50%; background: linear-gradient(135deg, var(--accent), var(--accent2)); margin: 0 auto 8px; display: flex; align-items: center; justify-content: center; font-size: 2em; border: 3px solid var(--accent); overflow: hidden; cursor: pointer; position: relative; }
        .profile-avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
        .profile-avatar::after { content: '📷'; position: absolute; bottom: 0; right: 0; background: var(--accent); border-radius: 50%; width: 24px; height: 24px; font-size: 0.45em; display: flex; align-items: center; justify-content: center; border: 2px solid #000; }
        .profile-nickname { font-size: 1.2em; font-weight: 700; }
        .profile-bio { color: #aaa; font-size: 0.75em; margin: 4px 0 10px; cursor: pointer; }
        .profile-stats { display: flex; justify-content: center; gap: 30px; margin: 12px 0; }
        .profile-stat { text-align: center; cursor: pointer; }
        .profile-stat-num { font-size: 1.2em; font-weight: 700; }
        .profile-stat-label { font-size: 0.6em; color: #888; }
        .profile-btn { background: #111; color: #fff; border: 1px solid #222; padding: 6px 20px; border-radius: 6px; font-size: 0.8em; cursor: pointer; margin: 3px; }
        .profile-posts-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; padding: 2px; margin-top: 12px; }
        .profile-post-thumb { aspect-ratio: 1; overflow: hidden; position: relative; cursor: pointer; background: #0a0a0a; }
        .profile-post-thumb img, .profile-post-thumb video { width: 100%; height: 100%; object-fit: cover; }
        .profile-post-thumb .video-icon { position: absolute; top: 4px; right: 4px; font-size: 0.8em; background: rgba(0,0,0,0.6); border-radius: 3px; padding: 1px 3px; }
        .profile-post-thumb .likes-count { position: absolute; bottom: 3px; left: 3px; font-size: 0.6em; background: rgba(0,0,0,0.6); padding: 1px 4px; border-radius: 3px; }

        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: #0a0a0a; border-top: 1px solid #1a1a1a; display: flex; align-items: center; z-index: 100; padding: 4px 0 12px; }
        .nav-item { flex: 1; text-align: center; cursor: pointer; color: #666; font-size: 0.55em; padding: 2px; }
        .nav-item.active { color: var(--accent); }
        .nav-icon { font-size: 1.6em; display: block; margin-bottom: 2px; }
        .nav-create { flex: 1; text-align: center; position: relative; top: -16px; }
        .nav-create-btn { width: 45px; height: 45px; border-radius: 50%; background: var(--accent); color: #000; border: none; font-size: 1.3em; cursor: pointer; }
        .create-menu { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); background: #111; border-radius: 12px; padding: 8px; z-index: 150; display: flex; gap: 10px; border: 1px solid #222; }
        .create-menu button { background: none; border: none; color: #fff; cursor: pointer; font-size: 1.4em; padding: 6px; border-radius: 8px; }
        .hidden { display: none !important; }
        .empty-state { text-align: center; padding: 50px 20px; color: #444; }
        .top-bar { position: sticky; top: 0; z-index: 50; background: #000; padding: 6px 12px; display: flex; align-items: center; gap: 8px; border-bottom: 1px solid #1a1a1a; }
        .top-bar-logo { font-weight: 700; font-size: 1em; color: var(--accent); }
        .top-bar-search { flex: 1; display: flex; gap: 4px; }
        .top-bar-search input { width: 100%; background: #111; border: 1px solid #222; color: #fff; padding: 6px 12px; border-radius: 16px; font-size: 0.8em; outline: none; }
        .top-bar-search-btn { background: var(--accent); color: #000; border: none; padding: 6px 12px; border-radius: 16px; font-weight: 700; cursor: pointer; font-size: 0.8em; white-space: nowrap; }
        .top-bar-settings { cursor: pointer; font-size: 1.3em; }
        .settings-modal { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: #000; z-index: 300; overflow-y: auto; }
        .settings-section { padding: 15px; border-bottom: 1px solid #1a1a1a; }
        .settings-section h3 { color: var(--accent); margin-bottom: 10px; font-size: 0.85em; }
        .theme-options { display: flex; gap: 10px; }
        .theme-option { width: 36px; height: 36px; border-radius: 50%; cursor: pointer; border: 3px solid transparent; }
        .theme-option.active { border-color: #fff; }
        .theme-option.lime { background: linear-gradient(135deg, #39ff14, #00cc00); }
        .theme-option.pink { background: linear-gradient(135deg, #ff2d55, #ff6b6b); }
        .theme-option.red { background: linear-gradient(135deg, #ff4757, #ff6b81); }
        .modal-header { display: flex; align-items: center; padding: 12px; border-bottom: 1px solid #1a1a1a; gap: 12px; }
        .modal-header button { background: none; border: none; color: #fff; font-size: 1.1em; cursor: pointer; }
        .upload-progress { position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%); background: #111; padding: 15px 25px; border-radius: 12px; z-index: 400; text-align: center; }
        .upload-progress .spinner { width: 35px; height: 35px; border: 3px solid #333; border-top-color: var(--accent); border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 8px; }
        @keyframes spin { to{transform:rotate(360deg)} }
    </style>
</head>
<body class="theme-lime">

    <div class="splash-screen" id="splashScreen">
        <div class="splash-logo">LIFETOK</div>
        <div class="splash-subtitle">SOCIAL NETWORK</div>
    </div>

    <div class="auth-screen" id="authScreen">
        <div class="auth-box">
            <div class="auth-logo">LIFETOK</div>
            <div class="error-msg" id="authError"></div>
            <input type="email" class="auth-input" id="authEmail" placeholder="Почта">
            <input type="text" class="auth-input" id="authNickname" placeholder="Никнейм">
            <input type="password" class="auth-input" id="authPassword" placeholder="Пароль">
            <label class="remember-row"><input type="checkbox" id="rememberMe" checked> Запомнить меня</label>
            <button class="auth-btn" id="authBtn">Войти</button>
            <div class="auth-switch"><span id="authSwitch">Создать аккаунт</span></div>
        </div>
    </div>

    <div class="main-screen" id="mainScreen">
        <div class="top-bar">
            <span class="top-bar-logo">LIFETOK</span>
            <div class="top-bar-search">
                <input type="text" id="topSearchInput" placeholder="🔍 Поиск...">
                <button class="top-bar-search-btn" id="searchBtn">Найти</button>
            </div>
            <span class="top-bar-settings" id="settingsBtn">⚙️</span>
        </div>
        <div id="feedPage">
            <div class="tabs">
                <button class="tab active" data-feed="all">Все</button>
                <button class="tab" data-feed="following">Подписки</button>
            </div>
            <div class="feed-container" id="feedContainer"><div class="empty-state"><p>Загрузка...</p></div></div>
        </div>
        <div id="profilePage" class="hidden"><div id="profileContent"></div></div>
        <div class="bottom-nav">
            <div class="nav-item active" data-page="feed"><span class="nav-icon">🏠</span>Лента</div>
            <div class="nav-create"><button class="nav-create-btn" id="createBtn">+</button></div>
            <div class="nav-item" data-page="profile"><span class="nav-icon">👤</span>Профиль</div>
        </div>
        <div class="create-menu hidden" id="createMenu">
            <button id="createPhotoBtn">📸</button>
            <button id="createVideoBtn">🎬</button>
        </div>
    </div>

    <div class="settings-modal hidden" id="settingsModal">
        <div class="modal-header"><button id="closeSettings">←</button><h3>Настройки</h3></div>
        <div class="settings-section">
            <h3>🎨 Тема</h3>
            <div class="theme-options">
                <div class="theme-option lime active" onclick="setTheme('lime')"></div>
                <div class="theme-option pink" onclick="setTheme('pink')"></div>
                <div class="theme-option red" onclick="setTheme('red')"></div>
            </div>
        </div>
        <div class="settings-section"><button class="auth-btn" id="logoutBtn2">🚪 Выйти</button></div>
    </div>

    <input type="file" id="photoInput" accept="image/*" multiple style="display:none">
    <input type="file" id="videoInput" accept="video/*" style="display:none">
    <input type="file" id="commentImageInput" accept="image/*" style="display:none">

    <script>
        // Облачное хранилище для GitHub Pages
        const DB_URL = 'https://api.jsonbin.io/v3/b/693d0d78e1dc7c2b9b11321c';
        const API_KEY = '$2a$10$8JrdvWpPPqFKt10e4IFK3uqEQieDJAjDis9HfL8nyGqvc41T6DAla';
        
        let DB = { users: {}, posts: [] };
        let currentUser = null;
        let currentFeed = 'all';
        let replyTo = null;
        let pendingCommentImage = null;

        function saveDB() {
            localStorage.setItem('lifetok_gh', JSON.stringify(DB));
            fetch(DB_URL, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json', 'X-Access-Key': API_KEY },
                body: JSON.stringify(DB)
            }).catch(() => {});
        }

        async function loadDB() {
            try {
                const r = await fetch(DB_URL, { headers: { 'X-Access-Key': API_KEY } });
                if (r.ok) { const j = await r.json(); DB = j.record; return; }
            } catch(e) {}
            DB = JSON.parse(localStorage.getItem('lifetok_gh') || '{"users":{},"posts":[]}');
            if (!Object.keys(DB.users).length) {
                DB.users['demo@mail.com'] = { email:'demo@mail.com', nickname:'Demo', password:'1234', avatar:'', bio:'', followers:[], following:[], savedPosts:[], postsCount:0 };
                saveDB();
            }
        }

        function setTheme(t) { document.body.className = 'theme-' + t; localStorage.setItem('lifetok_theme', t); }
        function getMe() { return DB.users[currentUser] || {}; }
        function getUser(e) { return DB.users[e] || null; }

        async function uploadMedia(file) {
            try {
                const fd = new FormData(); fd.append('image', file);
                const r = await fetch('https://api.imgur.com/3/image', {
                    method: 'POST',
                    headers: { 'Authorization': 'Client-ID 546c25a59c58ad7' },
                    body: fd
                });
                const j = await r.json();
                if (j.success && j.data?.link) return j.data.link;
            } catch(e) {}
            
            return new Promise(r => {
                const reader = new FileReader();
                reader.onload = e => r(e.target.result);
                reader.readAsDataURL(file);
            });
        }

        async function init() {
            document.body.className = 'theme-' + (localStorage.getItem('lifetok_theme') || 'lime');
            await loadDB();
            document.getElementById('splashScreen').style.display = 'none';
            const saved = localStorage.getItem('lifetok_user');
            if (saved && DB.users[saved]) { currentUser = saved; enterApp(); }
            else { document.getElementById('authScreen').style.display = 'flex'; }
        }
        init();

        setInterval(async () => { if (currentUser) { await loadDB(); if (!document.getElementById('feedPage').classList.contains('hidden')) renderFeed(); } }, 5000);

        document.getElementById('authSwitch').addEventListener('click', function() {
            const b = document.getElementById('authBtn'); const isLogin = b.textContent === 'Войти';
            b.textContent = isLogin ? 'Зарегистрироваться' : 'Войти'; this.textContent = isLogin ? 'Уже есть аккаунт' : 'Создать аккаунт';
        });

        document.getElementById('authBtn').addEventListener('click', async function() {
            const email = document.getElementById('authEmail').value.trim().toLowerCase();
            const nick = document.getElementById('authNickname').value.trim();
            const pass = document.getElementById('authPassword').value;
            const isLogin = this.textContent === 'Войти';
            const err = document.getElementById('authError'); err.style.display = 'none';
            if (!email || !nick || !pass) { err.textContent = 'Заполни все поля'; err.style.display = 'block'; return; }
            if (!email.includes('@')) { err.textContent = 'Неверная почта'; err.style.display = 'block'; return; }
            if (pass.length < 4) { err.textContent = 'Минимум 4 символа'; err.style.display = 'block'; return; }
            await loadDB();
            if (isLogin) {
                if (DB.users[email] && DB.users[email].password === pass) { currentUser = email; if (document.getElementById('rememberMe').checked) localStorage.setItem('lifetok_user', email); enterApp(); }
                else { err.textContent = 'Неверный пароль'; err.style.display = 'block'; }
            } else {
                if (DB.users[email]) { err.textContent = 'Почта занята'; err.style.display = 'block'; return; }
                DB.users[email] = { email, nickname:nick, password:pass, avatar:'', bio:'', followers:[], following:[], savedPosts:[], postsCount:0 };
                saveDB(); currentUser = email; if (document.getElementById('rememberMe').checked) localStorage.setItem('lifetok_user', email); enterApp();
            }
        });

        function enterApp() { document.getElementById('authScreen').style.display = 'none'; document.getElementById('mainScreen').classList.add('active'); renderFeed(); }

        document.querySelectorAll('.nav-item').forEach(item => {
            item.addEventListener('click', function() {
                document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active')); this.classList.add('active');
                document.getElementById('feedPage').classList.add('hidden'); document.getElementById('profilePage').classList.add('hidden');
                if (this.dataset.page === 'feed') { document.getElementById('feedPage').classList.remove('hidden'); renderFeed(); }
                else { document.getElementById('profilePage').classList.remove('hidden'); renderProfile(); }
            });
        });

        document.querySelectorAll('.tab').forEach(tab => { tab.addEventListener('click', function() { document.querySelectorAll('.tab').forEach(t => t.classList.remove('active')); this.classList.add('active'); currentFeed = this.dataset.feed; renderFeed(); }); });
        document.getElementById('settingsBtn').addEventListener('click', () => document.getElementById('settingsModal').classList.remove('hidden'));
        document.getElementById('closeSettings').addEventListener('click', () => document.getElementById('settingsModal').classList.add('hidden'));
        document.getElementById('logoutBtn2').addEventListener('click', () => { if (confirm('Выйти?')) { currentUser = null; location.reload(); } });

        document.getElementById('searchBtn').addEventListener('click', () => {
            const q = document.getElementById('topSearchInput').value.trim().toLowerCase();
            if (!q) return;
            const u = Object.values(DB.users).find(u => u.nickname.toLowerCase().includes(q));
            if (u) openUserProfile(u.email); else alert('Не найден');
        });

        let menuVisible = false;
        document.getElementById('createBtn').addEventListener('click', e => { e.stopPropagation(); menuVisible = !menuVisible; document.getElementById('createMenu').classList.toggle('hidden', !menuVisible); });
        document.addEventListener('click', e => { if (menuVisible && !document.getElementById('createMenu').contains(e.target) && e.target !== document.getElementById('createBtn')) { menuVisible = false; document.getElementById('createMenu').classList.add('hidden'); } });
        document.getElementById('createPhotoBtn').addEventListener('click', () => { menuVisible = false; document.getElementById('createMenu').classList.add('hidden'); document.getElementById('photoInput').click(); });
        document.getElementById('createVideoBtn').addEventListener('click', () => { menuVisible = false; document.getElementById('createMenu').classList.add('hidden'); document.getElementById('videoInput').click(); });

        async function createPost(file, type) {
            const div = document.createElement('div'); div.className = 'upload-progress'; div.innerHTML = '<div class="spinner"></div><p>Загрузка...</p>'; document.body.appendChild(div);
            const url = await uploadMedia(file);
            document.body.removeChild(div);
            const caption = prompt('Описание:', '');
            const post = { id: Date.now().toString(), author: currentUser, type, url, caption: caption || '', likes: [], comments: [], created: new Date().toISOString() };
            DB.posts.unshift(post); getMe().postsCount = (getMe().postsCount || 0) + 1; saveDB();
            document.querySelector('.nav-item[data-page="feed"]').click(); renderFeed();
        }

        document.getElementById('photoInput').addEventListener('change', function(e) { const f = Array.from(e.target.files).filter(f => f.type.startsWith('image/')); if (!f.length) return; createPost(f[0], 'image'); this.value = ''; });
        document.getElementById('videoInput').addEventListener('change', function(e) { if (!e.target.files[0]) return; createPost(e.target.files[0], 'video'); this.value = ''; });

        function toggleLike(pid) { const p = DB.posts.find(x => x.id === pid); if (!p) return 0; const i = p.likes.indexOf(currentUser); i === -1 ? p.likes.push(currentUser) : p.likes.splice(i, 1); saveDB(); return p.likes.length; }
        function isLiked(pid) { const p = DB.posts.find(x => x.id === pid); return p ? p.likes.includes(currentUser) : false; }
        function addComment(pid, txt, img, imgCaption, parentId) { const p = DB.posts.find(x => x.id === pid); if (!p) return; p.comments.push({ id: Date.now().toString(), user: currentUser, text: txt?.trim() || '', image: img || '', imageCaption: imgCaption || '', likes: [], parentId: parentId || null, createdAt: new Date().toISOString() }); saveDB(); }
        function deleteComment(pid, cid) { const p = DB.posts.find(x => x.id === pid); if (!p) return; p.comments = p.comments.filter(c => c.id !== cid && c.parentId !== cid); saveDB(); }
        function toggleCommentLike(pid, cid) { const p = DB.posts.find(x => x.id === pid); if (!p) return; const c = p.comments.find(x => x.id === cid); if (!c) return; if (!c.likes) c.likes = []; const i = c.likes.indexOf(currentUser); i === -1 ? c.likes.push(currentUser) : c.likes.splice(i, 1); saveDB(); }
        function toggleFollow(target) { if (target === currentUser) return; const me = getMe(); const tu = getUser(target); if (!tu) return; const i = me.following.indexOf(target); i === -1 ? (me.following.push(target), tu.followers.push(currentUser)) : (me.following.splice(i, 1), tu.followers = tu.followers.filter(e => e !== currentUser)); saveDB(); }

        function renderFeed() {
            const container = document.getElementById('feedContainer');
            let posts = DB.posts.slice().sort((a, b) => b.id.localeCompare(a.id));
            if (currentFeed === 'following') posts = posts.filter(p => p.author === currentUser || getMe().following.includes(p.author));
            if (!posts.length) { container.innerHTML = '<div class="empty-state"><p>Нет постов</p></div>'; return; }
            container.innerHTML = '';
            posts.forEach(post => {
                const author = getUser(post.author); if (!author) return;
                const liked = isLiked(post.id);
                const div = document.createElement('div'); div.className = 'post-card';
                div.innerHTML = `
                    ${post.type==='image' ? `<div class="post-media"><img src="${post.url}" alt="Фото" loading="lazy"></div>` : `<div class="post-media"><video src="${post.url}" loop playsinline controls style="width:100%;height:100%;"></video></div>`}
                    <div class="post-right-panel">
                        <div class="post-avatar-right" data-user="${post.author}">${author.avatar ? '<img src="'+author.avatar+'">' : '👤'}</div>
                        <div class="post-actions-right">
                            <button class="action-btn like-btn ${liked?'liked':''}" data-like="${post.id}"><span class="action-icon">${liked?'❤️':'🤍'}</span><span class="action-label">${post.likes.length}</span></button>
                            <button class="action-btn comment-btn" data-comment="${post.id}"><span class="action-icon">💬</span><span class="action-label">${post.comments.length}</span></button>
                            ${post.author===currentUser ? `<button class="action-btn" data-delete="${post.id}"><span class="action-icon">🗑</span><span class="action-label">Удал</span></button>` : ''}
                        </div>
                    </div>
                    <div class="post-bottom-info">
                        <div class="post-nickname-bottom" data-user="${post.author}">@${author.nickname}</div>
                        ${post.caption ? `<div class="post-caption-bottom">${post.caption}</div>` : ''}
                        <div class="post-date-bottom">📅 ${formatDate(post.created)}</div>
                    </div>`;
                container.appendChild(div);
            });
            attachHandlers();
        }

        function attachHandlers() {
            document.querySelectorAll('.like-btn').forEach(btn => { btn.onclick = function(e) { e.preventDefault(); e.stopPropagation(); const c = toggleLike(this.dataset.like); const l = isLiked(this.dataset.like); this.classList.toggle('liked', l); this.querySelector('.action-icon').textContent = l?'❤️':'🤍'; this.querySelector('.action-label').textContent = c; }; });
            document.querySelectorAll('.comment-btn').forEach(btn => { btn.onclick = () => openComments(btn.dataset.comment); });
            document.querySelectorAll('[data-delete]').forEach(btn => { btn.onclick = function(e) { e.preventDefault(); e.stopPropagation(); if (confirm('Удалить пост?')) { DB.posts = DB.posts.filter(p => p.id !== btn.dataset.delete); getMe().postsCount = Math.max(0, (getMe().postsCount||1)-1); saveDB(); renderFeed(); } }; });
            document.querySelectorAll('.post-avatar-right, .post-nickname-bottom').forEach(el => { el.onclick = function() { const email = el.dataset.user; if (email === currentUser) document.querySelector('.nav-item[data-page="profile"]').click(); else openUserProfile(email); }; });
        }

        function openComments(postId) {
            const post = DB.posts.find(p => p.id === postId); if (!post) return;
            replyTo = null; pendingCommentImage = null;
            const overlay = document.createElement('div'); overlay.className = 'comments-overlay';
            overlay.innerHTML = `<div class="comments-header"><button class="close-comments">←</button><h3>Комментарии (${post.comments.length})</h3></div><div class="comments-list">${renderCommentsHTML(post)}</div><div class="comment-input-area"><span id="replyLabel" style="font-size:0.65em;color:var(--accent);display:none;width:100%;"></span><input type="text" placeholder="Написать..." id="cinput${postId}" style="flex:1;"><button class="comment-image-btn" id="cimgbtn${postId}">🖼</button><button id="csend${postId}">Отпр</button></div>`;
            document.body.appendChild(overlay);
            overlay.querySelector('.close-comments').onclick = () => document.body.removeChild(overlay);
            document.getElementById(`csend${postId}`).onclick = () => { const inp = document.getElementById(`cinput${postId}`); const txt = inp.value.trim(); if (txt || pendingCommentImage) { addComment(postId, txt, pendingCommentImage, window._commentImageCaption||'', replyTo?.id||null); pendingCommentImage=null; window._commentImageCaption=''; replyTo=null; document.body.removeChild(overlay); renderFeed(); } };
            document.getElementById(`cimgbtn${postId}`).onclick = () => { const fi = document.getElementById('commentImageInput'); fi.onchange = function(e) { const f = e.target.files[0]; if (f?.type.startsWith('image/')) { const r = new FileReader(); r.onload = ev => { pendingCommentImage = ev.target.result; const caption = prompt('Подпись:', ''); window._commentImageCaption = caption||''; }; r.readAsDataURL(f); } fi.value=''; }; fi.click(); };
            overlay.querySelectorAll('.comment-reply-btn').forEach(btn => { btn.onclick = () => { replyTo = { id: btn.dataset.reply, user: btn.dataset.replyUser }; overlay.querySelector('#replyLabel').textContent = '↳ Ответ для @'+replyTo.user; overlay.querySelector('#replyLabel').style.display='block'; overlay.querySelector(`#cinput${postId}`).focus(); }; });
            overlay.querySelectorAll('.comment-like-btn').forEach(btn => { btn.onclick = () => { toggleCommentLike(postId, btn.dataset.clike); document.body.removeChild(overlay); openComments(postId); renderFeed(); }; });
            overlay.querySelectorAll('.comment-delete-btn').forEach(btn => { btn.onclick = () => { if (confirm('Удалить?')) { deleteComment(postId, btn.dataset.cdel); document.body.removeChild(overlay); renderFeed(); } }; });
        }

        function renderCommentsHTML(post, parentId = null) {
            const comments = post.comments.filter(c => c.parentId === parentId);
            if (!comments.length) return parentId ? '' : '<div style="text-align:center;color:#555;padding:40px;">Нет комментариев</div>';
            return comments.map(c => { const cu = getUser(c.user); const isCLiked = (c.likes||[]).includes(currentUser); const replies = post.comments.filter(r => r.parentId === c.id); return `<div class="comment ${parentId?'reply':''}"><div class="comment-avatar">${cu?.avatar?'<img src="'+cu.avatar+'">':'👤'}</div><div class="comment-body"><div class="comment-user">${cu?.nickname||'user'} ${c.user===post.author?'<span style="color:var(--accent);">· автор</span>':''}</div>${c.text?`<div class="comment-text">${c.text}</div>`:''}${c.image?`<div class="comment-image-wrapper"><img src="${c.image}" class="comment-image">${c.imageCaption?`<div class="comment-image-caption">🖼 ${c.imageCaption}</div>`:''}</div>`:''}<div class="comment-time">${timeAgo(c.createdAt)} <button class="comment-like-btn ${isCLiked?'liked':''}" data-clike="${c.id}">${isCLiked?'❤':'🤍'} ${(c.likes||[]).length}</button> <button class="comment-reply-btn" data-reply="${c.id}" data-reply-user="${cu?.nickname||'user'}">↩</button> ${c.user===currentUser?`<button class="comment-delete-btn" data-cdel="${c.id}">удалить</button>`:''}</div>${replies.length?replies.map(r=>{const ru=getUser(r.user);const rLiked=(r.likes||[]).includes(currentUser);return`<div class="comment reply"><div class="comment-avatar">${ru?.avatar?'<img src="'+ru.avatar+'">':'👤'}</div><div class="comment-body"><div class="comment-user">${ru?.nickname||'user'}</div>${r.text?`<div class="comment-text">${r.text}</div>`:''}${r.image?`<div class="comment-image-wrapper"><img src="${r.image}" class="comment-image">${r.imageCaption?`<div class="comment-image-caption">🖼 ${r.imageCaption}</div>`:''}</div>`:''}<div class="comment-time">${timeAgo(r.createdAt)} <button class="comment-like-btn ${rLiked?'liked':''}" data-clike="${r.id}">${rLiked?'❤':'🤍'} ${(r.likes||[]).length}</button> ${r.user===currentUser?`<button class="comment-delete-btn" data-cdel="${r.id}">удалить</button>`:''}</div></div></div>`}).join(''):''}</div></div>`; }).join('');
        }

        function renderProfile() { const user = getMe(); const posts = DB.posts.filter(p => p.author === currentUser).sort((a,b) => b.id.localeCompare(a.id)); const container = document.getElementById('profileContent'); container.innerHTML = `<div class="profile-page"><div class="profile-avatar" id="profAvatar">${user.avatar?'<img src="'+user.avatar+'">':'👤'}</div><div class="profile-nickname">${user.nickname}</div><div class="profile-bio" id="profBio">${user.bio||'➕ Добавить описание'}</div><div class="profile-stats"><div class="profile-stat"><div class="profile-stat-num">${posts.length}</div><div class="profile-stat-label">постов</div></div><div class="profile-stat" id="profFollowers"><div class="profile-stat-num">${user.followers.length}</div><div class="profile-stat-label">подписчиков</div></div><div class="profile-stat" id="profFollowing"><div class="profile-stat-num">${user.following.length}</div><div class="profile-stat-label">подписок</div></div></div><button class="profile-btn" id="editProfBtn">✏️ Ред.</button><button class="profile-btn" id="logoutProfBtn">🚪 Выйти</button><div class="profile-posts-grid" id="profileGrid"></div></div>`; const grid = container.querySelector('#profileGrid'); posts.forEach(post => { const thumb = document.createElement('div'); thumb.className = 'profile-post-thumb'; thumb.innerHTML = post.type==='image'?`<img src="${post.url}">`:`<video src="${post.url}" muted></video><div class="video-icon">🎬</div>`; if (post.likes.length) { const lel = document.createElement('div'); lel.className = 'likes-count'; lel.textContent = '❤ '+post.likes.length; thumb.appendChild(lel); } grid.appendChild(thumb); }); if (!posts.length) grid.innerHTML = '<div class="empty-state" style="grid-column:1/-1;"><p>Нет постов</p></div>'; container.querySelector('#profBio').onclick = () => { const b = prompt('Описание:', user.bio); if (b !== null) { user.bio = b.trim(); saveDB(); renderProfile(); } }; container.querySelector('#editProfBtn').onclick = () => { const n = prompt('Никнейм:', user.nickname); if (n?.trim()) { user.nickname = n.trim(); saveDB(); renderProfile(); renderFeed(); } }; container.querySelector('#logoutProfBtn').onclick = () => { if (confirm('Выйти?')) { currentUser = null; location.reload(); } }; container.querySelector('#profAvatar').onclick = () => { const inp = document.createElement('input'); inp.type='file'; inp.accept='image/*'; inp.onchange = function(e) { const f = e.target.files[0]; if (f?.type.startsWith('image/')) { const r = new FileReader(); r.onload = ev => { user.avatar = ev.target.result; saveDB(); renderProfile(); renderFeed(); }; r.readAsDataURL(f); } }; inp.click(); }; container.querySelector('#profFollowers').onclick = () => showUsersList('Подписчики', user.followers); container.querySelector('#profFollowing').onclick = () => showUsersList('Подписки', user.following); }
        function openUserProfile(email) { const user = getUser(email); if (!user) return; const posts = DB.posts.filter(p => p.author === email).sort((a,b) => b.id.localeCompare(a.id)); const isFollowing = getMe().following.includes(email); const modal = document.createElement('div'); modal.className = 'modal-overlay'; modal.innerHTML = `<div class="modal-header"><button class="close-modal">←</button><h3>${user.nickname}</h3></div><div style="text-align:center;padding:15px;"><div class="profile-avatar">${user.avatar?'<img src="'+user.avatar+'">':'👤'}</div><div style="font-weight:700;margin-top:6px;">${user.nickname}</div>${user.bio?'<div style="color:#aaa;font-size:0.75em;">'+user.bio+'</div>':''}<div style="display:flex;justify-content:center;gap:25px;margin:12px 0;"><div><strong>${posts.length}</strong><br><span style="color:#888;font-size:0.65em;">постов</span></div><div><strong>${user.followers.length}</strong><br><span style="color:#888;font-size:0.65em;">подписчиков</span></div><div><strong>${user.following.length}</strong><br><span style="color:#888;font-size:0.65em;">подписок</span></div></div><button class="profile-btn" id="subBtn" style="background:var(--accent);color:#000;border:none;">${isFollowing?'✓ Вы подписаны':'+ Подписаться'}</button></div></div>`; document.body.appendChild(modal); modal.querySelector('.close-modal').onclick = () => document.body.removeChild(modal); modal.querySelector('#subBtn').onclick = () => { toggleFollow(email); document.body.removeChild(modal); renderFeed(); renderProfile(); }; }
        function showUsersList(title, list) { const modal = document.createElement('div'); modal.className = 'modal-overlay'; modal.innerHTML = `<div class="modal-header"><button class="close-modal">←</button><h3>${title} (${list.length})</h3></div>${list.map(e => { const u = getUser(e); return u ? '<div style="padding:8px 12px;border-bottom:1px solid #111;">'+u.nickname+'</div>' : ''; }).join('')}`; document.body.appendChild(modal); modal.querySelector('.close-modal').onclick = () => document.body.removeChild(modal); }
        function formatDate(d) { if (!d) return ''; const dt = new Date(d), m = ['января','февраля','марта','апреля','мая','июня','июля','августа','сентября','октября','ноября','декабря']; return dt.getDate() + ' ' + m[dt.getMonth()] + ' ' + dt.getFullYear(); }
        function timeAgo(iso) { if (!iso) return ''; const s = Math.floor((new Date() - new Date(iso)) / 1000); if (s < 60) return 'только что'; if (s < 3600) return Math.floor(s/60)+' мин'; if (s < 86400) return Math.floor(s/3600)+' ч'; return Math.floor(s/86400)+' дн'; }
    </script>
</body>
</html>
