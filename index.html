<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>LifeTok</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #000;
            color: #fff;
            min-height: 100vh;
            -webkit-tap-highlight-color: transparent;
            overflow-x: hidden;
        }

        :root { --accent: #39ff14; --accent2: #00cc00; }
        body.theme-lime { --accent: #39ff14; --accent2: #00cc00; }
        body.theme-pink { --accent: #ff2d55; --accent2: #ff6b6b; }
        body.theme-red { --accent: #ff4757; --accent2: #ff6b81; }
        body.theme-blue { --accent: #00d4ff; --accent2: #0099ff; }

        .splash-screen { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: #000; flex-direction: column; gap: 15px; }
        .splash-logo { font-size: 5em; font-weight: 900; letter-spacing: 8px; background: linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: glow 2s infinite; }
        @keyframes glow { 0%,100%{filter:brightness(1)}50%{filter:brightness(1.8)} }
        .splash-subtitle { color: #555; font-size: 0.9em; letter-spacing: 8px; }

        .auth-screen { min-height: 100vh; display: none; align-items: center; justify-content: center; padding: 20px; background: linear-gradient(180deg, #0a1a0a 0%, #000 100%); }
        .auth-box { width: 100%; max-width: 350px; text-align: center; }
        .auth-logo { font-size: 3.5em; font-weight: 900; background: linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 15px; }
        .auth-input { width: 100%; background: #111; border: 1px solid #222; color: #fff; padding: 14px 16px; border-radius: 10px; font-size: 0.95em; margin-bottom: 10px; outline: none; }
        .auth-input:focus { border-color: var(--accent); }
        .auth-btn { width: 100%; background: var(--accent); color: #000; border: none; padding: 14px; border-radius: 10px; font-size: 1em; font-weight: 700; cursor: pointer; }
        .auth-switch { color: #888; font-size: 0.85em; margin-top: 15px; }
        .auth-switch span { color: var(--accent); cursor: pointer; font-weight: 600; }
        .error-msg { color: #ff4757; font-size: 0.8em; margin-bottom: 10px; display: none; }
        .remember-row { display: flex; align-items: center; gap: 8px; color: #888; font-size: 0.8em; margin: 10px 0; }
        .remember-row input { accent-color: var(--accent); width: 18px; height: 18px; }

        .main-screen { display: none; }
        .main-screen.active { display: block; }

        .feed-container { height: calc(100vh - 100px); overflow-y: scroll; scroll-snap-type: y mandatory; -webkit-overflow-scrolling: touch; padding-bottom: 60px; }
        .post-card { height: calc(100vh - 100px); scroll-snap-align: start; position: relative; background: #000; display: flex; align-items: center; justify-content: center; }
        .post-media { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; background: #000; }
        .post-media img { width: 100%; height: 100%; object-fit: contain; }
        .post-media video { width: 100%; height: 100%; object-fit: contain; }

        .post-header { position: absolute; top: 0; left: 0; right: 0; padding: 12px 15px; display: flex; align-items: center; gap: 10px; z-index: 10; background: linear-gradient(to bottom, rgba(0,0,0,0.7), transparent); }
        .post-avatar-small { width: 38px; height: 38px; border-radius: 50%; border: 2px solid var(--accent); overflow: hidden; cursor: pointer; flex-shrink: 0; background: linear-gradient(135deg, var(--accent), var(--accent2)); display: flex; align-items: center; justify-content: center; font-size: 1.1em; }
        .post-avatar-small img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
        .post-username { font-weight: 600; font-size: 0.9em; cursor: pointer; }
        .post-actions-right { position: absolute; right: 12px; bottom: 110px; display: flex; flex-direction: column; align-items: center; gap: 16px; z-index: 10; }
        .action-btn { display: flex; flex-direction: column; align-items: center; gap: 2px; cursor: pointer; background: none; border: none; color: #fff; transition: transform 0.1s; }
        .action-btn:active { transform: scale(0.85); }
        .action-icon { width: 46px; height: 46px; border-radius: 50%; background: rgba(0,0,0,0.4); display: flex; align-items: center; justify-content: center; font-size: 1.3em; transition: all 0.1s; }
        .action-btn.liked .action-icon { background: #ff2d55; animation: heartPop 0.25s ease; }
        @keyframes heartPop { 0%{transform:scale(1)}50%{transform:scale(1.4)}100%{transform:scale(1)} }
        .action-btn.saved .action-icon { background: rgba(255,215,0,0.5); }
        .action-label { font-size: 0.65em; font-weight: 600; }
        .post-footer { position: absolute; bottom: 0; left: 0; right: 0; padding: 12px 15px; z-index: 10; background: linear-gradient(to top, rgba(0,0,0,0.85), transparent); }
        .post-caption { font-size: 0.85em; margin-bottom: 3px; line-height: 1.3; }
        .post-date { font-size: 0.7em; color: #ccc; }

        .tabs { position: sticky; top: 0; z-index: 50; background: #000; display: flex; justify-content: center; gap: 8px; padding: 8px; border-bottom: 1px solid #1a1a1a; }
        .tab { padding: 6px 16px; border-radius: 20px; font-size: 0.78em; cursor: pointer; background: #111; color: #888; border: none; font-weight: 600; }
        .tab.active { background: var(--accent); color: #000; }

        .comments-overlay { position: fixed; bottom: 0; left: 0; right: 0; top: 0; background: rgba(0,0,0,0.97); z-index: 300; display: flex; flex-direction: column; animation: slideUp 0.3s ease; }
        @keyframes slideUp { from{transform:translateY(100%)}to{transform:translateY(0)} }
        .comments-header { display: flex; align-items: center; padding: 15px; border-bottom: 1px solid #1a1a1a; gap: 15px; }
        .comments-header button { background: none; border: none; color: #fff; font-size: 1.2em; cursor: pointer; }
        .comments-list { flex: 1; overflow-y: auto; padding: 15px; }
        .comment { display: flex; gap: 10px; margin-bottom: 12px; }
        .comment.reply { margin-left: 42px; }
        .comment-avatar { width: 32px; height: 32px; border-radius: 50%; background: linear-gradient(135deg, var(--accent), var(--accent2)); display: flex; align-items: center; justify-content: center; font-size: 0.85em; flex-shrink: 0; overflow: hidden; cursor: pointer; }
        .comment-avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
        .comment-body { flex: 1; }
        .comment-user { font-weight: 600; font-size: 0.8em; }
        .comment-text { font-size: 0.85em; color: #ddd; margin-top: 2px; }
        .comment-image { max-width: 200px; max-height: 200px; border-radius: 8px; margin-top: 5px; cursor: pointer; }
        .comment-time { font-size: 0.7em; color: #666; margin-top: 3px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
        .comment-like-btn { background: none; border: none; color: #888; cursor: pointer; font-size: 0.75em; }
        .comment-like-btn.liked { color: #ff4757; }
        .comment-reply-btn { background: none; border: none; color: #888; cursor: pointer; font-size: 0.75em; }
        .comment-delete-btn { background: none; border: none; color: #ff4757; cursor: pointer; font-size: 0.7em; }
        .comment-input-area { display: flex; padding: 10px 15px; border-top: 1px solid #1a1a1a; gap: 8px; align-items: center; flex-shrink: 0; }
        .comment-input-area input { flex: 1; background: #111; border: none; color: #fff; padding: 10px 14px; border-radius: 20px; outline: none; font-size: 0.85em; }
        .comment-input-area button { background: var(--accent); color: #000; border: none; padding: 8px 16px; border-radius: 20px; font-weight: 700; cursor: pointer; font-size: 0.8em; white-space: nowrap; }
        .comment-image-btn { background: none; border: none; color: #888; cursor: pointer; font-size: 1.2em; padding: 5px; }

        .profile-page { padding: 25px 20px 60px; text-align: center; }
        .profile-avatar { width: 90px; height: 90px; border-radius: 50%; background: linear-gradient(135deg, var(--accent), var(--accent2)); margin: 0 auto 10px; display: flex; align-items: center; justify-content: center; font-size: 2.2em; border: 3px solid var(--accent); overflow: hidden; cursor: pointer; position: relative; }
        .profile-avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
        .profile-avatar::after { content: '📷'; position: absolute; bottom: 0; right: 0; background: var(--accent); border-radius: 50%; width: 28px; height: 28px; font-size: 0.5em; display: flex; align-items: center; justify-content: center; border: 2px solid #000; }
        .profile-nickname { font-size: 1.3em; font-weight: 700; }
        .profile-bio { color: #aaa; font-size: 0.8em; margin: 5px 0 12px; cursor: pointer; }
        .profile-stats { display: flex; justify-content: center; gap: 35px; margin: 15px 0; }
        .profile-stat { text-align: center; cursor: pointer; }
        .profile-stat-num { font-size: 1.3em; font-weight: 700; }
        .profile-stat-label { font-size: 0.65em; color: #888; }
        .profile-btn { background: #111; color: #fff; border: 1px solid #222; padding: 8px 24px; border-radius: 8px; font-size: 0.85em; cursor: pointer; margin: 4px; }
        .profile-posts-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; padding: 2px; margin-top: 15px; }
        .profile-post-thumb { aspect-ratio: 1; overflow: hidden; position: relative; cursor: pointer; background: #0a0a0a; }
        .profile-post-thumb img, .profile-post-thumb video { width: 100%; height: 100%; object-fit: cover; }
        .profile-post-thumb .video-icon { position: absolute; top: 5px; right: 5px; font-size: 0.9em; background: rgba(0,0,0,0.6); border-radius: 3px; padding: 2px 4px; }
        .profile-post-thumb .likes-count { position: absolute; bottom: 4px; left: 4px; font-size: 0.65em; background: rgba(0,0,0,0.6); padding: 2px 5px; border-radius: 3px; }

        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: #0a0a0a; border-top: 1px solid #1a1a1a; display: flex; align-items: center; z-index: 100; padding: 5px 0 15px; }
        .nav-item { flex: 1; text-align: center; cursor: pointer; color: #666; font-size: 0.6em; padding: 3px; }
        .nav-item.active { color: var(--accent); }
        .nav-icon { font-size: 1.7em; display: block; margin-bottom: 2px; }
        .nav-create { flex: 1; text-align: center; position: relative; top: -18px; }
        .nav-create-btn { width: 50px; height: 50px; border-radius: 50%; background: var(--accent); color: #000; border: none; font-size: 1.4em; cursor: pointer; }
        .create-menu { position: fixed; bottom: 85px; left: 50%; transform: translateX(-50%); background: #111; border-radius: 14px; padding: 10px; z-index: 150; display: flex; gap: 12px; border: 1px solid #222; }
        .create-menu button { background: none; border: none; color: #fff; cursor: pointer; font-size: 1.5em; padding: 8px; border-radius: 10px; }

        .hidden { display: none !important; }
        .empty-state { text-align: center; padding: 60px 20px; color: #444; }
        .top-bar { position: sticky; top: 0; z-index: 50; background: #000; padding: 8px 15px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid #1a1a1a; }
        .top-bar-logo { font-weight: 700; font-size: 1.1em; color: var(--accent); }
        .top-bar-search { flex: 1; }
        .top-bar-search input { width: 100%; background: #111; border: 1px solid #222; color: #fff; padding: 8px 15px; border-radius: 20px; font-size: 0.85em; outline: none; }
        .top-bar-settings { cursor: pointer; font-size: 1.4em; }
        .settings-modal { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: #000; z-index: 300; overflow-y: auto; }
        .settings-section { padding: 20px; border-bottom: 1px solid #1a1a1a; }
        .settings-section h3 { color: var(--accent); margin-bottom: 12px; font-size: 0.9em; }
        .theme-options { display: flex; gap: 12px; flex-wrap: wrap; }
        .theme-option { width: 40px; height: 40px; border-radius: 50%; cursor: pointer; border: 3px solid transparent; }
        .theme-option.active { border-color: #fff; transform: scale(1.15); }
        .theme-option.lime { background: linear-gradient(135deg, #39ff14, #00cc00); }
        .theme-option.pink { background: linear-gradient(135deg, #ff2d55, #ff6b6b); }
        .theme-option.red { background: linear-gradient(135deg, #ff4757, #ff6b81); }
        .theme-option.blue { background: linear-gradient(135deg, #00d4ff, #0099ff); }
        .modal-header { display: flex; align-items: center; padding: 15px; border-bottom: 1px solid #1a1a1a; gap: 15px; }
        .modal-header button { background: none; border: none; color: #fff; font-size: 1.2em; cursor: pointer; }
        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: #000; z-index: 200; overflow-y: auto; }
    </style>
</head>
<body class="theme-lime">

    <div class="splash-screen" id="splashScreen">
        <div class="splash-logo">LIFETOK</div>
        <div class="splash-subtitle">MOMENTS</div>
    </div>

    <div class="auth-screen" id="authScreen">
        <div class="auth-box">
            <div class="auth-logo">LIFETOK</div>
            <div class="error-msg" id="authError"></div>
            <input type="email" class="auth-input" id="authEmail" placeholder="Почта">
            <input type="text" class="auth-input" id="authNickname" placeholder="Никнейм">
            <input type="password" class="auth-input" id="authPassword" placeholder="Пароль">
            <label class="remember-row"><input type="checkbox" id="rememberMe" checked> Запомнить меня</label>
            <button class="auth-btn" id="authBtn">Войти</button>
            <div class="auth-switch"><span id="authSwitch">Создать аккаунт</span></div>
        </div>
    </div>

    <div class="main-screen" id="mainScreen">
        <div class="top-bar">
            <span class="top-bar-logo">LIFETOK</span>
            <div class="top-bar-search"><input type="text" id="topSearchInput" placeholder="🔍 Поиск..."></div>
            <span class="top-bar-settings" id="settingsBtn">⚙️</span>
        </div>
        <div id="feedPage">
            <div class="tabs">
                <button class="tab active" data-feed="all">Все</button>
                <button class="tab" data-feed="following">Подписки</button>
                <button class="tab" data-feed="saved">⭐ Сохр.</button>
            </div>
            <div class="feed-container" id="feedContainer"></div>
        </div>
        <div id="profilePage" class="hidden"><div id="profileContent"></div></div>
        <div class="bottom-nav">
            <div class="nav-item active" data-page="feed"><span class="nav-icon">🏠</span>Лента</div>
            <div class="nav-create"><button class="nav-create-btn" id="createBtn">+</button></div>
            <div class="nav-item" data-page="profile"><span class="nav-icon">👤</span>Профиль</div>
        </div>
        <div class="create-menu hidden" id="createMenu">
            <button id="createPhotoBtn">📸</button>
            <button id="createVideoBtn">🎬</button>
        </div>
    </div>

    <div class="settings-modal hidden" id="settingsModal">
        <div class="modal-header"><button id="closeSettings">←</button><h3>Настройки</h3></div>
        <div class="settings-section">
            <h3>🎨 Тема</h3>
            <div class="theme-options">
                <div class="theme-option lime active" onclick="setTheme('lime')"></div>
                <div class="theme-option pink" onclick="setTheme('pink')"></div>
                <div class="theme-option red" onclick="setTheme('red')"></div>
                <div class="theme-option blue" onclick="setTheme('blue')"></div>
            </div>
        </div>
        <div class="settings-section"><button class="auth-btn" id="logoutBtn2">🚪 Выйти</button></div>
    </div>

    <input type="file" id="photoInput" accept="image/*" multiple style="display:none">
    <input type="file" id="videoInput" accept="video/*" style="display:none">
    <input type="file" id="commentImageInput" accept="image/*" style="display:none">

    <script>
        const API_KEY = '$2a$10$8JrdvWpPPqFKt10e4IFK3uqEQieDJAjDis9HfL8nyGqvc41T6DAla';
        const BIN_URL = 'https://api.jsonbin.io/v3/b/693d0d78e1dc7c2b9b11321c';
        
        let DB = { users: {}, posts: [] };
        let currentUser = null;
        let currentFeed = 'all';
        let replyTo = null; // Для ответов на комментарии

        function saveDB() {
            localStorage.setItem('lifetok_db', JSON.stringify(DB));
            fetch(BIN_URL, { method: 'PUT', headers: { 'Content-Type': 'application/json', 'X-Access-Key': API_KEY }, body: JSON.stringify(DB) }).catch(() => {});
        }

        async function loadDB() {
            try {
                const r = await fetch(BIN_URL, { headers: { 'X-Access-Key': API_KEY } });
                if (r.ok) { const j = await r.json(); DB = j.record; return; }
            } catch(e) {}
            DB = JSON.parse(localStorage.getItem('lifetok_db') || '{"users":{},"posts":[]}');
            if (!Object.keys(DB.users).length) {
                DB.users['alice@mail.com'] = { email:'alice@mail.com', nickname:'Alice', password:'1234', avatar:'', bio:'', followers:[], following:[], savedPosts:[], postsCount:0 };
                DB.users['bob@mail.com'] = { email:'bob@mail.com', nickname:'Bob', password:'1234', avatar:'', bio:'', followers:[], following:[], savedPosts:[], postsCount:0 };
                saveDB();
            }
        }

        function setTheme(t) { document.body.className = 'theme-' + t; localStorage.setItem('lifetok_theme', t); document.querySelectorAll('.theme-option').forEach(o => o.classList.remove('active')); document.querySelector(`.theme-option.${t}`)?.classList.add('active'); }
        function getMe() { return DB.users[currentUser] || {}; }
        function getUser(e) { return DB.users[e] || null; }

        async function init() {
            document.body.className = 'theme-' + (localStorage.getItem('lifetok_theme') || 'lime');
            await loadDB();
            document.getElementById('splashScreen').style.display = 'none';
            const saved = localStorage.getItem('lifetok_user');
            if (saved && DB.users[saved]) { currentUser = saved; enterApp(); }
            else { document.getElementById('authScreen').style.display = 'flex'; }
        }
        init();

        setInterval(async () => { if (currentUser) { await loadDB(); if (!document.getElementById('feedPage').classList.contains('hidden')) renderFeed(); } }, 7000);

        document.getElementById('authSwitch').addEventListener('click', function() {
            const b = document.getElementById('authBtn'); const isLogin = b.textContent === 'Войти';
            b.textContent = isLogin ? 'Зарегистрироваться' : 'Войти';
            this.textContent = isLogin ? 'Уже есть аккаунт' : 'Создать аккаунт';
        });

        document.getElementById('authBtn').addEventListener('click', async function() {
            const email = document.getElementById('authEmail').value.trim().toLowerCase();
            const nick = document.getElementById('authNickname').value.trim();
            const pass = document.getElementById('authPassword').value;
            const isLogin = this.textContent === 'Войти';
            const err = document.getElementById('authError'); err.style.display = 'none';
            if (!email || !nick || !pass) { err.textContent = 'Заполни все поля'; err.style.display = 'block'; return; }
            if (!email.includes('@')) { err.textContent = 'Неверная почта'; err.style.display = 'block'; return; }
            if (pass.length < 4) { err.textContent = 'Минимум 4 символа'; err.style.display = 'block'; return; }
            await loadDB();
            if (isLogin) {
                if (DB.users[email] && DB.users[email].password === pass) { currentUser = email; if (document.getElementById('rememberMe').checked) localStorage.setItem('lifetok_user', email); enterApp(); }
                else { err.textContent = 'Неверный пароль'; err.style.display = 'block'; }
            } else {
                if (DB.users[email]) { err.textContent = 'Почта занята'; err.style.display = 'block'; return; }
                DB.users[email] = { email, nickname:nick, password:pass, avatar:'', bio:'', followers:[], following:[], savedPosts:[], postsCount:0 };
                saveDB(); currentUser = email; if (document.getElementById('rememberMe').checked) localStorage.setItem('lifetok_user', email); enterApp();
            }
        });

        function enterApp() { document.getElementById('authScreen').style.display = 'none'; document.getElementById('mainScreen').classList.add('active'); renderFeed(); }

        document.querySelectorAll('.nav-item').forEach(item => {
            item.addEventListener('click', function() {
                document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
                this.classList.add('active');
                if (this.dataset.page === 'feed') { document.getElementById('feedPage').classList.remove('hidden'); document.getElementById('profilePage').classList.add('hidden'); renderFeed(); }
                else { document.getElementById('feedPage').classList.add('hidden'); document.getElementById('profilePage').classList.remove('hidden'); renderProfile(); }
            });
        });

        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', function() { document.querySelectorAll('.tab').forEach(t => t.classList.remove('active')); this.classList.add('active'); currentFeed = this.dataset.feed; renderFeed(); });
        });

        document.getElementById('settingsBtn').addEventListener('click', () => document.getElementById('settingsModal').classList.remove('hidden'));
        document.getElementById('closeSettings').addEventListener('click', () => document.getElementById('settingsModal').classList.add('hidden'));
        document.getElementById('logoutBtn2').addEventListener('click', () => { if (confirm('Выйти?')) { saveDB(); currentUser = null; location.reload(); } });

        let menuVisible = false;
        document.getElementById('createBtn').addEventListener('click', e => { e.stopPropagation(); menuVisible = !menuVisible; document.getElementById('createMenu').classList.toggle('hidden', !menuVisible); });
        document.addEventListener('click', e => { if (menuVisible && !document.getElementById('createMenu').contains(e.target) && e.target !== document.getElementById('createBtn')) { menuVisible = false; document.getElementById('createMenu').classList.add('hidden'); } });
        document.getElementById('createPhotoBtn').addEventListener('click', () => { menuVisible = false; document.getElementById('createMenu').classList.add('hidden'); document.getElementById('photoInput').click(); });
        document.getElementById('createVideoBtn').addEventListener('click', () => { menuVisible = false; document.getElementById('createMenu').classList.add('hidden'); document.getElementById('videoInput').click(); });

        function createPostWithCaption(urls, type) {
            const caption = prompt('Добавьте описание к посту:', '');
            const post = { id: Date.now().toString(), author: currentUser, type, urls, caption: caption || '', likes: [], comments: [], created: new Date().toISOString() };
            DB.posts.unshift(post);
            getMe().postsCount = (getMe().postsCount || 0) + 1;
            saveDB(); renderFeed();
        }

        document.getElementById('photoInput').addEventListener('change', function(e) {
            const files = Array.from(e.target.files).slice(0, 5).filter(f => f.type.startsWith('image/'));
            if (!files.length) return;
            const urls = []; let loaded = 0;
            files.forEach(f => { const r = new FileReader(); r.onload = e => { urls.push(e.target.result); loaded++; if (loaded === files.length) createPostWithCaption(urls, 'image'); }; r.readAsDataURL(f); });
            this.value = '';
        });

        document.getElementById('videoInput').addEventListener('change', function(e) {
            if (!e.target.files[0]) return;
            const r = new FileReader(); r.onload = e => createPostWithCaption([e.target.result], 'video'); r.readAsDataURL(e.target.files[0]); this.value = '';
        });

        function toggleLike(pid) { const p = DB.posts.find(x => x.id === pid); if (!p) return 0; const i = p.likes.indexOf(currentUser); i === -1 ? p.likes.push(currentUser) : p.likes.splice(i, 1); saveDB(); return p.likes.length; }
        function isLiked(pid) { const p = DB.posts.find(x => x.id === pid); return p ? p.likes.includes(currentUser) : false; }
        function toggleSave(pid) { const me = getMe(); if (!me.savedPosts) me.savedPosts = []; const i = me.savedPosts.indexOf(pid); i === -1 ? me.savedPosts.push(pid) : me.savedPosts.splice(i, 1); saveDB(); }
        function isSaved(pid) { return (getMe().savedPosts || []).includes(pid); }
        function addComment(pid, txt, img, parentId) { if (!txt?.trim() && !img) return; const p = DB.posts.find(x => x.id === pid); if (!p) return; p.comments.push({ id: Date.now().toString(), user: currentUser, text: txt?.trim() || '', image: img || '', likes: [], replies: [], parentId: parentId || null, createdAt: new Date().toISOString() }); saveDB(); }
        function deleteComment(pid, cid) { const p = DB.posts.find(x => x.id === pid); if (!p) return; p.comments = p.comments.filter(c => c.id !== cid && c.parentId !== cid); saveDB(); }
        function toggleCommentLike(pid, cid) { const p = DB.posts.find(x => x.id === pid); if (!p) return; const c = p.comments.find(x => x.id === cid); if (!c) return; if (!c.likes) c.likes = []; const i = c.likes.indexOf(currentUser); i === -1 ? c.likes.push(currentUser) : c.likes.splice(i, 1); saveDB(); }
        function toggleFollow(target) { if (target === currentUser) return; const me = getMe(); const tu = getUser(target); if (!tu) return; const i = me.following.indexOf(target); i === -1 ? (me.following.push(target), tu.followers.push(currentUser)) : (me.following.splice(i, 1), tu.followers = tu.followers.filter(e => e !== currentUser)); saveDB(); }

        function renderFeed() {
            const container = document.getElementById('feedContainer');
            let posts = DB.posts.slice().sort((a, b) => b.id.localeCompare(a.id));
            if (currentFeed === 'following') posts = posts.filter(p => p.author === currentUser || getMe().following.includes(p.author));
            else if (currentFeed === 'saved') posts = posts.filter(p => (getMe().savedPosts || []).includes(p.id));
            if (!posts.length) { container.innerHTML = `<div class="empty-state"><div class="empty-icon">📸</div><p>${currentFeed==='saved'?'Нет сохранённых':currentFeed==='following'?'Подпишитесь':'Нет постов'}</p></div>`; return; }
            container.innerHTML = '';
            posts.forEach(post => {
                const author = getUser(post.author); if (!author) return;
                const liked = isLiked(post.id), saved = isSaved(post.id);
                const div = document.createElement('div'); div.className = 'post-card';
                div.innerHTML = `
                    <div class="post-header">
                        <div class="post-avatar-small" data-user="${post.author}">${author.avatar ? '<img src="'+author.avatar+'">' : '👤'}</div>
                        <span class="post-username" data-user="${post.author}">${author.nickname}</span>
                    </div>
                    ${post.type==='image' ? `<div class="post-media"><img src="${post.urls[0]}" alt="Фото"></div>` : `<div class="post-media"><video src="${post.urls[0]}" loop playsinline></video></div>`}
                    <div class="post-actions-right">
                        <button class="action-btn like-btn ${liked?'liked':''}" data-like="${post.id}"><span class="action-icon">${liked?'❤️':'🤍'}</span><span class="action-label">${post.likes.length}</span></button>
                        <button class="action-btn comment-btn" data-comment="${post.id}"><span class="action-icon">💬</span><span class="action-label">${post.comments.length}</span></button>
                        <button class="action-btn save-btn ${saved?'saved':''}" data-save="${post.id}"><span class="action-icon">${saved?'⭐':'☆'}</span><span class="action-label">Сохр</span></button>
                        ${post.author===currentUser ? `<button class="action-btn" data-delete="${post.id}"><span class="action-icon">🗑</span><span class="action-label">Удал</span></button>` : ''}
                    </div>
                    <div class="post-footer">
                        ${post.caption ? `<div class="post-caption">${post.caption}</div>` : ''}
                        <div class="post-date">📅 ${formatDate(post.created)}</div>
                    </div>`;
                container.appendChild(div);
                const video = div.querySelector('video');
                if (video) { const obs = new IntersectionObserver(e => { e.forEach(en => { if (en.isIntersecting) video.play().catch(()=>{}); else video.pause(); }); }, { threshold: 0.7 }); obs.observe(div); }
            });
            attachHandlers();
        }

        function attachHandlers() {
            document.querySelectorAll('.like-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    const newCount = toggleLike(this.dataset.like);
                    const liked = isLiked(this.dataset.like);
                    this.classList.toggle('liked', liked);
                    this.querySelector('.action-icon').textContent = liked ? '❤️' : '🤍';
                    this.querySelector('.action-label').textContent = newCount;
                });
            });
            document.querySelectorAll('.save-btn').forEach(btn => {
                btn.addEventListener('click', function() { toggleSave(this.dataset.save); const s = isSaved(this.dataset.save); this.classList.toggle('saved', s); this.querySelector('.action-icon').textContent = s ? '⭐' : '☆'; });
            });
            document.querySelectorAll('.comment-btn').forEach(btn => { btn.addEventListener('click', () => openComments(btn.dataset.comment)); });
            document.querySelectorAll('[data-delete]').forEach(btn => { btn.addEventListener('click', () => { if (confirm('Удалить пост?')) { DB.posts = DB.posts.filter(p => p.id !== btn.dataset.delete); getMe().postsCount = Math.max(0, (getMe().postsCount||1)-1); saveDB(); renderFeed(); } }); });
            document.querySelectorAll('.post-avatar-small, .post-username').forEach(el => { el.addEventListener('click', () => { const email = el.dataset.user; if (email === currentUser) document.querySelector('.nav-item[data-page="profile"]').click(); else openUserProfile(email); }); });
        }

        function openComments(postId) {
            const post = DB.posts.find(p => p.id === postId); if (!post) return;
            replyTo = null;
            const overlay = document.createElement('div'); overlay.className = 'comments-overlay';
            overlay.innerHTML = `<div class="comments-header"><button class="close-comments">←</button><h3>Комментарии (${post.comments.length})</h3></div><div class="comments-list" id="clist${postId}">${renderCommentsHTML(post)}</div>
                <div class="comment-input-area" id="commentInputArea">
                    <span id="replyLabel" style="font-size:0.7em;color:var(--accent);display:none;"></span>
                    <input type="text" placeholder="Написать..." id="cinput${postId}">
                    <button class="comment-image-btn" id="cimgbtn${postId}">🖼</button>
                    <button id="csend${postId}">Отпр</button>
                </div>`;
            document.body.appendChild(overlay);
            overlay.querySelector('.close-comments').addEventListener('click', () => document.body.removeChild(overlay));
            
            document.getElementById(`csend${postId}`).addEventListener('click', () => {
                const inp = document.getElementById(`cinput${postId}`);
                const txt = inp.value.trim();
                if (txt || window._commentImage) {
                    addComment(postId, txt, window._commentImage || '', replyTo?.id || null);
                    window._commentImage = null; replyTo = null;
                    document.body.removeChild(overlay); renderFeed();
                }
            });
            
            document.getElementById(`cimgbtn${postId}`).addEventListener('click', () => {
                const fi = document.getElementById('commentImageInput');
                fi.onchange = function(e) {
                    const f = e.target.files[0];
                    if (f?.type.startsWith('image/')) {
                        const r = new FileReader();
                        r.onload = ev => { window._commentImage = ev.target.result; document.getElementById(`cinput${postId}`).placeholder = 'Изображение выбрано ✓'; };
                        r.readAsDataURL(f);
                    }
                    fi.value = '';
                };
                fi.click();
            });
            
            overlay.querySelectorAll('.comment-reply-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    replyTo = { id: btn.dataset.reply, user: btn.dataset.replyUser };
                    const label = overlay.querySelector('#replyLabel');
                    label.textContent = '↳ Ответ для @' + replyTo.user;
                    label.style.display = 'block';
                    overlay.querySelector(`#cinput${postId}`).focus();
                });
            });
            
            overlay.querySelectorAll('.comment-like-btn').forEach(btn => {
                btn.addEventListener('click', () => { toggleCommentLike(postId, btn.dataset.clike); document.body.removeChild(overlay); openComments(postId); renderFeed(); });
            });
            
            overlay.querySelectorAll('.comment-delete-btn').forEach(btn => {
                btn.addEventListener('click', () => { if (confirm('Удалить?')) { deleteComment(postId, btn.dataset.cdel); document.body.removeChild(overlay); renderFeed(); } });
            });
        }

        function renderCommentsHTML(post, parentId = null) {
            const comments = post.comments.filter(c => c.parentId === parentId);
            if (!comments.length) return parentId ? '' : '<div style="text-align:center;color:#555;padding:40px;">Нет комментариев</div>';
            return comments.map(c => {
                const cu = getUser(c.user); const isCLiked = (c.likes || []).includes(currentUser);
                const replies = post.comments.filter(r => r.parentId === c.id);
                return `<div class="comment ${parentId ? 'reply' : ''}">
                    <div class="comment-avatar" data-user="${c.user}">${cu?.avatar ? '<img src="'+cu.avatar+'">' : '👤'}</div>
                    <div class="comment-body">
                        <div class="comment-user">${cu?.nickname || 'user'} ${c.user === post.author ? '<span style="color:var(--accent);">· автор</span>' : ''}</div>
                        <div class="comment-text">${c.text}</div>
                        ${c.image ? `<img src="${c.image}" class="comment-image" onclick="this.style.maxWidth='100%';this.style.maxHeight='100%'">` : ''}
                        <div class="comment-time">
                            ${timeAgo(c.createdAt)}
                            <button class="comment-like-btn ${isCLiked?'liked':''}" data-clike="${c.id}">${isCLiked?'❤':'🤍'} ${(c.likes||[]).length}</button>
                            <button class="comment-reply-btn" data-reply="${c.id}" data-reply-user="${cu?.nickname||'user'}">↩ Ответить</button>
                            ${c.user === currentUser ? `<button class="comment-delete-btn" data-cdel="${c.id}">удалить</button>` : ''}
                        </div>
                        ${replies.length ? replies.map(r => {
                            const ru = getUser(r.user); const rLiked = (r.likes||[]).includes(currentUser);
                            return `<div class="comment reply">
                                <div class="comment-avatar">${ru?.avatar ? '<img src="'+ru.avatar+'">' : '👤'}</div>
                                <div class="comment-body">
                                    <div class="comment-user">${ru?.nickname||'user'}</div>
                                    <div class="comment-text">${r.text}</div>
                                    ${r.image ? `<img src="${r.image}" class="comment-image">` : ''}
                                    <div class="comment-time">${timeAgo(r.createdAt)}
                                        <button class="comment-like-btn ${rLiked?'liked':''}" data-clike="${r.id}">${rLiked?'❤':'🤍'} ${(r.likes||[]).length}</button>
                                        ${r.user === currentUser ? `<button class="comment-delete-btn" data-cdel="${r.id}">удалить</button>` : ''}
                                    </div>
                                </div>
                            </div>`;
                        }).join('') : ''}
                    </div>
                </div>`;
            }).join('');
        }

        function renderProfile() {
            const user = getMe(); const posts = DB.posts.filter(p => p.author === currentUser).sort((a,b) => b.id.localeCompare(a.id));
            const container = document.getElementById('profileContent');
            container.innerHTML = `<div class="profile-page">
                <div class="profile-avatar" id="profAvatar">${user.avatar ? '<img src="'+user.avatar+'">' : '👤'}</div>
                <div class="profile-nickname">${user.nickname}</div>
                <div class="profile-bio" id="profBio">${user.bio || '➕ Добавить описание'}</div>
                <div class="profile-stats">
                    <div class="profile-stat"><div class="profile-stat-num">${posts.length}</div><div class="profile-stat-label">постов</div></div>
                    <div class="profile-stat" id="profFollowers"><div class="profile-stat-num">${user.followers.length}</div><div class="profile-stat-label">подписчиков</div></div>
                    <div class="profile-stat" id="profFollowing"><div class="profile-stat-num">${user.following.length}</div><div class="profile-stat-label">подписок</div></div>
                </div>
                <button class="profile-btn" id="editProfBtn">✏️ Ред.</button>
                <button class="profile-btn" id="logoutProfBtn">🚪 Выйти</button>
                <div class="profile-posts-grid">${posts.map(p => '<div class="profile-post-thumb">'+(p.type==='image'?'<img src="'+p.urls[0]+'">':'<video src="'+p.urls[0]+'" muted></video><div class="video-icon">🎬</div>')+(p.likes.length?'<div class="likes-count">❤ '+p.likes.length+'</div>':'')+'</div>').join('')}${!posts.length?'<div class="empty-state" style="grid-column:1/-1;"><p>Нет постов</p></div>':''}</div>
            </div>`;
            container.querySelector('#profBio').addEventListener('click', () => { const b = prompt('Описание:', user.bio); if (b !== null) { user.bio = b.trim(); saveDB(); renderProfile(); } });
            container.querySelector('#editProfBtn').addEventListener('click', () => { const n = prompt('Никнейм:', user.nickname); if (n?.trim()) { user.nickname = n.trim(); saveDB(); renderProfile(); renderFeed(); } });
            container.querySelector('#logoutProfBtn').addEventListener('click', () => { if (confirm('Выйти?')) { saveDB(); currentUser = null; location.reload(); } });
            container.querySelector('#profAvatar').addEventListener('click', () => { const inp = document.createElement('input'); inp.type='file'; inp.accept='image/*'; inp.addEventListener('change', e => { const f = e.target.files[0]; if (f?.type.startsWith('image/')) { const r = new FileReader(); r.onload = e => { user.avatar = e.target.result; saveDB(); renderProfile(); renderFeed(); }; r.readAsDataURL(f); } }); inp.click(); });
            container.querySelector('#profFollowers').addEventListener('click', () => showUsersList('Подписчики', user.followers));
            container.querySelector('#profFollowing').addEventListener('click', () => showUsersList('Подписки', user.following));
        }

        function openUserProfile(email) {
            const user = getUser(email); if (!user) return;
            const posts = DB.posts.filter(p => p.author === email).sort((a,b) => b.id.localeCompare(a.id));
            const isFollowing = getMe().following.includes(email);
            const modal = document.createElement('div'); modal.className = 'modal-overlay';
            modal.innerHTML = `<div class="modal-header"><button class="close-modal">←</button><h3>${user.nickname}</h3></div><div style="text-align:center;padding:20px;"><div class="profile-avatar">${user.avatar?'<img src="'+user.avatar+'">':'👤'}</div><div style="font-weight:700;margin-top:8px;">${user.nickname}</div>${user.bio?'<div style="color:#aaa;font-size:0.8em;">'+user.bio+'</div>':''}<div style="display:flex;justify-content:center;gap:25px;margin:15px 0;"><div><strong>${posts.length}</strong><br><span style="color:#888;font-size:0.7em;">постов</span></div><div><strong>${user.followers.length}</strong><br><span style="color:#888;font-size:0.7em;">подписчиков</span></div><div><strong>${user.following.length}</strong><br><span style="color:#888;font-size:0.7em;">подписок</span></div></div><button class="profile-btn" id="subBtn" style="background:var(--accent);color:#000;border:none;">${isFollowing?'✓ Вы подписаны':'+ Подписаться'}</button></div><div class="profile-posts-grid">${posts.map(p => '<div class="profile-post-thumb">'+(p.type==='image'?'<img src="'+p.urls[0]+'">':'<video src="'+p.urls[0]+'" muted></video><div class="video-icon">🎬</div>')+(p.likes.length?'<div class="likes-count">❤ '+p.likes.length+'</div>':'')+'</div>').join('')}${!posts.length?'<div class="empty-state"><p>Нет постов</p></div>':''}</div>`;
            document.body.appendChild(modal);
            modal.querySelector('.close-modal').addEventListener('click', () => document.body.removeChild(modal));
            modal.querySelector('#subBtn').addEventListener('click', () => { toggleFollow(email); document.body.removeChild(modal); renderFeed(); renderProfile(); });
        }

        function showUsersList(title, list) {
            const modal = document.createElement('div'); modal.className = 'modal-overlay';
            modal.innerHTML = `<div class="modal-header"><button class="close-modal">←</button><h3>${title} (${list.length})</h3></div><div class="user-list">${list.map(e => { const u = getUser(e); return u ? '<div class="user-item"><div class="user-item-avatar">'+(u.avatar?'<img src="'+u.avatar+'">':'👤')+'</div><div class="user-item-info"><div class="user-item-name">'+u.nickname+'</div></div></div>' : ''; }).join('')}${!list.length?'<div class="empty-state"><p>Пока никого</p></div>':''}</div>`;
            document.body.appendChild(modal);
            modal.querySelector('.close-modal').addEventListener('click', () => document.body.removeChild(modal));
        }

        document.getElementById('topSearchInput').addEventListener('input', function() {
            const f = this.value.trim().toLowerCase(); if (!f) { renderFeed(); return; }
            const container = document.getElementById('feedContainer');
            const results = DB.posts.filter(p => { const a = getUser(p.author); return a && a.nickname.toLowerCase().includes(f); }).sort((a,b) => b.id.localeCompare(a.id));
            if (!results.length) { container.innerHTML = '<div class="empty-state"><p>Ничего не найдено</p></div>'; return; }
            container.innerHTML = results.map(post => { const a = getUser(post.author); return `<div class="post-card"><div class="post-media">${post.type==='image'?'<img src="'+post.urls[0]+'">':'<video src="'+post.urls[0]+'"></video>'}</div><div class="post-header"><div class="post-avatar-small">${a?.avatar?'<img src="'+a.avatar+'">':'👤'}</div><span class="post-username">${a?.nickname}</span></div><div class="post-footer"><div class="post-date">📅 ${formatDate(post.created)}</div></div></div>`; }).join('');
        });

        function formatDate(d) { if (!d) return ''; const dt = new Date(d), m = ['января','февраля','марта','апреля','мая','июня','июля','августа','сентября','октября','ноября','декабря']; return dt.getDate() + ' ' + m[dt.getMonth()] + ' ' + dt.getFullYear(); }
        function timeAgo(iso) { if (!iso) return ''; const s = Math.floor((new Date() - new Date(iso)) / 1000); if (s < 60) return 'только что'; if (s < 3600) return Math.floor(s/60)+' мин'; if (s < 86400) return Math.floor(s/3600)+' ч'; return Math.floor(s/86400)+' дн'; }
    </script>
</body>
</html>
