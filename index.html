
<!DOCTYPE html>

    <title>LifeTok</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body.light-theme .profile-back-btn { color: #1a1a1a; }

        body.light-theme .profile-title { color: #1a1a1a; }

        body.light-theme .comment-delete-btn:hover { background: rgba(255,0,51,0.1); }
        body.light-theme .post-delete-btn { color: #ff0033; }
        body.light-theme .carousel-dot { background: rgba(0,0,0,0.3); }
        body.light-theme .carousel-dot.active { background: #ff0033; }

        body.green-theme .bottom-nav .nav-item.active { color: #00c853; }
        body.green-theme .tiktok-subscribe-btn { background: #00c853; }
        body.green-theme .video-progress .progress-bar { background: #00c853; }
        body.green-theme .create-btn { background: #00c853; box-shadow: 0 4px 20px rgba(0,200,83,0.4); }
        body.green-theme .settings-item .toggle-btn.active { background: #00c853; }

        body.green-theme .profile-tab.active { color: #00c853; border-bottom-color: #00c853; }
        body.green-theme .modal-comment-input button { background: #00c853; }
        body.green-theme .carousel-dot.active { background: #00c853; }

        body.pink-theme .bottom-nav .nav-item.active { color: #ff4081; }
        body.pink-theme .tiktok-subscribe-btn { background: #ff4081; }
        body.pink-theme .video-progress .progress-bar { background: #ff4081; }
        body.pink-theme .create-btn { background: #ff4081; box-shadow: 0 4px 20px rgba(255,64,129,0.4); }
        body.pink-theme .settings-item .toggle-btn.active { background: #ff4081; }
        body.pink-theme .auth-btn { background: #ff4081; }
        body.pink-theme .profile-avatar { border-color: #ff4081; box-shadow: 0 0 30px rgba(255,64,129,0.3); }
        body.pink-theme .profile-tab.active { color: #ff4081; border-bottom-color: #ff4081; }
        body.pink-theme .modal-comment-input button { background: #ff4081; }

        .splash-screen {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
            flex-direction: column;
            gap: 20px;
            z-index: 1000;
            overflow: hidden;
        }
        .particles {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        .particle {
            position: absolute;
            background: #ff0033;
            border-radius: 50%;
            animation: floatUp 3s infinite;
            opacity: 0;
        }
        @keyframes floatUp {
            0% { transform: translateY(100vh) scale(0); opacity: 0; }
            20% { opacity: 1; }
            80% { opacity: 1; }
            100% { transform: translateY(-100px) scale(1.5); opacity: 0; }
        }
        .logo-rings {
            position: relative;
            width: 200px;
            height: 200px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .ring {
            position: absolute;
            border: 2px solid #ff0033;
            border-radius: 50%;
            animation: ringPulse 2s infinite;
        }
        .ring:nth-child(1) { width: 100px; height: 100px; animation-delay: 0s; }
        .ring:nth-child(2) { width: 140px; height: 140px; animation-delay: 0.3s; }
        .ring:nth-child(3) { width: 180px; height: 180px; animation-delay: 0.6s; }
        @keyframes ringPulse {
            0% { transform: scale(0.8); opacity: 1; border-color: #ff0033; }
            50% { transform: scale(1.2); opacity: 0.3; border-color: #cc0033; }
            100% { transform: scale(0.8); opacity: 1; border-color: #ff0033; }
        }
        .splash-logo {
            font-size: 4.5em;
            font-weight: 900;
            letter-spacing: 6px;
            background: linear-gradient(135deg, #ff0033 0%, #cc0033 50%, #ff0033 100%);
            background-size: 200% 200%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: logoShine 2s ease infinite, logoBounce 1s ease-out;
            position: relative;
            z-index: 2;
        }
        @keyframes logoShine {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        @keyframes logoBounce {
            0% { transform: scale(0) rotate(-180deg); opacity: 0; }
            60% { transform: scale(1.2) rotate(10deg); opacity: 1; }
            80% { transform: scale(0.9) rotate(-5deg); }
            100% { transform: scale(1) rotate(0deg); }
        }
        .splash-subtitle {
            color: #ff0033;
            font-size: 0.9em;
            letter-spacing: 8px;
            animation: subtitleReveal 1.5s ease-out 0.5s both;
            position: relative;
            z-index: 2;
        }
        @keyframes subtitleReveal {
            0% { opacity: 0; letter-spacing: 20px; }
            100% { opacity: 1; letter-spacing: 8px; }
        }
        .splash-line {
            width: 0;
            height: 3px;
            background: linear-gradient(90deg, transparent, #ff0033, #cc0033, #ff0033, transparent);
            animation: lineExpand 1s ease-out 0.8s both;
            border-radius: 2px;
        }
        @keyframes lineExpand {
            0% { width: 0; }
            100% { width: 200px; }
        }
        .loading-dots {
            display: flex;
            gap: 8px;
            margin-top: 20px;
            position: relative;
            z-index: 2;
        }
        .loading-dot {
            width: 8px;
            height: 8px;
            background: #ff0033;
            border-radius: 50%;
            animation: dotBounce 1.4s infinite;
        }
        .loading-dot:nth-child(2) { animation-delay: 0.2s; }
        .loading-dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes dotBounce {
            0%, 80%, 100% { transform: scale(0); opacity: 0.3; }
            40% { transform: scale(1); opacity: 1; }
        }

        .auth-screen {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background: linear-gradient(180deg, #1a0000 0%, #000 100%);
            z-index: 999;
        }
        .auth-box { width: 100%; max-width: 350px; text-align: center; }
        .auth-logo { font-size: 3.5em; font-weight: 900; letter-spacing: 4px; background: linear-gradient(135deg, #ff0033, #cc0033); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; margin-bottom: 5px; }
        .auth-subtitle { color: #666; font-size: 0.75em; letter-spacing: 6px; margin-bottom: 35px; }
        .auth-input { width: 100%; background: #1a1a1a; border: 1px solid #2a2a2a; color: #fff; padding: 14px 16px; border-radius: 10px; font-size: 0.95em; margin-bottom: 12px; outline: none; }
        .auth-input:focus { border-color: #ff0033; }
        .auth-input::placeholder { color: #555; }
        .auth-btn { width: 100%; background: #ff0033; color: #fff; border: none; padding: 14px; border-radius: 10px; font-size: 1em; font-weight: 700; cursor: pointer; margin-top: 5px; }
        .auth-switch { color: #888; font-size: 0.85em; margin-top: 18px; }
        .auth-switch span { color: #ff0033; cursor: pointer; font-weight: 600; }
        .remember-row { display: flex; align-items: center; gap: 8px; color: #888; font-size: 0.8em; margin-bottom: 12px; cursor: pointer; }
        .remember-row input { accent-color: #ff0033; }
        .saved-accounts { margin-top: 25px; padding-top: 20px; border-top: 1px solid #1a1a1a; text-align: left; }
        .saved-title { color: #555; font-size: 0.7em; margin-bottom: 12px; text-align: center; letter-spacing: 3px; }
        .saved-item { display: flex; align-items: center; padding: 14px 12px; background: #1a1a1a; border-radius: 14px; margin-bottom: 8px; cursor: pointer; gap: 12px; transition: all 0.2s; border: 1px solid transparent; }
        .saved-item:hover { background: #222; border-color: #ff0033; }
        .saved-avatar { width: 44px; height: 44px; border-radius: 50%; background: linear-gradient(135deg, #ff0033, #cc0033); display: flex; align-items: center; justify-content: center; font-size: 1.2em; overflow: hidden; flex-shrink: 0; border: 2px solid #2a2a2a; }
        .saved-avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
        .saved-info { flex: 1; min-width: 0; }
        .saved-name { font-weight: 600; font-size: 0.95em; color: #fff; }
        .saved-email { font-size: 0.75em; color: #888; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .saved-remove { background: none; border: none; color: #555; cursor: pointer; font-size: 0.9em; padding: 8px 10px; border-radius: 8px; }
        .saved-remove:hover { color: #ff0033; background: rgba(255,0,51,0.1); }
        .error-msg { color: #ff4757; font-size: 0.8em; margin-bottom: 10px; display: none; }
        .success-msg { color: #ff0033; font-size: 0.8em; margin-bottom: 10px; display: none; }

        .main-screen {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: #000;
            z-index: 100;
        }
        .main-screen.active { display: block; }
        .tiktok-container {
            position: relative;
            width: 100%;
            height: 100vh;
            overflow: hidden;
            background: #000;
        }
        .tiktok-wrapper {
            position: relative;
            width: 100%;
            height: 100%;
            overflow-y: scroll;
            scroll-snap-type: y mandatory;
            -webkit-overflow-scrolling: touch;
            scroll-behavior: smooth;
        }
        .tiktok-wrapper::-webkit-scrollbar { display: none; }
        .tiktok-item {
            position: relative;
            width: 100%;
            height: 100vh;
            scroll-snap-align: start;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
            overflow: hidden;
        }
        .carousel-container {
            position: relative;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
        }
        .carousel-track {
            display: flex;
            width: 100%;
            height: 100%;
            transition: transform 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }
        .carousel-slide {
            min-width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
            flex-shrink: 0;
        }
        .carousel-slide img {
            max-width: 100%;
            max-height: 100%;
            width: auto;
            height: auto;
            object-fit: contain;
        }
        .carousel-dots {
            position: absolute;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 8px;
            z-index: 10;
            background: rgba(0,0,0,0.5);
            padding: 5px 12px;
            border-radius: 20px;
            backdrop-filter: blur(4px);
        }
        .carousel-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: rgba(255,255,255,0.3);
            cursor: pointer;
            border: none;
            padding: 0;
            transition: all 0.3s;
        }
        .carousel-dot.active {
            background: #ff0033;
            transform: scale(1.3);
        }
        .carousel-arrow {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(0,0,0,0.4);
            color: #fff;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            font-size: 1.5em;
            cursor: pointer;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(4px);
            opacity: 0.8;
        }
        .carousel-arrow:hover { background: rgba(255,255,255,0.2); opacity: 1; }
        .carousel-arrow.left { left: 10px; }
        .carousel-arrow.right { right: 10px; }

        .tiktok-overlay {
            position: absolute;
            bottom: 100px;
            left: 0;
            right: 0;
            padding: 0 15px;
            background: linear-gradient(transparent, rgba(0,0,0,0.7) 60%);
            pointer-events: none;
        }
        .tiktok-overlay .user-info {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
            pointer-events: auto;
            background: rgba(0,0,0,0.3);
            padding: 6px 12px 6px 6px;
            border-radius: 30px;
            max-width: 95%;
            backdrop-filter: blur(4px);
        }
        .tiktok-overlay .user-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: linear-gradient(135deg, #ff0033, #cc0033);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1em;
            overflow: hidden;
            border: 2px solid rgba(255,255,255,0.3);
            cursor: pointer;
            flex-shrink: 0;
        }
        .tiktok-overlay .user-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .tiktok-overlay .user-name { 
            font-weight: 700; 
            font-size: 0.9em; 
            color: #fff; 
            cursor: pointer;
            white-space: nowrap;
        }
        .tiktok-overlay .user-name span { 
            color: rgba(255,255,255,0.6); 
            font-weight: 400; 
            font-size: 0.7em;
            margin-left: 6px;
        }
        .tiktok-overlay .post-caption { 
            font-size: 0.85em; 
            opacity: 0.9; 
            margin-bottom: 4px; 
            color: #fff;
            background: rgba(0,0,0,0.5);
            padding: 6px 12px;
            border-radius: 10px;
            display: inline-block;
            max-width: 90%;
            backdrop-filter: blur(4px);
            margin-top: 4px;
        }
        .tiktok-actions {
            position: absolute;
            right: 12px;
            bottom: 150px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 18px;
            pointer-events: none;
        }
        .tiktok-actions button {
            pointer-events: auto;
            background: none;
            border: none;
            color: #fff;
            font-size: 1.8em;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.8);
            transition: transform 0.2s;
        }
        .tiktok-actions button:active { transform: scale(0.8); }
        .tiktok-actions button .count { font-size: 0.35em; font-weight: 600; }
        .tiktok-subscribe-btn {
            pointer-events: auto;
            background: #ff0033;
            color: #fff;
            border: none;
            padding: 4px 14px;
            border-radius: 6px;
            font-size: 0.7em;
            font-weight: 700;
            cursor: pointer;
            margin-left: 8px;
            flex-shrink: 0;
        }
        .tiktok-subscribe-btn.subscribed {
            background: rgba(255,255,255,0.15);
            color: #fff;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .video-progress {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: rgba(255,255,255,0.2);
            z-index: 5;
        }
        .video-progress .progress-bar {
            height: 100%;
            background: #ff0033;
            width: 0%;
            transition: width 0.1s linear;
        }

        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0,0,0,0.9);
            border-top: 1px solid rgba(255,255,255,0.05);
            display: flex;
            z-index: 200;
            padding: 6px 0 12px;
        }
        .nav-item {
            flex: 1;
            text-align: center;
            cursor: pointer;
            color: #666;
            font-size: 0.6em;
            padding: 5px;
            transition: color 0.2s;
        }
        .nav-item.active { color: #ff0033; }
        .nav-icon { font-size: 1.6em; display: block; margin-bottom: 2px; }

        .search-page {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: #000;
            z-index: 150;
            padding-top: 0;
        }
        .search-page.active { display: block; }
        .search-header {
            display: flex;
            align-items: center;
            padding: 10px 15px;
            background: #000;
            border-bottom: 1px solid #1a1a1a;
            gap: 10px;
            position: sticky;
            top: 0;
            z-index: 10;
        }
        .search-back-btn {
            background: none;
            border: none;
            color: #fff;
            font-size: 1.1em;
            cursor: pointer;
            padding: 6px 10px;
            border-radius: 8px;
            white-space: nowrap;
        }
        .search-back-btn:hover { background: rgba(255,255,255,0.1); }
        .search-title { color: #fff; font-weight: 700; font-size: 0.9em; margin-right: 5px; }
        .search-header input {
            flex: 1;
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            color: #fff;
            padding: 10px 14px;
            border-radius: 12px;
            font-size: 0.9em;
            outline: none;
            min-width: 0;
        }
        .search-header input:focus { border-color: #ff0033; }
        .search-results { padding: 15px; overflow-y: auto; height: calc(100vh - 60px); }
        .search-user-item { display: flex; align-items: center; padding: 12px 10px; gap: 12px; border-bottom: 1px solid #111; cursor: pointer; }
        .search-user-avatar { width: 44px; height: 44px; border-radius: 50%; background: linear-gradient(135deg, #ff0033, #cc0033); display: flex; align-items: center; justify-content: center; font-size: 1.2em; overflow: hidden; flex-shrink: 0; }

        var currentLang = localStorage.getItem('lifetok_lang') || 'ru';
        var currentTheme = localStorage.getItem('lifetok_theme') || 'dark';

        function t(key) {
            return translations[currentLang] && translations[currentLang][key] ? translations[currentLang][key] : key;
        }

        function applyTheme(theme) {
            document.body.classList.remove('light-theme', 'green-theme', 'pink-theme');
            if (theme === 'light') document.body.classList.add('light-theme');
            else if (theme === 'green') document.body.classList.add('green-theme');
            else if (theme === 'pink') document.body.classList.add('pink-theme');
            localStorage.setItem('lifetok_theme', theme);
            currentTheme = theme;
            document.querySelectorAll('.theme-btns .toggle-btn').forEach(function(b) {
                b.classList.toggle('active', b.dataset.theme === theme);
            });
        }
        applyTheme(currentTheme);

        (function() {
            var imageStorage = {};
            var data = loadData();
            var savedAccounts = JSON.parse(localStorage.getItem('lifetok_saved') || '[]');
            var currentUser = null;
            var currentFeed = 'all';
            var currentVideoIndex = 0;
            var videoElements = [];

            function loadData() {
                try {
                    var stored = localStorage.getItem('lifetok_data');
                    if (stored) return JSON.parse(stored);
                } catch(e) {}
                return { users: {}, posts: [], comments: {} };
            }

            function saveFullData() {
                try {
                    var dataToSave = {
                        users: data.users,
                        posts: data.posts.map(function(p) {
                            var postCopy = { ...p };
                            if (postCopy.type === 'carousel' && postCopy.images) {
                                postCopy.images = postCopy.images.map(function(img) {
                                    if (img && img.length > 100000) return 'stored_in_db';
                                    return img;
                                });
                            }
                            return postCopy;
                        }),
                        comments: data.comments
                    };
                    localStorage.setItem('lifetok_data', JSON.stringify(dataToSave));
                } catch(e) {
                    console.warn('Ошибка сохранения:', e);
                }
            }

            function renderSavedAccounts() {
                var c = document.getElementById('savedAccounts');
                var l = document.getElementById('savedAccountsList');
                if (!savedAccounts.length) { c.style.display = 'none'; return; }
                c.style.display = 'block';
                l.innerHTML = savedAccounts.map(function(a) {
                    return '<div class="saved-item" data-email="'+a.email+'">'+
                        '<div class="saved-avatar">'+(a.avatar?'<img src="'+a.avatar+'">':'👤')+'</div>'+
                        '<div class="saved-info"><div class="saved-name">'+a.nickname+'</div><div class="saved-email">'+a.email+'</div></div>'+
                        '<button class="saved-remove" data-remove="'+a.email+'">✕</button>'+
                    '</div>';
                }).join('');
                l.querySelectorAll('.saved-item').forEach(function(i) {
                    i.addEventListener('click', function(e) {
                        if (e.target.classList.contains('saved-remove')) return;
                        var email = this.dataset.email;
                        if (data.users[email]) {
                            currentUser = email;
                            document.getElementById('rememberMe').checked = true;
                            saveCurrentAccount(email, true);
                            document.getElementById('authSuccess').textContent = 'Вход...';
                            document.getElementById('authSuccess').style.display = 'block';
                            setTimeout(enterApp, 400);
                        }
                    });
                });
                l.querySelectorAll('.saved-remove').forEach(function(b) {
                    b.addEventListener('click', function(e) {
                        e.stopPropagation();
                        if (confirm('Удалить?')) {
                            savedAccounts = savedAccounts.filter(function(a) { return a.email !== b.dataset.remove; });
                            localStorage.setItem('lifetok_saved', JSON.stringify(savedAccounts));
                            renderSavedAccounts();
                        }
                    });
                });
            }

            function saveCurrentAccount(email, remember) {
                if (remember) {
                    var ex = savedAccounts.find(function(a) { return a.email === email; });
                    if (!ex) savedAccounts.push({ email: email, nickname: data.users[email].nickname, avatar: data.users[email].avatar });
                    else { ex.nickname = data.users[email].nickname; ex.avatar = data.users[email].avatar; }
                    localStorage.setItem('lifetok_saved', JSON.stringify(savedAccounts));
                    localStorage.setItem('lifetok_user', JSON.stringify({ email: email, timestamp: Date.now() }));
                } else {
                    savedAccounts = savedAccounts.filter(function(a) { return a.email !== email; });
                    localStorage.setItem('lifetok_saved', JSON.stringify(savedAccounts));
                    localStorage.removeItem('lifetok_user');
                }
            }

            function tryAutoLogin() {
                try {
                    var s = JSON.parse(localStorage.getItem('lifetok_user') || 'null');
                    if (s && s.email && data.users[s.email]) {
                        currentUser = s.email;
                        return true;
                    }
                } catch(e) {}
                return false;
            }

            var splash = document.getElementById('splashScreen');

            setTimeout(function() {
                splash.style.display = 'none';
                if (tryAutoLogin()) {
                    enterApp();
                } else {
                    document.getElementById('authScreen').style.display = 'flex';
                    renderSavedAccounts();
                }
            }, 2000);

            document.getElementById('authSwitch').addEventListener('click', function() {
                var b = document.getElementById('authBtn');
                var isLogin = b.textContent === 'Войти' || b.textContent === 'Login' || b.textContent === '登录';
                b.textContent = isLogin ? 'Зарегистрироваться' : 'Войти';
                document.getElementById('authError').style.display = 'none';
                document.getElementById('authSuccess').style.display = 'none';
                document.getElementById('authNickname').style.display = isLogin ? 'block' : 'block';
            });

            document.getElementById('authBtn').addEventListener('click', function() {
                var email = document.getElementById('authEmail').value.trim();
                var nickname = document.getElementById('authNickname').value.trim();
                var password = document.getElementById('authPassword').value.trim();
                var err = document.getElementById('authError');
                var suc = document.getElementById('authSuccess');
                err.style.display = 'none';
                suc.style.display = 'none';
                if (!email || !password) {
                    err.textContent = 'Заполните почту и пароль';
                    err.style.display = 'block';
                    return;
                }
                var isLogin = document.getElementById('authBtn').textContent === 'Войти' || document.getElementById('authBtn').textContent === 'Login' || document.getElementById('authBtn').textContent === '登录';
                if (isLogin) {
                    var user = data.users[email];
                    if (!user || user.password !== password) {
                        err.textContent = 'Неверная почта или пароль';
                        err.style.display = 'block';
                        return;
                    }
                    currentUser = email;
                    var remember = document.getElementById('rememberMe').checked;
                    saveCurrentAccount(email, remember);
                    suc.textContent = 'Вход выполнен!';
                    suc.style.display = 'block';
                    setTimeout(enterApp, 400);
                } else {
                    if (!nickname) {
                        err.textContent = 'Введите никнейм';
                        err.style.display = 'block';
                        return;
                    }
                    if (data.users[email]) {
                        err.textContent = 'Этот email уже используется';
                        err.style.display = 'block';
                        return;
                    }
                    data.users[email] = {
                        email: email,
                        nickname: nickname,
                        password: password,
                        avatar: null,
                        bio: '',
                        followers: [],
                        following: []
                    };
                    data.posts = data.posts || [];
                    data.comments = data.comments || {};
                    saveFullData();
                    currentUser = email;
                    var remember = document.getElementById('rememberMe').checked;
                    saveCurrentAccount(email, remember);
                    suc.textContent = 'Аккаунт создан!';
                    suc.style.display = 'block';
                    setTimeout(enterApp, 400);
                }
            });

            function enterApp() {
                document.getElementById('authScreen').style.display = 'none';
                document.getElementById('mainScreen').classList.add('active');
                data = loadData();
                renderTikTokFeed();
                renderProfile();
                setupNavigation();
                setupSearch();
                setupCreateButtons();
                setupSettings();
                updateUITexts();
                updateSettingsAccount();
            }

            function setupSettings() {
                var panel = document.getElementById('settingsPanel');
                var overlay = document.getElementById('settingsOverlay');
                var closeBtn = document.getElementById('settingsClose');

                window.openSettings = function() {
                    panel.classList.add('open');
                    overlay.classList.add('open');
                    updateSettingsAccount();
                };

                closeBtn.addEventListener('click', function() {
                    panel.classList.remove('open');
                    overlay.classList.remove('open');
                });
                overlay.addEventListener('click', function() {
                    panel.classList.remove('open');
                    overlay.classList.remove('open');
                });

                document.querySelectorAll('.theme-btns .toggle-btn').forEach(function(btn) {
                    btn.addEventListener('click', function() {
                        var theme = this.dataset.theme;
                        applyTheme(theme);
                        localStorage.setItem('lifetok_theme', theme);
                        document.querySelectorAll('.theme-btns .toggle-btn').forEach(function(b) {
                            b.classList.toggle('active', b.dataset.theme === theme);
                        });
                    });
                });

                document.getElementById('languageSelect').addEventListener('change', function() {
                    currentLang = this.value;
                    localStorage.setItem('lifetok_lang', currentLang);
                    updateUITexts();
                    renderProfile();
                    renderTikTokFeed();
                });
                document.getElementById('languageSelect').value = currentLang;
            }

            function updateUITexts() {
                document.querySelectorAll('.nav-item').forEach(function(item) {
                    var page = item.dataset.page;
                    var icons = { feed: '🏠', search: '🔍', profile: '👤' };
                    var labels = { feed: t('feed'), search: t('search'), profile: t('profile') };
                    item.innerHTML = '<span class="nav-icon">' + icons[page] + '</span>' + labels[page];
                });
                document.getElementById('searchInput').placeholder = t('searchPlaceholder');
                document.querySelector('.settings-title').textContent = t('settings');
                document.querySelectorAll('.settings-item .label').forEach(function(label) {
                    var text = label.textContent.trim();
                    if (text === 'Тема' || text === 'Theme' || text === '主题') label.textContent = t('theme');
                    else if (text === 'Язык' || text === 'Language' || text === '语言') label.textContent = t('language');
                    else if (text === 'Версия' || text === 'Version' || text === '版本') label.textContent = t('version');
                    else if (text === 'Аккаунт' || text === 'Account' || text === '账户') label.textContent = t('account');
                });
                document.querySelectorAll('.theme-btns .toggle-btn').forEach(function(btn) {
                    var theme = btn.dataset.theme;
                    var labels = { dark: '🌙 ' + t('dark'), light: '☀️ ' + t('light'), green: '🌿 ' + t('green'), pink: '🌸 ' + t('pink') };
                    var nameSpan = btn.querySelector('.theme-name');
                    if (nameSpan) nameSpan.textContent = labels[theme] || theme;
                });
                updateAuthTexts();
            }

            function updateAuthTexts() {
                var btn = document.getElementById('authBtn');
                var isLogin = btn.textContent === 'Войти' || btn.textContent === 'Login' || btn.textContent === '登录';
                btn.textContent = isLogin ? t('login') : t('register');
                document.getElementById('authEmail').placeholder = t('email');
                document.getElementById('authNickname').placeholder = t('nickname');
                document.getElementById('authPassword').placeholder = t('password');
                document.querySelector('.remember-row').innerHTML = '<input type="checkbox" id="rememberMe" checked> ' + t('remember');
                document.querySelector('.auth-switch span').textContent = t('createAccount');
            }

            function updateSettingsAccount() {
                var el = document.getElementById('settingsAccount');
                if (el && currentUser && data.users[currentUser]) {
                    el.textContent = currentUser;
                }
            }

            function setupNavigation() {
                document.querySelectorAll('.nav-item').forEach(function(n) {
                    n.addEventListener('click', function() {
                        document.querySelectorAll('.nav-item').forEach(function(n2) { n2.classList.remove('active'); });
                        this.classList.add('active');
                        var page = this.dataset.page;
                        document.getElementById('searchPage').classList.remove('active');
                        document.getElementById('profilePage').classList.remove('active');
                        document.getElementById('tiktokContainer').style.display = 'none';
                        if (page === 'feed') {
                            document.getElementById('tiktokContainer').style.display = 'block';
                            renderTikTokFeed();
                        } else if (page === 'search') {
                            document.getElementById('searchPage').classList.add('active');
                            document.getElementById('searchInput').focus();
                        } else if (page === 'profile') {
                            document.getElementById('profilePage').classList.add('active');
                            renderProfile();
                        }
                    });
                });
            }

            function goBackFromSearch() {
                document.getElementById('searchPage').classList.remove('active');
                document.getElementById('tiktokContainer').style.display = 'block';
                document.querySelectorAll('.nav-item').forEach(function(n) {
                    n.classList.remove('active');
                    if (n.dataset.page === 'feed') n.classList.add('active');
                });
                document.getElementById('searchInput').value = '';
                document.getElementById('searchResults').innerHTML = '';
            }

            function goBackFromProfile() {
                document.getElementById('profilePage').classList.remove('active');
                document.getElementById('tiktokContainer').style.display = 'block';
                document.querySelectorAll('.nav-item').forEach(function(n) {
                    n.classList.remove('active');
                    if (n.dataset.page === 'feed') n.classList.add('active');
                });
            }

            window.goBackFromSearch = goBackFromSearch;
            window.goBackFromProfile = goBackFromProfile;

            function setupSearch() {
                document.getElementById('searchInput').addEventListener('input', function() {
                    var query = this.value.trim().toLowerCase();
                    var results = document.getElementById('searchResults');
                    if (!query) { results.innerHTML = ''; return; }
                    var users = Object.values(data.users).filter(function(u) {
                        return u.email !== currentUser && (u.nickname.toLowerCase().includes(query) || u.email.toLowerCase().includes(query));
                    });
                    if (users.length === 0) {
                        results.innerHTML = '<div style="text-align:center;color:#444;padding:20px;">'+t('nothingFound')+'</div>';
                        return;
                    }
                    results.innerHTML = users.map(function(u) {
                        return '<div class="search-user-item" onclick="showUserProfile(\''+u.email+'\')">'+
                            '<div class="search-user-avatar">'+(u.avatar?'<img src="'+u.avatar+'">':'👤')+'</div>'+
                            '<div class="search-user-info"><div class="search-user-name">'+u.nickname+'</div><div class="search-user-email">'+u.email+'</div></div>'+
                        '</div>';
                    }).join('');
                });
            }

            // === СОЗДАНИЕ ПОСТОВ (ТОЛЬКО 1 ФОТО) ===
            function setupCreateButtons() {
                var createBtn = document.getElementById('createBtn');
                var createMenu = document.getElementById('createMenu');

                createBtn.addEventListener('click', function() {
                    createMenu.classList.toggle('hidden');
                });

                document.getElementById('createPhotoBtn').addEventListener('click', function() {
                    createMenu.classList.add('hidden');
                    var input = document.getElementById('fileInput');
                    input.accept = 'image/*';
                    input.multiple = false;
                    input.value = '';
                    
                    input.onchange = function(e) {
                        var file = e.target.files[0];
                        if (!file) {
                            input.value = '';
                            return;
                        }
                        
                        var reader = new FileReader();
                        reader.onload = function(ev) {
                            showPostModal('photo', [ev.target.result], null);
                        };
                        reader.readAsDataURL(file);
                        input.value = '';
                    };
                    input.click();
                });

                document.getElementById('createVideoBtn').addEventListener('click', function() {
                    createMenu.classList.add('hidden');
                    var input = document.getElementById('fileInput');
                    input.accept = 'video/*';
                    input.multiple = false;
                    input.value = '';
                    input.onchange = function(e) {
                        if (e.target.files && e.target.files.length > 0) {
                            var file = e.target.files[0];
                            var reader = new FileReader();
                            reader.onload = function(ev) {
                                showPostModal('video', [ev.target.result], file);
                            };
                            reader.readAsDataURL(file);
                        }
                        input.value = '';
                    };
                    input.click();
                });
            }

            function showPostModal(type, mediaData, videoBlob) {
                if (window._postData && window._postData.modal) {
                    window._postData.modal.remove();
                    window._postData = null;
                }

                var modal = document.createElement('div');
                modal.className = 'modal-overlay post-modal';

                var isVideo = type === 'video';
                var isPhoto = type === 'photo';
                var mediaItems = mediaData || [];

                var previewHtml = '';
                if (isVideo && mediaData && mediaData[0]) {
                    previewHtml = '<div class="preview-grid"><div class="preview-item"><video src="' + mediaData[0] + '" controls style="width:100%;height:100%;object-fit:cover;"></video></div></div>';
                } else if (isPhoto && mediaItems.length > 0) {
                    previewHtml = '<div class="preview-grid"><div class="preview-item"><img src="' + mediaItems[0] + '" style="width:100%;height:100%;object-fit:cover;"></div></div>';
                }

                modal.innerHTML = 
                    '<div class="modal-header"><div class="modal-title">' + t('addCaption') + '</div><button onclick="closePostModal()">✕</button></div>' +
                    '<div style="display:flex;flex-direction:column;align-items:center;padding:20px;flex:1;overflow-y:auto;">' +
                    previewHtml +
                    '<textarea class="caption-input" id="captionTextarea" placeholder="' + t('enterCaption') + '" rows="3"></textarea>' +
                    '<div class="btn-row">' +
                    '<button class="cancel-btn" onclick="closePostModal()">' + t('cancel') + '</button>' +
                    '<button class="publish-btn" onclick="publishPost()">' + t('publish') + '</button>' +
                    '</div>' +
                    '</div>';
                document.body.appendChild(modal);

                window._postData = {
                    type: type,
                    media: mediaItems || [],
                    videoBlob: videoBlob || null,
                    modal: modal
                };

                window.closePostModal = function() {
                    if (window._postData && window._postData.modal) {
                        window._postData.modal.remove();
                    }
                    window._postData = null;
                };

                window.publishPost = function() {
                    var textarea = document.getElementById('captionTextarea');
                    var caption = textarea ? textarea.value.trim() : '';
                    var postType = window._postData ? window._postData.type : 'photo';
                    var media = window._postData ? window._postData.media : [];

                    if (media.length === 0) {
                        alert('Выберите фото или видео!');
                        return;
                    }

                    var id = Date.now() + '_' + Math.random().toString(36).substr(2, 6);

                    if (postType === 'photo') {
                        imageStorage[id] = media;
                    }

                    var post = {
                        id: id,
                        author: currentUser,
                        type: postType === 'video' ? 'video' : 'carousel',
                        images: postType === 'photo' ? media : [],
                        content: postType === 'video' ? (media[0] || '') : '',
                        timestamp: new Date().toISOString(),
                        likes: [],
                        caption: caption,
                        thumbnail: media.length > 0 ? media[0] : null
                    };
                    data.posts.push(post);
                    saveFullData();

                    if (window._postData && window._postData.modal) {
                        window._postData.modal.remove();
                    }
                    window._postData = null;

                    renderTikTokFeed();
                    renderProfile();
                };
            }

            function getPostImages(postId) {
                if (imageStorage[postId]) {
                    return imageStorage[postId];
                }
                var post = data.posts.find(function(p) { return p.id === postId; });
                if (post && post.type === 'carousel' && post.images && post.images.length > 0) {
                    return post.images;
                }
                return [];
            }

            function deletePost(postId) {
                if (!confirm(t('delete'))) return;
                var index = data.posts.findIndex(function(p) { return p.id === postId; });
                if (index > -1) {
                    data.posts.splice(index, 1);
                    delete data.comments[postId];
                    delete imageStorage[postId];
                    saveFullData();
                    renderTikTokFeed();
                    renderProfile();
                }
            }

            function likePostTikTok(postId, btn) {
                var post = data.posts.find(function(p) { return p.id === postId; });
                if (!post) return;
                if (!post.likes) post.likes = [];
                var idx = post.likes.indexOf(currentUser);
                if (idx > -1) {
                    post.likes.splice(idx, 1);
                    btn.innerHTML = '🤍<span class="count" id="likeCount_'+postId+'">' + post.likes.length + '</span>';
                } else {
                    post.likes.push(currentUser);
                    btn.innerHTML = '❤️<span class="count" id="likeCount_'+postId+'">' + post.likes.length + '</span>';
                }
                saveFullData();
                renderProfile();
            }

            function showCommentsTikTok(postId) {
                var post = data.posts.find(function(p) { return p.id === postId; });
                if (!post) return;
                var modal = document.createElement('div');
                modal.className = 'modal-overlay';
                modal.innerHTML = '<div class="modal-header"><div class="modal-title">' + t('comments') + '</div><button onclick="this.closest(\'.modal-overlay\').remove()">✕</button></div>' +
                    '<div class="modal-body" id="commentsBody_' + postId + '"></div>' +
                    '<div class="modal-comment-input"><input type="text" id="commentInput_' + postId + '" placeholder="' + t('write') + '"><button onclick="addCommentTikTok(\'' + postId + '\')">➤</button></div>';
                document.body.appendChild(modal);
                renderCommentsTikTok(postId);
            }

            function renderCommentsTikTok(postId) {
                var container = document.getElementById('commentsBody_' + postId);
                if (!container) return;
                var comments = data.comments[postId] || [];
                if (comments.length === 0) {
                    container.innerHTML = '<div style="color:#666;text-align:center;padding:20px;">' + t('noComments') + '</div>';
                    return;
                }
                container.innerHTML = comments.map(function(c, index) {
                    var user = data.users[c.author];
                    var isOwner = c.author === currentUser;
                    var likes = c.likes || [];
                    var isLiked = likes.includes(currentUser);
                    var replies = c.replies || [];
                    
                    var repliesHtml = replies.map(function(r, ri) {
                        var ru = data.users[r.author];
                        var isReplyOwner = r.author === currentUser;
                        var rLikes = r.likes || [];
                        var rIsLiked = rLikes.includes(currentUser);
                        return '<div class="comment-reply modal-comment">' +
                            '<div class="comment-top">' +
                            '<div class="comment-content">' +
                            '<div class="comment-user">' + (ru?.nickname || 'Unknown') + '</div>' +
                            '<div class="comment-text">' + r.text + '</div>' +
                            '<div class="comment-date">' + new Date(r.timestamp).toLocaleString() + '</div>' +
                            '</div>' +
                            (isReplyOwner ? '<button class="comment-delete-btn" onclick="deleteReply(\''+postId+'\','+index+','+ri+')">✕</button>' : '') +
                            '</div>' +
                            '<div class="comment-actions">' +
                            '<button class="like-btn' + (rIsLiked ? ' liked' : '') + '" onclick="likeComment(\''+postId+'\','+index+','+ri+', this)">' + t('likes') + ' ' + rLikes.length + '</button>' +
                            '</div>' +
                            '</div>';
                    }).join('');

                    return '<div class="modal-comment">' +
                        '<div class="comment-top">' +
                        '<div class="comment-content">' +
                        '<div class="comment-user">' + (user?.nickname || 'Unknown') + '</div>' +
                        '<div class="comment-text">' + c.text + '</div>' +
                        '<div class="comment-date">' + new Date(c.timestamp).toLocaleString() + '</div>' +
                        '</div>' +
                        (isOwner ? '<button class="comment-delete-btn" onclick="deleteComment(\''+postId+'\','+index+')">✕</button>' : '') +
                        '</div>' +
                        '<div class="comment-actions">' +
                        '<button class="like-btn' + (isLiked ? ' liked' : '') + '" onclick="likeComment(\''+postId+'\','+index+',null, this)">' + t('likes') + ' ' + likes.length + '</button>' +
                        '<button onclick="showReplyInput(\''+postId+'\','+index+')">' + t('reply') + '</button>' +
                        '</div>' +
                        '<div id="replyInput_' + postId + '_' + index + '" style="display:none;margin-top:8px;display:flex;gap:8px;">' +
                        '<input type="text" placeholder="' + t('write') + '" style="flex:1;background:#1a1a1a;border:1px solid #2a2a2a;color:#fff;padding:8px 12px;border-radius:8px;font-size:0.85em;outline:none;">' +
                        '<button onclick="addReply(\''+postId+'\','+index+', this.previousElementSibling)" style="background:#ff0033;color:#fff;border:none;padding:8px 14px;border-radius:8px;cursor:pointer;">➤</button>' +
                        '</div>' +
                        repliesHtml +
                        '</div>';
                }).join('');
                
                container.querySelectorAll('[id^="replyInput_"]').forEach(function(el) {
                    el.style.display = 'none';
                });
            }

            function showReplyInput(postId, commentIndex) {
                var el = document.getElementById('replyInput_' + postId + '_' + commentIndex);
                if (el) {
                    el.style.display = el.style.display === 'none' ? 'flex' : 'none';
                    if (el.style.display === 'flex') {
                        el.querySelector('input').focus();
                    }
                }
            }

            function addReply(postId, commentIndex, input) {
                if (!input || !input.value.trim()) return;
                if (!data.comments[postId]) data.comments[postId] = [];
                if (!data.comments[postId][commentIndex]) data.comments[postId][commentIndex] = { text: '', author: '', timestamp: '', likes: [], replies: [] };
                if (!data.comments[postId][commentIndex].replies) data.comments[postId][commentIndex].replies = [];
                data.comments[postId][commentIndex].replies.push({
                    author: currentUser,
                    text: input.value.trim(),
                    timestamp: new Date().toISOString(),
                    likes: []
                });
                saveFullData();
                input.value = '';
                renderCommentsTikTok(postId);
            }

            function likeComment(postId, commentIndex, replyIndex, btn) {
                if (!data.comments[postId] || !data.comments[postId][commentIndex]) return;
                var comment = data.comments[postId][commentIndex];
                var target;
                if (replyIndex !== null && replyIndex !== undefined) {
                    if (!comment.replies || !comment.replies[replyIndex]) return;
                    target = comment.replies[replyIndex];
                } else {
                    target = comment;
                }
                if (!target.likes) target.likes = [];
                var idx = target.likes.indexOf(currentUser);
                if (idx > -1) {
                    target.likes.splice(idx, 1);
                } else {
                    target.likes.push(currentUser);
                }
                saveFullData();
                renderCommentsTikTok(postId);
            }

            function deleteReply(postId, commentIndex, replyIndex) {
                if (!confirm(t('delete'))) return;
                if (data.comments[postId] && data.comments[postId][commentIndex] && data.comments[postId][commentIndex].replies) {
                    data.comments[postId][commentIndex].replies.splice(replyIndex, 1);
                    saveFullData();
                    renderCommentsTikTok(postId);
                }
            }

            function addCommentTikTok(postId) {
                var input = document.getElementById('commentInput_' + postId);
                if (!input || !input.value.trim()) return;
                if (!data.comments[postId]) data.comments[postId] = [];
                data.comments[postId].push({ author: currentUser, text: input.value.trim(), timestamp: new Date().toISOString(), likes: [], replies: [] });
                saveFullData();
                input.value = '';
                renderCommentsTikTok(postId);
                var btn = document.querySelector('.tiktok-actions button[onclick*="showCommentsTikTok(\'' + postId + '\')"] .count');
                if (btn) btn.textContent = data.comments[postId].length;
            }

            function deleteComment(postId, commentIndex) {
                if (!confirm(t('delete'))) return;
                if (data.comments[postId] && data.comments[postId][commentIndex]) {
                    data.comments[postId].splice(commentIndex, 1);
                    saveFullData();
                    renderCommentsTikTok(postId);
                    var btn = document.querySelector('.tiktok-actions button[onclick*="showCommentsTikTok(\'' + postId + '\')"] .count');
                    if (btn) btn.textContent = data.comments[postId].length;
                }
            }

            function toggleSubscribe(email, btn) {
                var user = data.users[currentUser];
                if (!user.following) user.following = [];
                var idx = user.following.indexOf(email);
                if (idx > -1) {
                    user.following.splice(idx, 1);
                    btn.textContent = t('subscribe');
                    btn.classList.remove('subscribed');
                } else {
                    user.following.push(email);
                    btn.textContent = t('subscribed');
                    btn.classList.add('subscribed');
                }
                saveFullData();
            }

            function showUserProfile(email) {
                if (email === currentUser) {
                    document.querySelector('[data-page="profile"]').click();
                    return;
                }
                var user = data.users[email];
                if (!user) return;
                var modal = document.createElement('div');
                modal.className = 'modal-overlay';
                var isSubscribed = (data.users[currentUser]?.following || []).includes(email);
                modal.innerHTML = '<div class="modal-header"><button onclick="this.closest(\'.modal-overlay\').remove()">✕</button><span>' + user.nickname + '</span></div>' +
                    '<div style="text-align:center;padding:30px 20px;">' +
                    '<div style="width:80px;height:80px;border-radius:50%;background:linear-gradient(135deg,#ff0033,#cc0033);margin:0 auto 10px;display:flex;align-items:center;justify-content:center;font-size:2em;overflow:hidden;border:3px solid #ff0033;">' + (user.avatar ? '<img src="' + user.avatar + '" style="width:100%;height:100%;object-fit:cover;">' : '👤') + '</div>' +
                    '<div style="font-weight:700;font-size:1.2em;color:#fff;">' + user.nickname + '</div>' +
                    '<div style="color:#888;font-size:0.8em;">' + user.email + '</div>' +
                    (user.bio ? '<div style="color:#aaa;font-size:0.85em;margin-top:5px;">' + user.bio + '</div>' : '') +
                    '<div style="margin-top:15px;"><button class="tiktok-subscribe-btn' + (isSubscribed ? ' subscribed' : '') + '" onclick="toggleSubscribe(\'' + email + '\', this);" style="font-size:0.9em;padding:8px 24px;">' + (isSubscribed ? t('unfollow') : t('subscribe')) + '</button></div>' +
                    '</div>';
                document.body.appendChild(modal);
            }

            function renderProfile(tab) {
                var container = document.getElementById('profileContent');
                var user = data.users[currentUser];
                if (!user) return;
                var posts = data.posts.filter(function(p) { return p.author === currentUser; });
                var likedPosts = data.posts.filter(function(p) { return p.likes && p.likes.includes(currentUser); });
                var followers = Object.values(data.users).filter(function(u) { return u.following && u.following.includes(currentUser); });
                var following = user.following || [];

                var currentTab = tab || 'posts';
                var postsHtml = '';
                var targetPosts = currentTab === 'liked' ? likedPosts : posts;
                targetPosts.sort(function(a, b) { return new Date(b.timestamp) - new Date(a.timestamp); });
                
                if (targetPosts.length === 0) {
                    postsHtml = '<div style="grid-column:1/-1;text-align:center;color:#444;padding:40px;">' + (currentTab === 'liked' ? t('liked') + ' ❤️' : t('noPosts')) + '</div>';
                } else {
                    postsHtml = targetPosts.map(function(post) {
                        var images = getPostImages(post.id);
                        var thumbSrc = post.thumbnail || (images && images[0]) || post.content || '';
                        var isCarousel = post.type === 'carousel' && images && images.length > 1;
                        var isVideo = post.type === 'video';
                        return '<div class="profile-post-thumb" onclick="viewPost(\'' + post.id + '\')">' +
                            (post.author === currentUser ? '<button class="delete-post-btn" onclick="event.stopPropagation();deletePost(\'' + post.id + '\')">✕</button>' : '') +
                            '<img src="' + thumbSrc + '" alt="" onerror="this.src=\'data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22300%22 height=%22300%22%3E%3Crect fill=%22%230a0a0a%22 width=%22300%22 height=%22300%22/%3E%3Ctext x=%22150%22 y=%22160%22 text-anchor=%22middle%22 font-size=%2260%22 fill=%22%23ff0033%22%3E' + (isVideo ? '▶' : '📷') + '%3C/text%3E%3C/svg%3E\'">' +
                            (isVideo ? '<span class="video-badge">▶</span>' : '') +
                            (isCarousel ? '<span class="carousel-badge">📷 ' + images.length + '</span>' : '') +
                            (post.caption ? '<span class="like-badge" style="bottom:24px;">📝</span>' : '') +
                            '<span class="like-badge">❤️ ' + (post.likes ? post.likes.length : 0) + '</span>' +
                            '</div>';
                    }).join('');
                }

                var html = '<div class="profile-header-top"><button class="profile-back-btn" onclick="goBackFromProfile()">← ' + t('back') + '</button><div class="profile-title">' + t('profile') + '</div><button class="profile-settings-btn" onclick="openSettings()">☰</button></div>' +
                    '<div class="profile-header">' +
                    '<div class="profile-avatar" onclick="document.getElementById(\'avatarInput\').click()">' + (user.avatar ? '<img src="' + user.avatar + '">' : '👤') + '</div>' +
                    '<div class="profile-name">' + user.nickname + '</div>' +
                    '<div class="profile-email">' + user.email + '</div>' +
                    '<div class="profile-bio" onclick="editBio()">' + (user.bio || t('editBio')) + '</div>' +
                    '<input class="profile-bio-edit" id="bioInput" value="' + (user.bio || '') + '" placeholder="' + t('bioPlaceholder') + '">' +
                    '<div class="profile-stats">' +
                    '<div class="profile-stat"><div class="profile-stat-num">' + posts.length + '</div><div class="profile-stat-label">' + t('posts') + '</div></div>' +
                    '<div class="profile-stat"><div class="profile-stat-num">' + followers.length + '</div><div class="profile-stat-label">' + t('followers') + '</div></div>' +
                    '<div class="profile-stat"><div class="profile-stat-num">' + following.length + '</div><div class="profile-stat-label">' + t('following') + '</div></div>' +
                    '</div>' +
                    '<button class="profile-logout-btn" onclick="if(confirm(\'' + t('confirmLogout') + '\')){localStorage.removeItem(\'lifetok_user\');location.reload();}">' + t('logout') + '</button>' +
                    '</div>' +
                    '<div class="profile-tabs">' +
                    '<div class="profile-tab' + (currentTab === 'posts' ? ' active' : '') + '" onclick="renderProfile(\'posts\')">📷 ' + t('posts') + '</div>' +
                    '<div class="profile-tab' + (currentTab === 'liked' ? ' active' : '') + '" onclick="renderProfile(\'liked\')">❤️ ' + t('liked') + '</div>' +
                    '</div>' +
                    '<div class="profile-posts-grid">' + postsHtml + '</div>';
                container.innerHTML = html;

                var avatarInput = document.getElementById('avatarInput');
                if (!avatarInput) {
                    avatarInput = document.createElement('input');
                    avatarInput.id = 'avatarInput';
                    avatarInput.type = 'file';
                    avatarInput.accept = 'image/*';
                    avatarInput.style.display = 'none';
                    avatarInput.addEventListener('change', function(e) {
                        if (e.target.files && e.target.files[0]) {
                            var reader = new FileReader();
                            reader.onload = function(ev) {
                                var img = new Image();
                                img.onload = function() {
                                    var canvas = document.createElement('canvas');
                                    var size = Math.min(img.width, img.height);
                                    canvas.width = 200;
                                    canvas.height = 200;
                                    var ctx = canvas.getContext('2d');
                                    var sx = (img.width - size) / 2,
                                        sy = (img.height - size) / 2;
                                    ctx.drawImage(img, sx, sy, size, size, 0, 0, 200, 200);
                                    var dataUrl = canvas.toDataURL('image/jpeg', 0.8);
                                    data.users[currentUser].avatar = dataUrl;
                                    saveFullData();
                                    renderProfile(currentTab);
                                };
                                img.src = ev.target.result;
                            };
                            reader.readAsDataURL(e.target.files[0]);
                        }
                    });
                    document.body.appendChild(avatarInput);
                }
            }

            function editBio() {
                var bioEl = document.querySelector('.profile-bio');
                var inputEl = document.getElementById('bioInput');
                if (!bioEl || !inputEl) return;
                if (inputEl.style.display === 'block') {
                    var newBio = inputEl.value.trim();
                    data.users[currentUser].bio = newBio;
                    saveFullData();
                    renderProfile();
                } else {
                    bioEl.style.display = 'none';
                    inputEl.style.display = 'block';
                    inputEl.focus();
                    inputEl.select();
                    inputEl.onblur = function() { editBio(); };
                    inputEl.onkeydown = function(e) { if (e.key === 'Enter') editBio(); };
                }
            }

            function viewPost(postId) {
                var post = data.posts.find(function(p) { return p.id === postId; });
                if (!post) return;
                var modal = document.createElement('div');
                modal.className = 'modal-overlay';
                var author = data.users[post.author];
                var content = '';
                var images = getPostImages(postId);
                
                if (post.type === 'carousel' && images && images.length > 0) {
                    content = '<div class="carousel-container" id="modalCarousel">' +
                        '<div class="carousel-track" id="modalTrack">' +
                        images.map(function(img) {
                            return '<div class="carousel-slide"><img src="' + img + '" onerror="this.style.display=\'none\'"></div>';
                        }).join('') +
                        '</div>' +
                        (images.length > 1 ? 
                            '<button class="carousel-arrow left" onclick="slideModalCarousel(-1)">‹</button>' +
                            '<button class="carousel-arrow right" onclick="slideModalCarousel(1)">›</button>' +
                            '<div class="carousel-dots" id="modalDots">' +
                            images.map(function(_, i) {
                                return '<button class="carousel-dot' + (i === 0 ? ' active' : '') + '" onclick="goToModalSlide('+i+')"></button>';
                            }).join('') +
                            '</div>' : '') +
                        '</div>';
                    window._modalCarouselIndex = 0;
                    window._modalCarouselSlides = images.length;
                    window.slideModalCarousel = function(dir) {
                        var idx = (window._modalCarouselIndex || 0) + dir;
                        if (idx < 0) idx = window._modalCarouselSlides - 1;
                        if (idx >= window._modalCarouselSlides) idx = 0;
                        window._modalCarouselIndex = idx;
                        var track = document.getElementById('modalTrack');
                        if (track) track.style.transform = 'translateX(-' + (idx * 100) + '%)';
                        document.querySelectorAll('#modalDots .carousel-dot').forEach(function(d, i) {
                            d.classList.toggle('active', i === idx);
                        });
                    };
                    window.goToModalSlide = function(idx) {
                        window._modalCarouselIndex = idx;
                        var track = document.getElementById('modalTrack');
                        if (track) track.style.transform = 'translateX(-' + (idx * 100) + '%)';
                        document.querySelectorAll('#modalDots .carousel-dot').forEach(function(d, i) {
                            d.classList.toggle('active', i === idx);
                        });
                    };
                } else if (post.type === 'video') {
                    content = '<video controls style="max-width:100%;max-height:70vh;" src="' + (post.content || '') + '"></video>';
                }

                modal.innerHTML = '<div class="modal-header"><button onclick="this.closest(\'.modal-overlay\').remove()">✕</button><span>' + (author?.nickname || 'Unknown') + '</span></div>' +
                    (post.caption ? '<div style="text-align:center;padding:8px 20px;color:#aaa;border-bottom:1px solid #1a1a1a;">📝 ' + post.caption + '</div>' : '') +
                    '<div style="display:flex;align-items:center;justify-content:center;flex:1;padding:10px;overflow:hidden;">' + content + '</div>';
                document.body.appendChild(modal);
            }

            function renderTikTokFeed() {
                var container = document.getElementById('tiktokFeed');
                var posts = data.posts || [];
                if (currentFeed === 'following') {
                    var following = data.users[currentUser]?.following || [];
                    posts = posts.filter(function(p) { return following.includes(p.author); });
                }
                if (posts.length === 0) {
                    var msg = currentFeed === 'following' ? t('noFollowing') : t('noPosts');
                    container.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100vh;color:#444;text-align:center;padding:20px;flex-direction:column;"><div style="font-size:3em;margin-bottom:10px;">📭</div>' + msg + '</div>';
                    return;
                }
                posts.sort(function(a, b) { return new Date(b.timestamp) - new Date(a.timestamp); });

                var html = posts.map(function(post, index) {
                    var author = data.users[post.author];
                    if (!author) return '';
                    var isLiked = (post.likes || []).includes(currentUser);
                    var isSubscribed = (data.users[currentUser]?.following || []).includes(post.author);
                    var comments = data.comments[post.id] || [];
                    var dateStr = new Date(post.timestamp).toLocaleDateString();
                    var images = getPostImages(post.id);

                    var contentHtml = '';
                    if (post.type === 'carousel' && images && images.length > 0) {
                        var slideCount = images.length;
                        contentHtml = '<div class="carousel-container" data-postid="' + post.id + '">' +
                            '<div class="carousel-track" id="track_' + post.id + '">' +
                            images.map(function(img) {
                                return '<div class="carousel-slide"><img src="' + img + '" onerror="this.style.display=\'none\'"></div>';
                            }).join('') +
                            '</div>' +
                            (slideCount > 1 ? 
                                '<button class="carousel-arrow left" onclick="event.stopPropagation();slideCarousel(\'' + post.id + '\', -1)">‹</button>' +
                                '<button class="carousel-arrow right" onclick="event.stopPropagation();slideCarousel(\'' + post.id + '\', 1)">›</button>' +
                                '<div class="carousel-dots" id="dots_' + post.id + '">' +
                                images.map(function(_, i) {
                                    return '<button class="carousel-dot' + (i === 0 ? ' active' : '') + '" onclick="event.stopPropagation();goToSlide(\'' + post.id + '\',' + i + ')"></button>';
                                }).join('') +
                                '</div>' : '') +
                            '</div>';
                    } else if (post.type === 'video') {
                        contentHtml = '<div class="video-wrapper"><video playsinline controls style="max-width:100%;max-height:100%;" src="' + (post.content || '') + '"></video></div>';
                    }

                    return '<div class="tiktok-item" data-index="' + index + '" data-postid="' + post.id + '">' +
                        contentHtml +
                        '<div class="tiktok-overlay">' +
                        '<div class="user-info">' +
                        '<div class="user-avatar" onclick="showUserProfile(\'' + post.author + '\')">' + (author.avatar ? '<img src="' + author.avatar + '">' : '👤') + '</div>' +
                        '<div class="user-name" onclick="showUserProfile(\'' + post.author + '\')">' + author.nickname + ' <span>· ' + dateStr + '</span></div>' +
                        (post.author !== currentUser ? '<button class="tiktok-subscribe-btn' + (isSubscribed ? ' subscribed' : '') + '" onclick="toggleSubscribe(\'' + post.author + '\', this)">' + (isSubscribed ? t('subscribed') : t('subscribe')) + '</button>' : '') +
                        '</div>' +
                        (post.caption ? '<div class="post-caption">📝 ' + post.caption + '</div>' : '') +
                        '</div>' +
                        '<div class="tiktok-actions">' +
                        '<button onclick="likePostTikTok(\'' + post.id + '\', this)">' +
                        (isLiked ? '❤️' : '🤍') +
                        '<span class="count" id="likeCount_' + post.id + '">' + (post.likes ? post.likes.length : 0) + '</span>' +
                        '</button>' +
                        '<button onclick="showCommentsTikTok(\'' + post.id + '\')">' +
                        '💬<span class="count">' + comments.length + '</span>' +
                        '</button>' +
                        '</div>' +
                        '</div>';
                }).join('');
                container.innerHTML = html;

                if (!window._carouselState) window._carouselState = {};
                document.querySelectorAll('.carousel-container').forEach(function(container) {
                    var postId = container.dataset.postid;
                    if (postId) {
                        window._carouselState[postId] = 0;
                    }
                });
            }

            window.slideCarousel = function(postId, dir) {
                if (!window._carouselState) window._carouselState = {};
                var idx = (window._carouselState[postId] || 0) + dir;
                var track = document.getElementById('track_' + postId);
                if (!track) return;
                var slides = track.querySelectorAll('.carousel-slide');
                if (idx < 0) idx = slides.length - 1;
                if (idx >= slides.length) idx = 0;
                window._carouselState[postId] = idx;
                track.style.transform = 'translateX(-' + (idx * 100) + '%)';
                var dots = document.querySelectorAll('#dots_' + postId + ' .carousel-dot');
                dots.forEach(function(d, i) {
                    d.classList.toggle('active', i === idx);
                });
            };

            window.goToSlide = function(postId, idx) {
                if (!window._carouselState) window._carouselState = {};
                var track = document.getElementById('track_' + postId);
                if (!track) return;
                var slides = track.querySelectorAll('.carousel-slide');
                if (idx < 0 || idx >= slides.length) return;
                window._carouselState[postId] = idx;
                track.style.transform = 'translateX(-' + (idx * 100) + '%)';
                var dots = document.querySelectorAll('#dots_' + postId + ' .carousel-dot');
                dots.forEach(function(d, i) {
                    d.classList.toggle('active', i === idx);
                });
            };

            window.toggleSubscribe = toggleSubscribe;
            window.likePostTikTok = likePostTikTok;
            window.showCommentsTikTok = showCommentsTikTok;
            window.addCommentTikTok = addCommentTikTok;
            window.deleteComment = deleteComment;
            window.deleteReply = deleteReply;
            window.likeComment = likeComment;
            window.showReplyInput = showReplyInput;
            window.addReply = addReply;
            window.deletePost = deletePost;
            window.showUserProfile = showUserProfile;
            window.viewPost = viewPost;
            window.renderTikTokFeed = renderTikTokFeed;
            window.renderProfile = renderProfile;
            window.editBio = editBio;
            window.slideCarousel = slideCarousel;
            window.goToSlide = goToSlide;
            window.slideModalCarousel = function() {};
            window.goToModalSlide = function() {};
