<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>LifeTok</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #000;
            color: #fff;
            min-height: 100vh;
            -webkit-tap-highlight-color: transparent;
            overflow-x: hidden;
        }

        :root { --accent: #00f260; --accent2: #0575e6; --bg: #000; --card: #1a1a1a; --border: #2a2a2a; }
        .theme-green { --accent: #00f260; --accent2: #0575e6; }
        .theme-pink { --accent: #ff2d55; --accent2: #ff6b6b; }
        .theme-red { --accent: #ff4757; --accent2: #ff6b81; }

        .splash-screen { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: var(--bg); flex-direction: column; gap: 20px; }
        .splash-logo { font-size: 4em; font-weight: 900; background: linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.6; transform: scale(1.05); } }
        .splash-subtitle { color: #555; font-size: 0.9em; letter-spacing: 6px; }

        .auth-screen { min-height: 100vh; display: none; align-items: center; justify-content: center; padding: 20px; background: linear-gradient(180deg, #0a1a0a 0%, var(--bg) 100%); }
        .auth-box { width: 100%; max-width: 350px; text-align: center; }
        .auth-logo { font-size: 3.5em; font-weight: 900; background: linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; margin-bottom: 5px; }
        .auth-input { width: 100%; background: var(--card); border: 1px solid var(--border); color: #fff; padding: 14px 16px; border-radius: 10px; font-size: 0.95em; margin-bottom: 12px; outline: none; }
        .auth-input:focus { border-color: var(--accent); }
        .auth-btn { width: 100%; background: var(--accent); color: #000; border: none; padding: 14px; border-radius: 10px; font-size: 1em; font-weight: 700; cursor: pointer; margin-top: 5px; }
        .auth-switch { color: #888; font-size: 0.85em; margin-top: 18px; }
        .auth-switch span { color: var(--accent); cursor: pointer; font-weight: 600; }
        .error-msg { color: #ff4757; font-size: 0.8em; margin-bottom: 10px; display: none; }

        .main-screen { display: none; }
        .main-screen.active { display: block; }

        /* TIKTOK СТИЛЬ - ПОЛНОЭКРАННЫЕ ВИДЕО */
        .tiktok-feed {
            height: calc(100vh - 100px);
            overflow-y: scroll;
            scroll-snap-type: y mandatory;
            -webkit-overflow-scrolling: touch;
            padding-bottom: 60px;
        }

        .tiktok-post {
            height: calc(100vh - 100px);
            scroll-snap-align: start;
            position: relative;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .tiktok-media {
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: #000;
        }

        .tiktok-media img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .tiktok-media video {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        /* АВАТАР СПРАВА */
        .tiktok-avatar {
            position: absolute;
            right: 12px;
            bottom: 160px;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: 2px solid #fff;
            overflow: hidden;
            cursor: pointer;
            z-index: 10;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3em;
            animation: avatarPulse 2s infinite;
        }

        @keyframes avatarPulse {
            0%, 100% { border-color: #fff; }
            50% { border-color: var(--accent); }
        }

        .tiktok-avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }

        /* ДЕЙСТВИЯ СПРАВА (КАК В TIKTOK) */
        .tiktok-actions {
            position: absolute;
            right: 12px;
            bottom: 80px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 18px;
            z-index: 10;
        }

        .tiktok-action {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3px;
            cursor: pointer;
            background: none;
            border: none;
            color: #fff;
            transition: all 0.2s;
        }

        .tiktok-action:active { transform: scale(0.9); }

        .tiktok-action-icon {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(5px);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4em;
            transition: all 0.2s;
        }

        .tiktok-action.liked .tiktok-action-icon {
            background: rgba(255,71,87,0.3);
            animation: likePop 0.4s ease;
        }

        @keyframes likePop {
            0% { transform: scale(1); }
            50% { transform: scale(1.3); }
            100% { transform: scale(1); }
        }

        .tiktok-action.saved .tiktok-action-icon {
            background: rgba(255,215,0,0.3);
        }

        .tiktok-action-label {
            font-size: 0.65em;
            color: #ccc;
            font-weight: 600;
        }

        /* ИНФОРМАЦИЯ СНИЗУ */
        .tiktok-info {
            position: absolute;
            bottom: 20px;
            left: 15px;
            right: 80px;
            z-index: 10;
        }

        .tiktok-nickname {
            font-weight: 700;
            font-size: 0.95em;
            margin-bottom: 4px;
            cursor: pointer;
            text-shadow: 0 1px 3px rgba(0,0,0,0.8);
        }

        .tiktok-caption {
            font-size: 0.8em;
            color: #ddd;
            margin-bottom: 4px;
            text-shadow: 0 1px 2px rgba(0,0,0,0.8);
            line-height: 1.3;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .tiktok-date {
            font-size: 0.65em;
            color: #999;
        }

        /* ВКЛАДКИ */
        .tiktok-tabs {
            position: sticky;
            top: 0;
            z-index: 50;
            background: #000;
            display: flex;
            justify-content: center;
            gap: 15px;
            padding: 10px;
            border-bottom: 1px solid var(--border);
        }

        .tiktok-tab {
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 0.8em;
            cursor: pointer;
            background: var(--card);
            color: #888;
            border: none;
            font-weight: 600;
        }

        .tiktok-tab.active {
            background: var(--accent);
            color: #000;
        }

        /* Комментарии шторка */
        .comments-overlay {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            top: 0;
            background: rgba(0,0,0,0.95);
            z-index: 300;
            display: flex;
            flex-direction: column;
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }

        .comments-header {
            display: flex;
            align-items: center;
            padding: 15px;
            border-bottom: 1px solid var(--border);
            gap: 15px;
            flex-shrink: 0;
        }

        .comments-header button {
            background: none;
            border: none;
            color: #fff;
            font-size: 1.2em;
            cursor: pointer;
        }

        .comments-list {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
        }

        .comment {
            display: flex;
            gap: 10px;
            margin-bottom: 16px;
        }

        .comment-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.85em;
            flex-shrink: 0;
            overflow: hidden;
            cursor: pointer;
        }

        .comment-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
        }

        .comment-body { flex: 1; }
        .comment-user { font-weight: 600; font-size: 0.8em; cursor: pointer; }
        .comment-text { font-size: 0.85em; color: #ddd; margin-top: 2px; }
        .comment-time { font-size: 0.7em; color: #666; margin-top: 2px; display: flex; align-items: center; gap: 8px; }
        .comment-like-btn { background: none; border: none; color: #888; cursor: pointer; font-size: 0.8em; }
        .comment-like-btn.liked { color: #ff4757; }
        .comment-delete-btn { background: none; border: none; color: #ff4757; cursor: pointer; font-size: 0.7em; }

        .comment-input-area {
            display: flex;
            padding: 10px 15px;
            border-top: 1px solid var(--border);
            gap: 10px;
            align-items: center;
            flex-shrink: 0;
        }

        .comment-input-area input {
            flex: 1;
            background: var(--card);
            border: none;
            color: #fff;
            padding: 12px 15px;
            border-radius: 25px;
            outline: none;
            font-size: 0.85em;
        }

        .comment-input-area button {
            background: var(--accent);
            color: #000;
            border: none;
            padding: 10px 20px;
            border-radius: 25px;
            font-weight: 700;
            cursor: pointer;
            font-size: 0.85em;
        }

        /* Профиль */
        .profile-page { padding: 25px 20px 60px; text-align: center; }
        .profile-avatar { width: 85px; height: 85px; border-radius: 50%; background: linear-gradient(135deg, var(--accent), var(--accent2)); margin: 0 auto 10px; display: flex; align-items: center; justify-content: center; font-size: 2em; border: 3px solid var(--accent); overflow: hidden; cursor: pointer; }
        .profile-avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
        .profile-nickname { font-size: 1.2em; font-weight: 700; }
        .profile-bio { color: #aaa; font-size: 0.8em; margin: 5px 0 10px; cursor: pointer; }
        .profile-stats { display: flex; justify-content: center; gap: 30px; margin: 15px 0; }
        .profile-stat { text-align: center; cursor: pointer; }
        .profile-stat-num { font-size: 1.2em; font-weight: 700; }
        .profile-stat-label { font-size: 0.65em; color: #888; }
        .profile-btn { background: var(--card); color: #fff; border: 1px solid var(--border); padding: 8px 24px; border-radius: 8px; font-size: 0.85em; cursor: pointer; margin: 4px; }
        .profile-posts-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; padding: 2px; margin-top: 15px; }
        .profile-post-thumb { aspect-ratio: 1; overflow: hidden; position: relative; cursor: pointer; background: #0a0a0a; }
        .profile-post-thumb img, .profile-post-thumb video { width: 100%; height: 100%; object-fit: cover; }
        .profile-post-thumb .video-icon { position: absolute; top: 6px; right: 6px; font-size: 1em; background: rgba(0,0,0,0.6); border-radius: 4px; padding: 2px 5px; }
        .profile-post-thumb .likes-count { position: absolute; bottom: 4px; left: 4px; font-size: 0.65em; background: rgba(0,0,0,0.6); padding: 2px 6px; border-radius: 4px; }

        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: #0a0a0a; border-top: 1px solid var(--border); display: flex; align-items: center; z-index: 100; padding: 6px 0 18px; }
        .nav-item { flex: 1; text-align: center; cursor: pointer; color: #666; font-size: 0.65em; padding: 5px; }
        .nav-item.active { color: var(--accent); }
        .nav-icon { font-size: 1.6em; display: block; margin-bottom: 3px; }
        .nav-create { flex: 1; text-align: center; position: relative; top: -20px; }
        .nav-create-btn { width: 52px; height: 52px; border-radius: 50%; background: var(--accent); color: #000; border: none; font-size: 1.5em; cursor: pointer; box-shadow: 0 4px 20px rgba(0,0,0,0.4); }
        .create-menu { position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%); background: var(--card); border-radius: 14px; padding: 12px; z-index: 150; display: flex; gap: 15px; }
        .create-menu button { background: none; border: none; color: #fff; cursor: pointer; font-size: 1.6em; padding: 8px; }

        .hidden { display: none !important; }
        .empty-state { text-align: center; padding: 60px 20px; color: #444; }
        .empty-icon { font-size: 3em; margin-bottom: 8px; opacity: 0.3; }

        .top-bar { position: sticky; top: 0; z-index: 50; background: #000; padding: 8px 15px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid var(--border); }
        .top-bar-logo { font-weight: 700; font-size: 1.1em; color: var(--accent); }
        .top-bar-search { flex: 1; }
        .top-bar-search input { width: 100%; background: var(--card); border: 1px solid var(--border); color: #fff; padding: 8px 15px; border-radius: 20px; font-size: 0.85em; outline: none; }
        .top-bar-settings { cursor: pointer; font-size: 1.4em; }

        .settings-modal { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: var(--bg); z-index: 300; overflow-y: auto; }
        .settings-section { padding: 20px; border-bottom: 1px solid var(--border); }
        .settings-section h3 { color: var(--accent); margin-bottom: 15px; font-size: 0.9em; }
        .theme-options { display: flex; gap: 12px; }
        .theme-option { width: 40px; height: 40px; border-radius: 50%; cursor: pointer; border: 3px solid transparent; }
        .theme-option.active { border-color: #fff; }
        .theme-option.green { background: linear-gradient(135deg, #00f260, #0575e6); }
        .theme-option.pink { background: linear-gradient(135deg, #ff2d55, #ff6b6b); }
        .theme-option.red { background: linear-gradient(135deg, #ff4757, #ff6b81); }
        .modal-header { display: flex; align-items: center; padding: 15px; border-bottom: 1px solid var(--border); gap: 15px; }
        .modal-header button { background: none; border: none; color: #fff; font-size: 1.2em; cursor: pointer; }
        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: var(--bg); z-index: 200; overflow-y: auto; }
        .user-list { padding: 8px 15px; }
        .user-item { display: flex; align-items: center; padding: 12px 10px; gap: 12px; border-bottom: 1px solid #111; cursor: pointer; }
        .user-item-avatar { width: 44px; height: 44px; border-radius: 50%; background: linear-gradient(135deg, var(--accent), var(--accent2)); display: flex; align-items: center; justify-content: center; font-size: 1.2em; overflow: hidden; flex-shrink: 0; }
        .user-item-avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
        .user-item-info { flex: 1; }
        .user-item-name { font-weight: 600; font-size: 0.9em; }
    </style>
</head>
<body class="theme-green">

    <div class="splash-screen" id="splashScreen">
        <div class="splash-logo">LIFETOK</div>
        <div class="splash-subtitle">MOMENTS</div>
    </div>

    <div class="auth-screen" id="authScreen">
        <div class="auth-box">
            <div class="auth-logo">LIFETOK</div>
            <div class="error-msg" id="authError"></div>
            <input type="email" class="auth-input" id="authEmail" placeholder="Почта">
            <input type="text" class="auth-input" id="authNickname" placeholder="Никнейм">
            <input type="password" class="auth-input" id="authPassword" placeholder="Пароль">
            <button class="auth-btn" id="authBtn">Войти</button>
            <div class="auth-switch"><span id="authSwitch">Создать аккаунт</span></div>
        </div>
    </div>

    <div class="main-screen" id="mainScreen">
        <div class="top-bar">
            <span class="top-bar-logo">LIFETOK</span>
            <div class="top-bar-search"><input type="text" id="topSearchInput" placeholder="🔍 Поиск..."></div>
            <span class="top-bar-settings" id="settingsBtn">⚙️</span>
        </div>

        <div id="feedPage">
            <div class="tiktok-tabs">
                <button class="tiktok-tab active" data-feed="all">Все</button>
                <button class="tiktok-tab" data-feed="following">Подписки</button>
                <button class="tiktok-tab" data-feed="saved">Сохранённые</button>
            </div>
            <div class="tiktok-feed" id="tiktokFeed"></div>
        </div>

        <div id="profilePage" class="hidden"><div id="profileContent"></div></div>

        <div class="bottom-nav">
            <div class="nav-item active" data-page="feed"><span class="nav-icon">🏠</span>Лента</div>
            <div class="nav-create"><button class="nav-create-btn" id="createBtn">+</button></div>
            <div class="nav-item" data-page="profile"><span class="nav-icon">👤</span>Профиль</div>
        </div>

        <div class="create-menu hidden" id="createMenu">
            <button id="createPhotoBtn">📸</button>
            <button id="createVideoBtn">🎬</button>
        </div>
    </div>

    <div class="settings-modal hidden" id="settingsModal">
        <div class="modal-header"><button id="closeSettings">←</button><h3>Настройки</h3></div>
        <div class="settings-section">
            <h3>🎨 Тема</h3>
            <div class="theme-options">
                <div class="theme-option green active" onclick="setTheme('green')"></div>
                <div class="theme-option pink" onclick="setTheme('pink')"></div>
                <div class="theme-option red" onclick="setTheme('red')"></div>
            </div>
        </div>
        <div class="settings-section"><button class="auth-btn" id="logoutBtn2">🚪 Выйти</button></div>
    </div>

    <input type="file" id="photoInput" accept="image/*" multiple style="display:none">
    <input type="file" id="videoInput" accept="video/*" style="display:none">

    <script>
        const JSONBIN_API_KEY = '$2a$10$8JrdvWpPPqFKt10e4IFK3uqEQieDJAjDis9HfL8nyGqvc41T6DAla';
        const JSONBIN_URL = 'https://api.jsonbin.io/v3/b/693d0d78e1dc7c2b9b11321c';
        
        let DB = { users: {}, posts: [] };
        let currentUser = null;
        let currentFeed = 'all';
        let saveTimeout = null;
        let currentTheme = localStorage.getItem('lifetok_theme') || 'green';

        function scheduleSave() {
            localStorage.setItem('lifetok_db', JSON.stringify(DB));
            if (saveTimeout) clearTimeout(saveTimeout);
            saveTimeout = setTimeout(async () => {
                try { await fetch(JSONBIN_URL, { method: 'PUT', headers: { 'Content-Type': 'application/json', 'X-Access-Key': JSONBIN_API_KEY }, body: JSON.stringify(DB) }); } catch(e) {}
            }, 500);
        }

        async function loadFromCloud() {
            try {
                const r = await fetch(JSONBIN_URL, { headers: { 'X-Access-Key': JSONBIN_API_KEY } });
                if (r.ok) { const j = await r.json(); DB = j.record; return true; }
            } catch(e) {}
            DB = JSON.parse(localStorage.getItem('lifetok_db') || '{"users":{},"posts":[]}');
            if (!Object.keys(DB.users).length) {
                DB.users['alice@mail.com'] = { email:'alice@mail.com', nickname:'Alice', password:'1234', avatar:'', bio:'', followers:[], following:[], savedPosts:[], postsCount:0 };
                DB.users['bob@mail.com'] = { email:'bob@mail.com', nickname:'Bob', password:'1234', avatar:'', bio:'', followers:[], following:[], savedPosts:[], postsCount:0 };
                scheduleSave();
            }
            return false;
        }

        function setTheme(t) { currentTheme = t; localStorage.setItem('lifetok_theme', t); document.body.className = 'theme-' + t; document.querySelectorAll('.theme-option').forEach(o => o.classList.remove('active')); document.querySelector(`.theme-option.${t}`)?.classList.add('active'); }

        function getMe() { return DB.users[currentUser] || {}; }
        function getUser(e) { return DB.users[e] || null; }

        // ============ ИНИЦИАЛИЗАЦИЯ ============
        async function init() {
            document.body.className = 'theme-' + currentTheme;
            await loadFromCloud();
            document.getElementById('splashScreen').style.display = 'none';
            const saved = localStorage.getItem('lifetok_user');
            if (saved && DB.users[saved]) { currentUser = saved; enterApp(); }
            else { document.getElementById('authScreen').style.display = 'flex'; }
        }
        init();

        setInterval(async () => { if (currentUser) { await loadFromCloud(); if (!document.getElementById('feedPage').classList.contains('hidden')) renderFeed(); } }, 5000);

        // ============ АВТОРИЗАЦИЯ ============
        document.getElementById('authSwitch').addEventListener('click', function() {
            const b = document.getElementById('authBtn');
            const isLogin = b.textContent === 'Войти';
            b.textContent = isLogin ? 'Зарегистрироваться' : 'Войти';
            this.textContent = isLogin ? 'Уже есть аккаунт' : 'Создать аккаунт';
        });

        document.getElementById('authBtn').addEventListener('click', async function() {
            const email = document.getElementById('authEmail').value.trim().toLowerCase();
            const nick = document.getElementById('authNickname').value.trim();
            const pass = document.getElementById('authPassword').value;
            const isLogin = this.textContent === 'Войти';
            const err = document.getElementById('authError');
            err.style.display = 'none';
            if (!email || !nick || !pass) { err.textContent = 'Заполни все поля'; err.style.display = 'block'; return; }
            if (!email.includes('@')) { err.textContent = 'Неверная почта'; err.style.display = 'block'; return; }
            if (pass.length < 4) { err.textContent = 'Минимум 4 символа'; err.style.display = 'block'; return; }
            await loadFromCloud();
            if (isLogin) {
                if (DB.users[email] && DB.users[email].password === pass) { currentUser = email; localStorage.setItem('lifetok_user', email); enterApp(); }
                else { err.textContent = 'Неверный пароль'; err.style.display = 'block'; }
            } else {
                if (DB.users[email]) { err.textContent = 'Почта занята'; err.style.display = 'block'; return; }
                DB.users[email] = { email, nickname:nick, password:pass, avatar:'', bio:'', followers:[], following:[], savedPosts:[], postsCount:0 };
                scheduleSave(); currentUser = email; localStorage.setItem('lifetok_user', email); enterApp();
            }
        });

        function enterApp() {
            document.getElementById('authScreen').style.display = 'none';
            document.getElementById('mainScreen').classList.add('active');
            renderFeed();
        }

        // ============ НАВИГАЦИЯ ============
        document.querySelectorAll('.nav-item').forEach(item => {
            item.addEventListener('click', function() {
                document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
                this.classList.add('active');
                if (this.dataset.page === 'feed') { document.getElementById('feedPage').classList.remove('hidden'); document.getElementById('profilePage').classList.add('hidden'); renderFeed(); }
                else { document.getElementById('feedPage').classList.add('hidden'); document.getElementById('profilePage').classList.remove('hidden'); renderProfile(); }
            });
        });

        document.querySelectorAll('.tiktok-tab').forEach(tab => {
            tab.addEventListener('click', function() {
                document.querySelectorAll('.tiktok-tab').forEach(t => t.classList.remove('active'));
                this.classList.add('active');
                currentFeed = this.dataset.feed;
                renderFeed();
            });
        });

        document.getElementById('settingsBtn').addEventListener('click', () => document.getElementById('settingsModal').classList.remove('hidden'));
        document.getElementById('closeSettings').addEventListener('click', () => document.getElementById('settingsModal').classList.add('hidden'));
        document.getElementById('logoutBtn2').addEventListener('click', () => {
            if (confirm('Выйти?')) { scheduleSave(); currentUser = null; localStorage.removeItem('lifetok_user'); location.reload(); }
        });

        // ============ СОЗДАНИЕ ПОСТА ============
        let menuVisible = false;
        document.getElementById('createBtn').addEventListener('click', e => { e.stopPropagation(); menuVisible = !menuVisible; document.getElementById('createMenu').classList.toggle('hidden', !menuVisible); });
        document.addEventListener('click', e => { if (menuVisible && !document.getElementById('createMenu').contains(e.target) && e.target !== document.getElementById('createBtn')) { menuVisible = false; document.getElementById('createMenu').classList.add('hidden'); } });
        document.getElementById('createPhotoBtn').addEventListener('click', () => { menuVisible = false; document.getElementById('createMenu').classList.add('hidden'); document.getElementById('photoInput').click(); });
        document.getElementById('createVideoBtn').addEventListener('click', () => { menuVisible = false; document.getElementById('createMenu').classList.add('hidden'); document.getElementById('videoInput').click(); });

        function createPostWithCaption(urls, type) {
            const caption = prompt('Добавьте описание к посту:', '');
            const post = { id: Date.now().toString(), author: currentUser, type, urls, caption: caption || '', likes: [], comments: [], created: new Date().toISOString() };
            DB.posts.unshift(post);
            getMe().postsCount = (getMe().postsCount || 0) + 1;
            scheduleSave();
            renderFeed();
        }

        document.getElementById('photoInput').addEventListener('change', function(e) {
            const files = Array.from(e.target.files).slice(0, 5).filter(f => f.type.startsWith('image/'));
            if (!files.length) return;
            const urls = []; let loaded = 0;
            files.forEach(f => { const r = new FileReader(); r.onload = e => { urls.push(e.target.result); loaded++; if (loaded === files.length) createPostWithCaption(urls, 'image'); }; r.readAsDataURL(f); });
            this.value = '';
        });

        document.getElementById('videoInput').addEventListener('change', function(e) {
            if (!e.target.files[0]) return;
            const r = new FileReader();
            r.onload = e => createPostWithCaption([e.target.result], 'video');
            r.readAsDataURL(e.target.files[0]);
            this.value = '';
        });

        // ============ ЛАЙКИ / СОХРАНЕНИЯ / КОММЕНТАРИИ ============
        function toggleLike(pid) { const p = DB.posts.find(x => x.id === pid); if (!p) return; const i = p.likes.indexOf(currentUser); i === -1 ? p.likes.push(currentUser) : p.likes.splice(i, 1); scheduleSave(); }
        function isLiked(pid) { const p = DB.posts.find(x => x.id === pid); return p ? p.likes.includes(currentUser) : false; }
        
        function toggleSave(pid) { const me = getMe(); if (!me.savedPosts) me.savedPosts = []; const i = me.savedPosts.indexOf(pid); i === -1 ? me.savedPosts.push(pid) : me.savedPosts.splice(i, 1); scheduleSave(); }
        function isSaved(pid) { return (getMe().savedPosts || []).includes(pid); }

        function addComment(pid, txt) { if (!txt?.trim()) return; const p = DB.posts.find(x => x.id === pid); if (!p) return; p.comments.push({ id: Date.now().toString(), user: currentUser, text: txt.trim(), likes: [], createdAt: new Date().toISOString() }); scheduleSave(); }
        function deleteComment(pid, cid) { const p = DB.posts.find(x => x.id === pid); if (!p) return; p.comments = p.comments.filter(c => c.id !== cid); scheduleSave(); }
        function toggleCommentLike(pid, cid) { const p = DB.posts.find(x => x.id === pid); if (!p) return; const c = p.comments.find(x => x.id === cid); if (!c) return; if (!c.likes) c.likes = []; const i = c.likes.indexOf(currentUser); i === -1 ? c.likes.push(currentUser) : c.likes.splice(i, 1); scheduleSave(); }
        function toggleFollow(target) { if (target === currentUser) return; const me = getMe(); const tu = getUser(target); if (!tu) return; const i = me.following.indexOf(target); if (i === -1) { me.following.push(target); tu.followers.push(currentUser); } else { me.following.splice(i, 1); tu.followers = tu.followers.filter(e => e !== currentUser); } scheduleSave(); }

        // ============ TIKTOK ЛЕНТА ============
        function renderFeed() {
            const container = document.getElementById('tiktokFeed');
            let allPosts = DB.posts.slice().sort((a, b) => b.id.localeCompare(a.id));
            
            if (currentFeed === 'following') allPosts = allPosts.filter(p => p.author === currentUser || getMe().following.includes(p.author));
            else if (currentFeed === 'saved') allPosts = allPosts.filter(p => (getMe().savedPosts || []).includes(p.id));
            
            if (!allPosts.length) { container.innerHTML = `<div class="empty-state"><div class="empty-icon">📸</div><p>${currentFeed === 'saved' ? 'Нет сохранённых' : currentFeed === 'following' ? 'Подпишитесь на людей' : 'Нет постов'}</p></div>`; return; }
            
            container.innerHTML = '';
            
            allPosts.forEach(post => {
                const author = getUser(post.author);
                if (!author) return;
                
                const liked = isLiked(post.id);
                const saved = isSaved(post.id);
                const date = formatDate(post.created);
                
                const div = document.createElement('div');
                div.className = 'tiktok-post';
                div.innerHTML = `
                    ${post.type === 'image' ? `<div class="tiktok-media"><img src="${post.urls[0]}" alt="Фото"></div>` : `<div class="tiktok-media"><video src="${post.urls[0]}" loop playsinline></video></div>`}
                    
                    <div class="tiktok-avatar" data-user="${post.author}">${author.avatar ? '<img src="'+author.avatar+'">' : '👤'}</div>
                    
                    <div class="tiktok-actions">
                        <button class="tiktok-action like-btn ${liked ? 'liked' : ''}" data-like="${post.id}">
                            <span class="tiktok-action-icon">${liked ? '❤️' : '🤍'}</span>
                            <span class="tiktok-action-label">${post.likes.length}</span>
                        </button>
                        <button class="tiktok-action comment-btn" data-comment="${post.id}">
                            <span class="tiktok-action-icon">💬</span>
                            <span class="tiktok-action-label">${post.comments.length}</span>
                        </button>
                        <button class="tiktok-action save-btn ${saved ? 'saved' : ''}" data-save="${post.id}">
                            <span class="tiktok-action-icon">${saved ? '⭐' : '☆'}</span>
                            <span class="tiktok-action-label">Сохранить</span>
                        </button>
                        ${post.author === currentUser ? `<button class="tiktok-action" data-delete="${post.id}"><span class="tiktok-action-icon">🗑</span><span class="tiktok-action-label">Удалить</span></button>` : ''}
                    </div>
                    
                    <div class="tiktok-info">
                        <div class="tiktok-nickname" data-user="${post.author}">@${author.nickname} ${post.author === currentUser ? '<span style="color:var(--accent);">· вы</span>' : ''}</div>
                        ${post.caption ? `<div class="tiktok-caption">${post.caption}</div>` : ''}
                        <div class="tiktok-date">📅 ${date}</div>
                    </div>
                `;
                container.appendChild(div);
                
                // Автовоспроизведение видео при скролле
                const video = div.querySelector('video');
                if (video) {
                    const observer = new IntersectionObserver(entries => {
                        entries.forEach(entry => {
                            if (entry.isIntersecting) { video.play().catch(() => {}); }
                            else { video.pause(); }
                        });
                    }, { threshold: 0.7 });
                    observer.observe(div);
                }
            });
            
            attachTikTokHandlers();
        }

        function attachTikTokHandlers() {
            document.querySelectorAll('.like-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    toggleLike(this.dataset.like);
                    const icon = this.querySelector('.tiktok-action-icon');
                    const label = this.querySelector('.tiktok-action-label');
                    const liked = isLiked(this.dataset.like);
                    icon.textContent = liked ? '❤️' : '🤍';
                    this.classList.toggle('liked', liked);
                    const post = DB.posts.find(p => p.id === this.dataset.like);
                    if (post) label.textContent = post.likes.length;
                });
            });
            
            document.querySelectorAll('.save-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    toggleSave(this.dataset.save);
                    const icon = this.querySelector('.tiktok-action-icon');
                    const saved = isSaved(this.dataset.save);
                    icon.textContent = saved ? '⭐' : '☆';
                    this.classList.toggle('saved', saved);
                });
            });
            
            document.querySelectorAll('.comment-btn').forEach(btn => {
                btn.addEventListener('click', () => openComments(btn.dataset.comment));
            });
            
            document.querySelectorAll('[data-delete]').forEach(btn => {
                btn.addEventListener('click', () => {
                    if (confirm('Удалить пост?')) {
                        DB.posts = DB.posts.filter(p => p.id !== btn.dataset.delete);
                        getMe().postsCount = Math.max(0, (getMe().postsCount || 1) - 1);
                        scheduleSave();
                        renderFeed();
                    }
                });
            });
            
            document.querySelectorAll('.tiktok-avatar, .tiktok-nickname').forEach(el => {
                el.addEventListener('click', () => {
                    const email = el.dataset.user;
                    if (email === currentUser) { document.querySelector('.nav-item[data-page="profile"]').click(); }
                    else openUserProfile(email);
                });
            });
        }

        // ============ КОММЕНТАРИИ ============
        function openComments(postId) {
            const post = DB.posts.find(p => p.id === postId);
            if (!post) return;
            
            const overlay = document.createElement('div');
            overlay.className = 'comments-overlay';
            overlay.innerHTML = `
                <div class="comments-header"><button class="close-comments">←</button><h3>Комментарии (${post.comments.length})</h3></div>
                <div class="comments-list" id="clist${postId}">${renderCommentsHTML(post)}</div>
                <div class="comment-input-area">
                    <input type="text" placeholder="Написать комментарий..." id="cinput${postId}">
                    <button id="csend${postId}">Отпр.</button>
                </div>
            `;
            document.body.appendChild(overlay);
            
            overlay.querySelector('.close-comments').addEventListener('click', () => document.body.removeChild(overlay));
            overlay.querySelector(`#csend${postId}`).addEventListener('click', () => {
                const inp = overlay.querySelector(`#cinput${postId}`);
                if (inp.value.trim()) { addComment(postId, inp.value); document.body.removeChild(overlay); renderFeed(); }
            });
            overlay.querySelector(`#cinput${postId}`).addEventListener('keydown', e => { if (e.key === 'Enter') overlay.querySelector(`#csend${postId}`).click(); });
            
            overlay.querySelectorAll('.comment-like-btn').forEach(btn => {
                btn.addEventListener('click', () => { toggleCommentLike(postId, btn.dataset.clike); document.body.removeChild(overlay); openComments(postId); renderFeed(); });
            });
            
            overlay.querySelectorAll('.comment-delete-btn').forEach(btn => {
                btn.addEventListener('click', () => { if (confirm('Удалить?')) { deleteComment(postId, btn.dataset.cdel); document.body.removeChild(overlay); renderFeed(); } });
            });
            
            overlay.querySelectorAll('.comment-avatar, .comment-user').forEach(el => {
                el.addEventListener('click', () => {
                    const email = el.dataset.user;
                    document.body.removeChild(overlay);
                    if (email === currentUser) document.querySelector('.nav-item[data-page="profile"]').click();
                    else openUserProfile(email);
                });
            });
        }

        function renderCommentsHTML(post) {
            if (!post.comments.length) return '<div style="text-align:center;color:#555;padding:40px;">Нет комментариев</div>';
            return post.comments.map(c => {
                const cu = getUser(c.user);
                const isCLiked = (c.likes || []).includes(currentUser);
                return `<div class="comment">
                    <div class="comment-avatar" data-user="${c.user}">${cu?.avatar ? '<img src="'+cu.avatar+'">' : '👤'}</div>
                    <div class="comment-body">
                        <div class="comment-user" data-user="${c.user}">${cu?.nickname || 'user'} ${c.user === post.author ? '<span style="color:var(--accent);">· автор</span>' : ''}</div>
                        <div class="comment-text">${c.text}</div>
                        <div class="comment-time">
                            ${timeAgo(c.createdAt)}
                            <button class="comment-like-btn ${isCLiked ? 'liked' : ''}" data-clike="${c.id}">${isCLiked ? '❤' : '🤍'} ${(c.likes || []).length}</button>
                            ${c.user === currentUser ? `<button class="comment-delete-btn" data-cdel="${c.id}">удалить</button>` : ''}
                        </div>
                    </div>
                </div>`;
            }).join('');
        }

        // ============ ПРОФИЛЬ ============
        function renderProfile() {
            const user = getMe();
            const posts = DB.posts.filter(p => p.author === currentUser).sort((a,b) => b.id.localeCompare(a.id));
            const container = document.getElementById('profileContent');
            
            container.innerHTML = `
                <div class="profile-page">
                    <div class="profile-avatar" id="profAvatar">${user.avatar ? '<img src="'+user.avatar+'">' : '👤'}</div>
                    <div class="profile-nickname">${user.nickname}</div>
                    <div class="profile-bio" id="profBio">${user.bio || '➕ Добавить описание'}</div>
                    <div class="profile-stats">
                        <div class="profile-stat"><div class="profile-stat-num">${posts.length}</div><div class="profile-stat-label">постов</div></div>
                        <div class="profile-stat" id="profFollowers"><div class="profile-stat-num">${user.followers.length}</div><div class="profile-stat-label">подписчиков</div></div>
                        <div class="profile-stat" id="profFollowing"><div class="profile-stat-num">${user.following.length}</div><div class="profile-stat-label">подписок</div></div>
                    </div>
                    <button class="profile-btn" id="editProfBtn">✏️ Ред.</button>
                    <button class="profile-btn" id="logoutProfBtn">🚪 Выйти</button>
                    <div class="profile-posts-grid">${posts.map(p => '<div class="profile-post-thumb">'+(p.type==='image'?'<img src="'+p.urls[0]+'">':'<video src="'+p.urls[0]+'" muted></video><div class="video-icon">🎬</div>')+(p.likes.length?'<div class="likes-count">❤ '+p.likes.length+'</div>':'')+'</div>').join('')}${!posts.length?'<div class="empty-state" style="grid-column:1/-1;"><p>Нет постов</p></div>':''}</div>
                </div>
            `;
            
            container.querySelector('#profBio').addEventListener('click', () => { const b = prompt('Описание:', user.bio); if (b !== null) { user.bio = b.trim(); scheduleSave(); renderProfile(); } });
            container.querySelector('#editProfBtn').addEventListener('click', () => { const n = prompt('Никнейм:', user.nickname); if (n?.trim()) { user.nickname = n.trim(); scheduleSave(); renderProfile(); renderFeed(); } });
            container.querySelector('#logoutProfBtn').addEventListener('click', () => { if (confirm('Выйти?')) { scheduleSave(); currentUser = null; localStorage.removeItem('lifetok_user'); location.reload(); } });
            container.querySelector('#profAvatar').addEventListener('click', () => { const inp = document.createElement('input'); inp.type='file'; inp.accept='image/*'; inp.addEventListener('change', e => { const f = e.target.files[0]; if (f?.type.startsWith('image/')) { const r = new FileReader(); r.onload = e => { user.avatar = e.target.result; scheduleSave(); renderProfile(); renderFeed(); }; r.readAsDataURL(f); } }); inp.click(); });
            container.querySelector('#profFollowers').addEventListener('click', () => showUsersList('Подписчики', user.followers));
            container.querySelector('#profFollowing').addEventListener('click', () => showUsersList('Подписки', user.following));
        }

        function openUserProfile(email) {
            const user = getUser(email);
            if (!user) return;
            const posts = DB.posts.filter(p => p.author === email).sort((a,b) => b.id.localeCompare(a.id));
            const isFollowing = getMe().following.includes(email);
            const modal = document.createElement('div');
            modal.className = 'modal-overlay';
            modal.innerHTML = `<div class="modal-header"><button class="close-modal">←</button><h3>${user.nickname}</h3></div>
                <div style="text-align:center;padding:20px;">
                    <div class="profile-avatar">${user.avatar ? '<img src="'+user.avatar+'">' : '👤'}</div>
                    <div style="font-weight:700;margin-top:8px;">${user.nickname}</div>
                    ${user.bio ? `<div style="color:#aaa;font-size:0.8em;">${user.bio}</div>` : ''}
                    <div style="display:flex;justify-content:center;gap:25px;margin:15px 0;">
                        <div><strong>${posts.length}</strong><br><span style="color:#888;font-size:0.7em;">постов</span></div>
                        <div><strong>${user.followers.length}</strong><br><span style="color:#888;font-size:0.7em;">подписчиков</span></div>
                        <div><strong>${user.following.length}</strong><br><span style="color:#888;font-size:0.7em;">подписок</span></div>
                    </div>
                    <button class="profile-btn" id="subBtn" style="background:var(--accent);color:#000;border:none;">${isFollowing ? '✓ Вы подписаны' : '+ Подписаться'}</button>
                </div>
                <div class="profile-posts-grid">${posts.map(p => '<div class="profile-post-thumb">'+(p.type==='image'?'<img src="'+p.urls[0]+'">':'<video src="'+p.urls[0]+'" muted></video><div class="video-icon">🎬</div>')+(p.likes.length?'<div class="likes-count">❤ '+p.likes.length+'</div>':'')+'</div>').join('')}${!posts.length?'<div class="empty-state" style="grid-column:1/-1;"><p>Нет постов</p></div>':''}</div>`;
            document.body.appendChild(modal);
            modal.querySelector('.close-modal').addEventListener('click', () => document.body.removeChild(modal));
            modal.querySelector('#subBtn').addEventListener('click', () => { toggleFollow(email); document.body.removeChild(modal); renderFeed(); renderProfile(); });
        }

        function showUsersList(title, list) {
            const modal = document.createElement('div');
            modal.className = 'modal-overlay';
            modal.innerHTML = `<div class="modal-header"><button class="close-modal">←</button><h3>${title} (${list.length})</h3></div><div class="user-list">${list.map(e => { const u = getUser(e); return u ? '<div class="user-item" data-user="'+e+'"><div class="user-item-avatar">'+(u.avatar?'<img src="'+u.avatar+'">':'👤')+'</div><div class="user-item-info"><div class="user-item-name">'+u.nickname+'</div></div></div>' : ''; }).join('')}${!list.length?'<div class="empty-state"><p>Пока никого</p></div>':''}</div>`;
            document.body.appendChild(modal);
            modal.querySelector('.close-modal').addEventListener('click', () => document.body.removeChild(modal));
            modal.querySelectorAll('.user-item').forEach(item => { item.addEventListener('click', () => { document.body.removeChild(modal); if (item.dataset.user !== currentUser) openUserProfile(item.dataset.user); }); });
        }

        document.getElementById('topSearchInput').addEventListener('input', function() {
            const f = this.value.trim().toLowerCase();
            if (!f) { renderFeed(); return; }
            const container = document.getElementById('tiktokFeed');
            const results = DB.posts.filter(p => { const a = getUser(p.author); return a && a.nickname.toLowerCase().includes(f); }).sort((a,b) => b.id.localeCompare(a.id));
            if (!results.length) { container.innerHTML = '<div class="empty-state"><p>Ничего не найдено</p></div>'; return; }
            container.innerHTML = results.map(post => {
                const a = getUser(post.author);
                return `<div class="tiktok-post"><div class="tiktok-media">${post.type==='image'?'<img src="'+post.urls[0]+'">':'<video src="'+post.urls[0]+'"></video>'}</div><div class="tiktok-info"><div class="tiktok-nickname" onclick="openUserProfile('${post.author}')">@${a?.nickname}</div><div class="tiktok-date">📅 ${formatDate(post.created)}</div></div></div>`;
            }).join('');
        });

        function formatDate(d) { if (!d) return ''; const dt = new Date(d), m = ['января','февраля','марта','апреля','мая','июня','июля','августа','сентября','октября','ноября','декабря']; return dt.getDate() + ' ' + m[dt.getMonth()] + ' ' + dt.getFullYear(); }
        function timeAgo(iso) { if (!iso) return ''; const s = Math.floor((new Date() - new Date(iso)) / 1000); if (s < 60) return 'только что'; if (s < 3600) return Math.floor(s/60)+' мин'; if (s < 86400) return Math.floor(s/3600)+' ч'; return Math.floor(s/86400)+' дн'; }
    </script>
</body>
</html>
