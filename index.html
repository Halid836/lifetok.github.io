
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>LifeTok</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; position: fixed; top: 0; left: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #000; color: #fff; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
        body { height: 100vh; height: 100dvh; width: 100vw; width: 100dvw; }
        .splash-screen { position: fixed; top: 0; left: 0; right: 0; bottom: 0; display: flex; align-items: center; justify-content: center; background: #000; flex-direction: column; gap: 20px; z-index: 1000; }
        .splash-logo { font-size: 4.5em; font-weight: 900; letter-spacing: 6px; background: linear-gradient(135deg, #ff0033, #cc0033); -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: pulse 2s ease infinite; }
        @keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.05); } }
        .splash-subtitle { color: #ff0033; font-size: 0.9em; letter-spacing: 8px; }
        .splash-line { width: 0; height: 3px; background: linear-gradient(90deg, transparent, #ff0033, transparent); animation: lineExpand 1s ease-out 0.5s both; border-radius: 2px; }
        @keyframes lineExpand { 0% { width: 0; } 100% { width: 200px; } }
        .loading-dot { display: inline-block; width: 8px; height: 8px; background: #ff0033; border-radius: 50%; animation: dotBounce 1.4s infinite; }
        .loading-dot:nth-child(2) { animation-delay: 0.2s; }
        .loading-dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes dotBounce { 0%,80%,100% { transform: scale(0); opacity: 0.3; } 40% { transform: scale(1); opacity: 1; } }

        .auth-screen { position: fixed; top: 0; left: 0; right: 0; bottom: 0; display: none; align-items: center; justify-content: center; padding: 20px; background: linear-gradient(180deg, #1a0000 0%, #000 100%); z-index: 999; }
        .auth-box { width: 100%; max-width: 350px; text-align: center; }
        .auth-logo { font-size: 3.5em; font-weight: 900; letter-spacing: 4px; background: linear-gradient(135deg, #ff0033, #cc0033); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 5px; }
        .auth-subtitle { color: #666; font-size: 0.75em; letter-spacing: 6px; margin-bottom: 35px; }
        .auth-input { width: 100%; background: #1a1a1a; border: 1px solid #2a2a2a; color: #fff; padding: 14px 16px; border-radius: 10px; font-size: 0.95em; margin-bottom: 12px; outline: none; }
        .auth-input:focus { border-color: #ff0033; }
        .auth-input::placeholder { color: #555; }
        .auth-btn { width: 100%; background: #ff0033; color: #fff; border: none; padding: 14px; border-radius: 10px; font-size: 1em; font-weight: 700; cursor: pointer; margin-top: 5px; }
        .auth-btn:active { opacity: 0.8; }
        .auth-switch { color: #888; font-size: 0.85em; margin-top: 18px; }
        .auth-switch span { color: #ff0033; cursor: pointer; font-weight: 600; }
        .auth-error { color: #ff4757; font-size: 0.8em; display: none; margin-bottom: 10px; }
        .auth-success { color: #00c853; font-size: 0.8em; display: none; margin-bottom: 10px; }
        .remember-row { display: flex; align-items: center; gap: 8px; color: #888; font-size: 0.8em; margin-bottom: 12px; cursor: pointer; }
        .remember-row input { accent-color: #ff0033; }
        .saved-accounts { margin-top: 20px; padding-top: 20px; border-top: 1px solid #1a1a1a; text-align: left; }
        .saved-title { color: #555; font-size: 0.7em; text-align: center; letter-spacing: 3px; margin-bottom: 12px; }
        .saved-item { display: flex; align-items: center; padding: 12px; background: #1a1a1a; border-radius: 12px; margin-bottom: 8px; cursor: pointer; gap: 12px; border: 1px solid transparent; transition: all 0.2s; }
        .saved-item:active { background: #222; border-color: #ff0033; }
        .saved-avatar { width: 40px; height: 40px; border-radius: 50%; background: linear-gradient(135deg, #ff0033, #cc0033); display: flex; align-items: center; justify-content: center; font-size: 1.2em; overflow: hidden; flex-shrink: 0; }
        .saved-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .saved-name { font-weight: 600; font-size: 0.9em; color: #fff; }
        .saved-email { font-size: 0.7em; color: #888; }
        .saved-remove { background: none; border: none; color: #555; cursor: pointer; font-size: 0.9em; padding: 4px 8px; border-radius: 6px; }
        .saved-remove:active { color: #ff0033; background: rgba(255,0,51,0.1); }

        .main-screen { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: #000; z-index: 100; }
        .main-screen.active { display: block; }
        .tiktok-container { width: 100%; height: 100%; overflow: hidden; background: #000; }
        .tiktok-wrapper { width: 100%; height: 100%; overflow-y: scroll; scroll-snap-type: y mandatory; scroll-behavior: smooth; -webkit-overflow-scrolling: touch; }
        .tiktok-wrapper::-webkit-scrollbar { display: none; }
        .tiktok-item { width: 100%; height: 100vh; height: 100dvh; scroll-snap-align: start; display: flex; align-items: center; justify-content: center; background: #000; overflow: hidden; position: relative; }
        .tiktok-item .media-wrap { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .tiktok-item .media-wrap img, .tiktok-item .media-wrap video { width: 100%; height: 100%; object-fit: contain; }
        
        .carousel-container { width: 100%; height: 100%; overflow: hidden; position: relative; background: #000; }
        .carousel-track { display: flex; width: 100%; height: 100%; transition: transform 0.4s ease; }
        .carousel-slide { min-width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; background: #000; }
        .carousel-slide img { max-width: 100%; max-height: 100%; object-fit: contain; }
        .carousel-dots { position: absolute; bottom: 80px; left: 50%; transform: translateX(-50%); display: flex; gap: 8px; z-index: 10; background: rgba(0,0,0,0.5); padding: 5px 12px; border-radius: 20px; }
        .carousel-dot { width: 8px; height: 8px; border-radius: 50%; background: rgba(255,255,255,0.3); cursor: pointer; border: none; padding: 0; transition: all 0.3s; }
        .carousel-dot.active { background: #ff0033; transform: scale(1.3); }
        .carousel-arrow { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(0,0,0,0.4); color: #fff; border: none; width: 40px; height: 40px; border-radius: 50%; font-size: 1.5em; cursor: pointer; z-index: 10; backdrop-filter: blur(4px); }
        .carousel-arrow:active { background: rgba(255,255,255,0.3); }
        .carousel-arrow.left { left: 10px; }
        .carousel-arrow.right { right: 10px; }

        .tiktok-overlay { position: absolute; bottom: 0; left: 0; right: 0; padding: 0 15px 100px; background: linear-gradient(transparent, rgba(0,0,0,0.8) 70%); pointer-events: none; }
        .tiktok-overlay .user-info { display: flex; align-items: center; gap: 10px; pointer-events: auto; background: rgba(0,0,0,0.4); padding: 6px 12px 6px 6px; border-radius: 30px; max-width: 95%; backdrop-filter: blur(4px); }
        .tiktok-overlay .user-avatar { width: 36px; height: 36px; border-radius: 50%; background: linear-gradient(135deg, #ff0033, #cc0033); display: flex; align-items: center; justify-content: center; font-size: 1em; overflow: hidden; border: 2px solid rgba(255,255,255,0.3); cursor: pointer; flex-shrink: 0; }
        .tiktok-overlay .user-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .tiktok-overlay .user-name { font-weight: 700; font-size: 0.9em; color: #fff; cursor: pointer; }
        .tiktok-overlay .user-name span { color: rgba(255,255,255,0.6); font-weight: 400; font-size: 0.7em; margin-left: 6px; }
        .tiktok-overlay .post-caption { font-size: 0.85em; color: #fff; background: rgba(0,0,0,0.5); padding: 6px 12px; border-radius: 10px; display: inline-block; max-width: 90%; backdrop-filter: blur(4px); margin-top: 4px; }

        .tiktok-profile-right { position: absolute; right: 12px; bottom: 330px; display: flex; flex-direction: column; align-items: center; gap: 8px; z-index: 20; pointer-events: none; }
        .tiktok-profile-right .avatar { width: 48px; height: 48px; border-radius: 50%; border: 2px solid #ff0033; overflow: hidden; cursor: pointer; pointer-events: auto; background: #1a1a1a; }
        .tiktok-profile-right .avatar img { width: 100%; height: 100%; object-fit: cover; }
        .tiktok-profile-right .subscribe-btn { pointer-events: auto; background: #ff0033; color: #fff; border: none; padding: 4px 12px; border-radius: 6px; font-size: 0.6em; font-weight: 700; cursor: pointer; white-space: nowrap; }
        .tiktok-profile-right .subscribe-btn.subscribed { background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.2); }

        .tiktok-actions { position: absolute; right: 12px; bottom: 160px; display: flex; flex-direction: column; align-items: center; gap: 18px; z-index: 20; pointer-events: none; }
        .tiktok-actions button { pointer-events: auto; background: none; border: none; color: #fff; font-size: 1.8em; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 2px; text-shadow: 0 2px 10px rgba(0,0,0,0.8); transition: transform 0.2s; }
        .tiktok-actions button:active { transform: scale(0.8); }
        .tiktok-actions button .count { font-size: 0.35em; font-weight: 600; }

        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(0,0,0,0.9); border-top: 1px solid rgba(255,255,255,0.05); display: flex; z-index: 200; padding: 6px 0 12px; padding-bottom: max(12px, env(safe-area-inset-bottom)); }
        .nav-item { flex: 1; text-align: center; cursor: pointer; color: #666; font-size: 0.6em; padding: 5px; transition: color 0.2s; }
        .nav-item.active { color: #ff0033; }
        .nav-icon { font-size: 1.6em; display: block; margin-bottom: 2px; }

        .create-btn { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); width: 56px; height: 56px; border-radius: 50%; background: #ff0033; color: #fff; border: none; font-size: 2em; cursor: pointer; z-index: 90; box-shadow: 0 4px 20px rgba(255,0,51,0.4); display: flex; align-items: center; justify-content: center; transition: transform 0.3s; }
        .create-btn:active { transform: translateX(-50%) scale(0.9); }
        .create-menu { position: fixed; bottom: 145px; left: 50%; transform: translateX(-50%); background: #1a1a1a; border-radius: 14px; padding: 12px 20px; z-index: 150; display: flex; gap: 12px; box-shadow: 0 8px 30px rgba(0,0,0,0.8); }
        .create-menu button { background: none; border: none; color: #fff; cursor: pointer; font-size: 1em; padding: 8px 14px; border-radius: 10px; transition: all 0.2s; }
        .create-menu button:active { background: #ff0033; }
        .hidden { display: none !important; }

        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.95); z-index: 300; display: flex; flex-direction: column; animation: modalIn 0.3s ease; }
        @keyframes modalIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        .modal-header { display: flex; align-items: center; justify-content: space-between; padding: 15px 20px; border-bottom: 1px solid #1a1a1a; flex-shrink: 0; background: #000; min-height: 56px; }
        .modal-header .modal-title { font-weight: 600; font-size: 1em; }
        .modal-header button { background: none; border: none; color: #fff; font-size: 1.2em; cursor: pointer; padding: 4px 8px; }
        .modal-body { flex: 1; overflow-y: auto; padding: 15px; }
        .modal-comment { padding: 10px 0; border-bottom: 1px solid #1a1a1a; }
        .modal-comment .comment-user { font-weight: 600; font-size: 0.85em; color: #fff; }
        .modal-comment .comment-text { font-size: 0.9em; color: #ddd; margin-top: 3px; }
        .modal-comment .comment-date { font-size: 0.65em; color: #666; }
        .comment-delete-btn { background: none; border: none; color: #ff0033; cursor: pointer; font-size: 0.8em; float: right; }
        .modal-comment-input { display: flex; gap: 10px; padding: 12px 15px; border-top: 1px solid #1a1a1a; flex-shrink: 0; background: #000; }
        .modal-comment-input input { flex: 1; background: #1a1a1a; border: 1px solid #2a2a2a; color: #fff; padding: 10px 14px; border-radius: 10px; font-size: 0.9em; outline: none; }
        .modal-comment-input input:focus { border-color: #ff0033; }
        .modal-comment-input button { background: #ff0033; color: #fff; border: none; padding: 10px 18px; border-radius: 10px; font-weight: 700; cursor: pointer; }

        .post-modal .preview-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); gap: 6px; max-width: 90%; margin: 10px auto; width: 100%; }
        .post-modal .preview-grid .preview-item { position: relative; aspect-ratio: 1; border-radius: 8px; overflow: hidden; background: #0a0a0a; }
        .post-modal .preview-grid .preview-item img { width: 100%; height: 100%; object-fit: cover; }
        .post-modal .preview-grid .preview-item .remove-btn { position: absolute; top: 2px; right: 2px; background: rgba(255,0,51,0.9); border: none; color: #fff; width: 22px; height: 22px; border-radius: 50%; font-size: 0.7em; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .post-modal .preview-container { width: 100%; flex: 1; display: flex; align-items: center; justify-content: center; overflow: hidden; background: #000; }
        .post-modal .preview-container img, .post-modal .preview-container video { width: 100%; height: 100%; object-fit: contain; }
        .post-modal .caption-input { width: 100%; padding: 12px 16px; border: none; border-top: 1px solid #333; background: #1a1a1a; color: #fff; font-size: 1em; outline: none; resize: none; font-family: inherit; min-height: 48px; }
        .post-modal .caption-input:focus { border-color: #ff0033; }
        .post-modal .btn-row { display: flex; gap: 8px; padding: 8px 12px; flex-shrink: 0; background: #000; border-top: 1px solid #1a1a1a; justify-content: center; }
        .post-modal .btn-row button { padding: 10px 24px; border-radius: 10px; border: none; font-weight: 700; cursor: pointer; font-size: 0.95em; min-width: 100px; }
        .post-modal .btn-row .publish-btn { background: #ff0033; color: #fff; }
        .post-modal .btn-row .cancel-btn { background: #2a2a2a; color: #fff; }
        .post-modal .add-btn { background: #1a1a1a; color: #fff; border: 1px solid #333; padding: 8px 16px; border-radius: 10px; cursor: pointer; font-size: 0.9em; margin: 5px auto; }
        .post-modal .add-btn:active { background: #2a2a2a; }

        .search-page { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: #000; z-index: 150; }
        .search-page.active { display: block; }
        .search-header { display: flex; align-items: center; padding: 10px 15px; background: #000; border-bottom: 1px solid #1a1a1a; gap: 10px; position: sticky; top: 0; z-index: 10; }
        .search-back-btn { background: none; border: none; color: #fff; font-size: 1.1em; cursor: pointer; padding: 6px 10px; border-radius: 8px; }
        .search-back-btn:active { background: rgba(255,255,255,0.1); }
        .search-title { color: #fff; font-weight: 700; font-size: 0.9em; }
        .search-header input { flex: 1; background: #1a1a1a; border: 1px solid #2a2a2a; color: #fff; padding: 10px 14px; border-radius: 12px; font-size: 0.9em; outline: none; }
        .search-header input:focus { border-color: #ff0033; }
        .search-results { padding: 15px; overflow-y: auto; height: calc(100% - 60px); }
        .search-user-item { display: flex; align-items: center; padding: 12px 10px; gap: 12px; border-bottom: 1px solid #111; cursor: pointer; }
        .search-user-avatar { width: 44px; height: 44px; border-radius: 50%; background: linear-gradient(135deg, #ff0033, #cc0033); display: flex; align-items: center; justify-content: center; font-size: 1.2em; overflow: hidden; flex-shrink: 0; }
        .search-user-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .search-user-name { font-weight: 600; font-size: 0.9em; color: #fff; }
        .search-user-email { font-size: 0.7em; color: #888; }

        .profile-page { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: #000; z-index: 150; overflow-y: auto; }
        .profile-page.active { display: block; }
        .profile-header-top { display: flex; align-items: center; justify-content: space-between; padding: 12px 15px; background: #000; position: sticky; top: 0; z-index: 10; border-bottom: 1px solid #1a1a1a; }
        .profile-back-btn { background: none; border: none; color: #fff; font-size: 1em; cursor: pointer; padding: 6px 10px; border-radius: 8px; }
        .profile-back-btn:active { background: rgba(255,255,255,0.1); }
        .profile-title { font-weight: 700; font-size: 0.9em; color: #fff; }
        .profile-settings-btn { background: none; border: none; color: #fff; font-size: 1.3em; cursor: pointer; padding: 4px 8px; border-radius: 8px; }
        .profile-settings-btn:active { background: rgba(255,255,255,0.1); }
        .profile-header { text-align: center; padding: 20px 20px 15px; }
        .profile-avatar { width: 80px; height: 80px; border-radius: 50%; background: linear-gradient(135deg, #ff0033, #cc0033); margin: 0 auto 10px; display: flex; align-items: center; justify-content: center; font-size: 2em; border: 3px solid #ff0033; overflow: hidden; cursor: pointer; }
        .profile-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .profile-name { font-size: 1.2em; font-weight: 700; color: #fff; }
        .profile-email { color: #888; font-size: 0.8em; }
        .profile-bio { color: #aaa; font-size: 0.85em; margin: 5px 20px 10px; cursor: pointer; padding: 5px 10px; border-radius: 8px; }
        .profile-bio:active { background: rgba(255,255,255,0.05); }
        .profile-bio-edit { background: transparent; border: 1px solid #333; color: #fff; padding: 8px 12px; border-radius: 8px; width: 80%; margin: 5px auto; display: none; font-size: 0.85em; }
        .profile-stats { display: flex; justify-content: center; gap: 30px; margin: 15px 0; }
        .profile-stat { text-align: center; cursor: pointer; }
        .profile-stat-num { font-size: 1.2em; font-weight: 700; color: #fff; }
        .profile-stat-label { font-size: 0.65em; color: #888; }
        .profile-logout-btn { background: #1a1a1a; color: #fff; border: 1px solid #333; padding: 8px 24px; border-radius: 8px; font-size: 0.85em; cursor: pointer; margin-top: 5px; }
        .profile-logout-btn:active { background: #2a2a2a; }
        .profile-tabs { display: flex; border-bottom: 1px solid #1a1a1a; margin: 0 15px; }
        .profile-tab { flex: 1; text-align: center; padding: 10px 0; font-size: 0.8em; color: #888; cursor: pointer; border-bottom: 2px solid transparent; }
        .profile-tab.active { color: #ff0033; border-bottom-color: #ff0033; }
        .profile-posts-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; padding: 2px; padding-bottom: 80px; }
        .profile-post-thumb { aspect-ratio: 1; overflow: hidden; position: relative; cursor: pointer; background: #0a0a0a; }
        .profile-post-thumb img { width: 100%; height: 100%; object-fit: cover; }
        .profile-post-thumb .badge { position: absolute; top: 6px; right: 6px; background: rgba(255,0,51,0.8); border-radius: 4px; padding: 2px 6px; font-size: 0.6em; color: #fff; }
        .profile-post-thumb .like-badge { position: absolute; bottom: 4px; left: 4px; font-size: 0.65em; background: rgba(0,0,0,0.6); padding: 2px 6px; border-radius: 4px; color: #ff0033; }
        .profile-post-thumb .delete-post-btn { position: absolute; top: 6px; right: 6px; background: rgba(255,0,51,0.9); border: none; border-radius: 50%; width: 24px; height: 24px; font-size: 0.7em; color: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center; opacity: 0; transition: opacity 0.2s; z-index: 5; }
        .profile-post-thumb:active .delete-post-btn { opacity: 1; }

        .settings-panel { position: fixed; top: 0; right: -100%; width: 320px; max-width: 85%; height: 100%; background: #1a1a1a; z-index: 500; transition: right 0.3s ease; padding: 20px; overflow-y: auto; box-shadow: -4px 0 30px rgba(0,0,0,0.5); }
        .settings-panel.open { right: 0; }
        .settings-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 499; display: none; }
        .settings-overlay.open { display: block; }
        .settings-header { display: flex; justify-content: space-between; align-items: center; padding-bottom: 20px; border-bottom: 1px solid #2a2a2a; margin-bottom: 20px; }
        .settings-title { font-size: 1.3em; font-weight: 700; color: #fff; }
        .settings-close { background: none; border: none; color: #fff; font-size: 1.5em; cursor: pointer; padding: 4px 8px; }
        .settings-item { display: flex; justify-content: space-between; align-items: center; padding: 16px 0; border-bottom: 1px solid #2a2a2a; color: #fff; }
        .settings-item .label { font-size: 0.95em; }
        .settings-item .value { color: #888; font-size: 0.85em; }
        .settings-item .toggle-btn { background: #2a2a2a; border: none; color: #fff; padding: 6px 16px; border-radius: 20px; font-size: 0.8em; cursor: pointer; transition: all 0.2s; }
        .settings-item .toggle-btn:active { opacity: 0.7; }
        .settings-item .toggle-btn.active { background: #ff0033; color: #fff; }
        .settings-item .toggle-btn .check-mark { display: none; margin-left: 4px; }
        .settings-item .toggle-btn.active .check-mark { display: inline; }
        .settings-item select { background: #2a2a2a; border: 1px solid #3a3a3a; color: #fff; padding: 6px 12px; border-radius: 8px; font-size: 0.85em; cursor: pointer; outline: none; }
        .settings-item select:focus { border-color: #ff0033; }
        .theme-btns { display: flex; flex-direction: column; gap: 6px; width: 100%; }
        .theme-btns .toggle-btn { font-size: 0.8em; padding: 8px 14px; text-align: left; display: flex; justify-content: space-between; width: 100%; border-radius: 10px; }

        body.light-theme { background: #f5f5f5; color: #1a1a1a; }
        body.light-theme .tiktok-item { background: #f5f5f5; }
        body.light-theme .bottom-nav { background: rgba(255,255,255,0.95); border-top: 1px solid #e0e0e0; }
        body.light-theme .nav-item { color: #999; }
        body.light-theme .nav-item.active { color: #ff0033; }
        body.light-theme .settings-panel { background: #fff; }
        body.light-theme .settings-title { color: #1a1a1a; }
        body.light-theme .settings-close { color: #1a1a1a; }
        body.light-theme .settings-item { color: #1a1a1a; border-bottom: 1px solid #e8e8e8; }
        body.light-theme .settings-item .value { color: #888; }
        body.light-theme .settings-item .toggle-btn { background: #e8e8e8; color: #1a1a1a; }

})();

// ============================================================
// ===== ПЕРЕВОДЫ =====
// ============================================================
var translations = {

        nothingFound: 'Ничего не найдено', back: 'Назад', posts: 'Постов',
        followers: 'Подписчиков', following: 'Подписок', delete: 'Удалить?',
        liked: 'Понравилось', caption: 'Описание', enterCaption: 'Введите описание...',
        reply: 'Ответить', likes: '❤️', editBio: 'Изменить описание',

    en: {

        nickname: 'Username', password: 'Password', remember: 'Remember me',
        createAccount: 'Create Account', feed: 'Feed', search: 'Search',
        profile: 'Profile', settings: 'Settings', theme: 'Theme',
        dark: 'Dark', light: 'Light', green: 'Green', pink: 'Pink',
        language: 'Language', version: 'Version', account: 'Account',
        comments: 'Comments', write: 'Write...', noComments: 'No comments',
        noPosts: 'No posts', logout: 'Logout', subscribe: 'Subscribe',
        subscribed: 'Subscribed', searchPlaceholder: 'Search people...',
        nothingFound: 'Nothing found', back: 'Back', posts: 'Posts',
        followers: 'Followers', following: 'Following', delete: 'Delete?',
        liked: 'Liked', caption: 'Caption', enterCaption: 'Enter caption...',
        reply: 'Reply', likes: '❤️', editBio: 'Edit bio',
        bioPlaceholder: 'Tell about yourself...', addCaption: 'Add caption',
        publish: 'Publish', cancel: 'Cancel', choosePhoto: 'Photo',
        chooseVideo: 'Video', addPhoto: '➕ Add photo', confirmLogout: 'Logout?',
        addCaptionTitle: 'Add caption', beFirst: 'Be the first!'
    }
};

var currentLang = localStorage.getItem('lifetok_lang') || 'ru';

function t(key) {
    return translations[currentLang] && translations[currentLang][key] ? translations[currentLang][key] : key;
}

// ============================================================
// ===== ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ =====
// ============================================================
var currentUser = null;
var posts = [];
var users = {};
var imageStorage = {};
var carouselState = {};
var isAppReady = false;

// ============================================================
// ===== ЗАГРУЗКА/СОХРАНЕНИЕ =====
// ============================================================
function loadData() {
    try {
        var saved = localStorage.getItem('lifetok_data');
        if (saved) {
            var data = JSON.parse(saved);
            users = data.users || {};
            posts = data.posts || [];
            imageStorage = data.imageStorage || {};
            console.log('📦 Данные загружены: постов ' + posts.length);
            return true;
        }
    } catch(e) {
        console.warn('Ошибка загрузки:', e);
    }
    users = {};
    posts = [];
    imageStorage = {};
    return false;
}

function saveData() {
    try {
        var data = {
            users: users,
            posts: posts,
            imageStorage: imageStorage
        };
        localStorage.setItem('lifetok_data', JSON.stringify(data));
        return true;
    } catch(e) {
        console.warn('Ошибка сохранения:', e);
        return false;
    }
}

// ============================================================
// ===== АВТОРИЗАЦИЯ =====
// ============================================================
var savedAccounts = JSON.parse(localStorage.getItem('lifetok_saved') || '[]');

function renderSavedAccounts() {
    var c = document.getElementById('savedAccounts');
    var l = document.getElementById('savedAccountsList');
    if (!c || !l) return;
    if (!savedAccounts.length) { c.style.display = 'none'; return; }
    c.style.display = 'block';
    l.innerHTML = savedAccounts.map(function(a) {
        return '<div class="saved-item" data-email="'+a.email+'">'+
            '<div class="saved-avatar">'+(a.avatar?'<img src="'+a.avatar+'">':'👤')+'</div>'+
            '<div class="saved-info"><div class="saved-name">'+a.nickname+'</div><div class="saved-email">'+a.email+'</div></div>'+
            '<button class="saved-remove" data-remove="'+a.email+'">✕</button>'+
        '</div>';
    }).join('');
    l.querySelectorAll('.saved-item').forEach(function(i) {
        i.addEventListener('click', function(e) {
            if (e.target.classList.contains('saved-remove')) return;
            document.getElementById('authEmail').value = this.dataset.email;
            document.getElementById('authPassword').focus();
        });
    });
    l.querySelectorAll('.saved-remove').forEach(function(b) {
        b.addEventListener('click', function(e) {
            e.stopPropagation();
            if (confirm('Удалить?')) {
                savedAccounts = savedAccounts.filter(function(a) { return a.email !== b.dataset.remove; });
                localStorage.setItem('lifetok_saved', JSON.stringify(savedAccounts));
                renderSavedAccounts();
            }
        });
    });
}

function saveCurrentAccount(email, nickname, avatar) {
    var ex = savedAccounts.find(function(a) { return a.email === email; });
    if (!ex) savedAccounts.push({ email: email, nickname: nickname, avatar: avatar });
    else { ex.nickname = nickname; ex.avatar = avatar; }
    localStorage.setItem('lifetok_saved', JSON.stringify(savedAccounts));
    localStorage.setItem('lifetok_user', JSON.stringify({ email: email, timestamp: Date.now() }));
}

function tryAutoLogin() {
    try {
        var s = JSON.parse(localStorage.getItem('lifetok_user') || 'null');
        if (s && s.email && users[s.email]) return s.email;
    } catch(e) {}
    return null;
}

// ============================================================
// ===== ЗАПУСК С ЗАЩИТОЙ =====
// ============================================================
try {
    loadData();
} catch(e) {
    console.error('Ошибка загрузки данных:', e);
    users = {};
    posts = [];
    imageStorage = {};
}

var splash = document.getElementById('splashScreen');
var authScreen = document.getElementById('authScreen');

setTimeout(function() {
    try {
        if (splash) splash.style.display = 'none';
        
        var savedUser = tryAutoLogin();
        if (savedUser && users[savedUser]) {
            currentUser = users[savedUser];
            if (document.getElementById('authEmail')) {
                document.getElementById('authEmail').value = savedUser;
            }
            if (document.getElementById('authPassword')) {
                document.getElementById('authPassword').value = currentUser.password || '123456';
            }
            document.getElementById('authBtn').click();
        } else {
            if (authScreen) authScreen.style.display = 'flex';
            renderSavedAccounts();
            updateAuthTexts();
        }
    } catch(e) {
        console.error('Ошибка запуска:', e);
        if (authScreen) authScreen.style.display = 'flex';
        renderSavedAccounts();
        updateAuthTexts();
    }
}, 1500);

console.log('📦 Постов: ' + posts.length);
console.log('👤 Пользователей: ' + Object.keys(users).length);
</script>
